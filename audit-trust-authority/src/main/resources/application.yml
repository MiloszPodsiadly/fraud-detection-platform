spring:
  application:
    name: audit-trust-authority
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/fraud_trust_authority?serverSelectionTimeoutMS=5000&connectTimeoutMS=3000&socketTimeoutMS=5000}

server:
  port: ${SERVER_PORT:8095}

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

app:
  trust-authority:
    authority-name: ${TRUST_AUTHORITY_NAME:local-trust-authority}
    key-id: ${TRUST_AUTHORITY_KEY_ID:local-ed25519-key-1}
    hmac-secret: ${TRUST_AUTHORITY_HMAC_SECRET:local-dev-trust-hmac-secret}
    private-key-path: ${TRUST_AUTHORITY_PRIVATE_KEY_PATH:}
    public-key-path: ${TRUST_AUTHORITY_PUBLIC_KEY_PATH:}
    audit-path: ${TRUST_AUTHORITY_AUDIT_PATH:./target/trust-authority-audit.jsonl}
    enabled: ${TRUST_AUTHORITY_ENABLED:true}
    signing-required: ${TRUST_AUTHORITY_SIGNING_REQUIRED:true}
    identity-mode: ${TRUST_AUTHORITY_IDENTITY_MODE:hmac-local}
    jwt-identity:
      issuer: ${TRUST_AUTHORITY_JWT_ISSUER:}
      audience: ${TRUST_AUTHORITY_JWT_AUDIENCE:}
      service-name-claim: ${TRUST_AUTHORITY_JWT_SERVICE_NAME_CLAIM:service_name}
      authorities-claim: ${TRUST_AUTHORITY_JWT_AUTHORITIES_CLAIM:authorities}
      clock-skew: ${TRUST_AUTHORITY_JWT_CLOCK_SKEW:30s}
      max-token-age: ${TRUST_AUTHORITY_JWT_MAX_TOKEN_AGE:5m}
      max-ttl: ${TRUST_AUTHORITY_JWT_MAX_TTL:5m}
      jwks-path: ${TRUST_AUTHORITY_JWT_JWKS_PATH:}
    audit:
      sink: ${TRUST_AUTHORITY_AUDIT_SINK:local-file}
    external-anchoring:
      enabled: ${TRUST_AUTHORITY_EXTERNAL_ANCHORING_ENABLED:false}
      fixed-delay: ${TRUST_AUTHORITY_EXTERNAL_ANCHORING_FIXED_DELAY:15m}
      fixed-delay-ms: ${TRUST_AUTHORITY_EXTERNAL_ANCHORING_FIXED_DELAY_MS:900000}
