services:
  kafka:
    image: apache/kafka:3.8.0
    container_name: fraud-kafka
    restart: unless-stopped
    ports:
      - "127.0.0.1:9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-topics-init:
    image: apache/kafka:3.8.0
    container_name: fraud-kafka-topics-init
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./init-kafka-topics.sh:/opt/init/init-kafka-topics.sh:ro
    environment:
      BOOTSTRAP_SERVER: kafka:9092
    restart: "no"
    command:
      - /bin/bash
      - /opt/init/init-kafka-topics.sh

  mongodb:
    image: mongo:7.0
    container_name: fraud-mongodb
    restart: unless-stopped
    ports:
      - "127.0.0.1:27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7.2-alpine
    container_name: fraud-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10

  ml-inference-service:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.ml-inference
    container_name: ml-inference-service
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://mongodb:27017/fraud_governance
      GOVERNANCE_SNAPSHOT_COLLECTION: ml_governance_snapshots
      GOVERNANCE_SNAPSHOT_RETENTION_LIMIT: "500"
      GOVERNANCE_SNAPSHOT_INTERVAL_REQUESTS: "50"
      INTERNAL_AUTH_MODE: DISABLED_LOCAL_ONLY
      INTERNAL_AUTH_ALLOWED_SERVICES: fraud-scoring-service:local-dev-internal-token:ml-score,alert-service:local-dev-internal-token:governance-read
    ports:
      - "127.0.0.1:8090:8090"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/health', timeout=2).read()"]
      interval: 15s
      timeout: 10s
      retries: 10

  audit-trust-authority:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.backend
      args:
        MODULE_NAME: audit-trust-authority
    container_name: audit-trust-authority
    restart: unless-stopped
    environment:
      SERVER_PORT: 8080
      TRUST_AUTHORITY_NAME: local-trust-authority
      TRUST_AUTHORITY_KEY_ID: local-ed25519-key-1
      TRUST_AUTHORITY_HMAC_SECRET: local-dev-trust-hmac-secret
      MONGODB_URI: mongodb://mongodb:27017/fraud_trust_authority?serverSelectionTimeoutMS=5000&connectTimeoutMS=3000&socketTimeoutMS=5000
      TRUST_AUTHORITY_PRIVATE_KEY_PATH: /tmp/audit-trust-authority/ed25519-private.key
      TRUST_AUTHORITY_PUBLIC_KEY_PATH: /tmp/audit-trust-authority/ed25519-public.key
      TRUST_AUTHORITY_AUDIT_PATH: /tmp/audit-trust-authority/trust-authority-audit.jsonl
    ports:
      - "127.0.0.1:8095:8080"

  prometheus:
    image: prom/prometheus:v3.3.0
    container_name: fraud-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=2d
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts:/etc/prometheus/alerts:ro
    ports:
      - "127.0.0.1:9090:9090"

  grafana:
    image: grafana/grafana:11.6.1
    container_name: fraud-grafana
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3000:3000"

  ollama:
    image: ollama/ollama:latest
    container_name: fraud-ollama
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 10

  ollama-model-init:
    image: ollama/ollama:latest
    container_name: fraud-ollama-model-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: llama3.2:3b
    entrypoint:
      - /bin/sh
      - -c
    command:
      - ollama pull "$$OLLAMA_MODEL"
    restart: "no"

  transaction-ingest-service:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.backend
      args:
        MODULE_NAME: transaction-ingest-service
    container_name: transaction-ingest-service
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      kafka-topics-init:
        condition: service_completed_successfully
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: docker
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "127.0.0.1:8081:8080"

  transaction-simulator-service:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.backend
      args:
        MODULE_NAME: transaction-simulator-service
    container_name: transaction-simulator-service
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      kafka-topics-init:
        condition: service_completed_successfully
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: docker
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      AUTO_REPLAY_ENABLED: "true"
      AUTO_REPLAY_SOURCE_TYPE: SYNTHETIC
      AUTO_REPLAY_MAX_EVENTS: "50000"
      AUTO_REPLAY_THROTTLE_MILLIS: "5"
      AUTO_REPLAY_START_DELAY_MILLIS: "15000"
    volumes:
      - ../data/generated:/app/data/generated
    ports:
      - "127.0.0.1:8082:8080"

  feature-enricher-service:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.backend
      args:
        MODULE_NAME: feature-enricher-service
    container_name: feature-enricher-service
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      kafka-topics-init:
        condition: service_completed_successfully
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: docker
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "127.0.0.1:8083:8080"

  fraud-scoring-service:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.backend
      args:
        MODULE_NAME: fraud-scoring-service
    container_name: fraud-scoring-service
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      kafka-topics-init:
        condition: service_completed_successfully
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      ml-inference-service:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: docker
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ML_MODEL_BASE_URL: http://ml-inference-service:8090
      SCORING_MODE: SHADOW
      INTERNAL_AUTH_CLIENT_ENABLED: "true"
      INTERNAL_AUTH_SERVICE_NAME: fraud-scoring-service
      INTERNAL_AUTH_TOKEN: local-dev-internal-token
    ports:
      - "127.0.0.1:8084:8080"

  alert-service:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.backend
      args:
        MODULE_NAME: alert-service
    container_name: alert-service
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      kafka-topics-init:
        condition: service_completed_successfully
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      audit-trust-authority:
        condition: service_started
      ollama-model-init:
        condition: service_completed_successfully
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: docker,docker-local
      APP_SECURITY_DEMO_AUTH_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MONGODB_URI: mongodb://mongodb:27017/fraud_alerts?serverSelectionTimeoutMS=5000&connectTimeoutMS=3000&socketTimeoutMS=5000
      ML_GOVERNANCE_BASE_URL: http://ml-inference-service:8090
      INTERNAL_AUTH_CLIENT_ENABLED: "true"
      INTERNAL_AUTH_SERVICE_NAME: alert-service
      INTERNAL_AUTH_TOKEN: local-dev-internal-token
      AUDIT_EXTERNAL_ANCHORING_ENABLED: "true"
      AUDIT_EXTERNAL_ANCHORING_SINK: local-file
      AUDIT_EXTERNAL_ANCHORING_LOCAL_FILE_PATH: /tmp/audit-external-anchors.jsonl
      AUDIT_EXTERNAL_ANCHORING_INITIAL_DELAY_MS: "5000"
      AUDIT_EXTERNAL_ANCHORING_PUBLISH_DELAY_MS: "10000"
      AUDIT_TRUST_AUTHORITY_ENABLED: "true"
      AUDIT_TRUST_AUTHORITY_URL: http://audit-trust-authority:8080
      AUDIT_TRUST_AUTHORITY_HMAC_SECRET: local-dev-trust-hmac-secret
      AUDIT_TRUST_AUTHORITY_SIGNING_REQUIRED: "false"
      AUDIT_TRUST_AUTHORITY_CALLER_SERVICE_NAME: alert-service
      AUDIT_TRUST_AUTHORITY_CALLER_ENVIRONMENT: docker-local
      ASSISTANT_MODE: OLLAMA
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: llama3.2:3b
      ASSISTANT_READ_TIMEOUT: 45s
    ports:
      - "127.0.0.1:8085:8080"

  analyst-console-ui:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.frontend
    container_name: analyst-console-ui
    restart: unless-stopped
    depends_on:
      alert-service:
        condition: service_started
    ports:
      - "127.0.0.1:4173:80"

volumes:
  ollama-data:
