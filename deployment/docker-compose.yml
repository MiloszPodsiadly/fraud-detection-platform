services:
  kafka:
    image: apache/kafka:3.8.0
    container_name: fraud-kafka
    ports:
      - "127.0.0.1:9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-topics-init:
    image: apache/kafka:3.8.0
    container_name: fraud-kafka-topics-init
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./init-kafka-topics.sh:/opt/init/init-kafka-topics.sh:ro
    environment:
      BOOTSTRAP_SERVER: kafka:9092
    restart: "no"
    command:
      - /bin/bash
      - /opt/init/init-kafka-topics.sh

  mongodb:
    image: mongo:7.0
    container_name: fraud-mongodb
    ports:
      - "127.0.0.1:27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7.2-alpine
    container_name: fraud-redis
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10

  transaction-ingest-service:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.backend
      args:
        MODULE_NAME: transaction-ingest-service
    container_name: transaction-ingest-service
    depends_on:
      kafka:
        condition: service_healthy
      kafka-topics-init:
        condition: service_completed_successfully
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: docker
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "127.0.0.1:8081:8080"

  transaction-simulator-service:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.backend
      args:
        MODULE_NAME: transaction-simulator-service
    container_name: transaction-simulator-service
    depends_on:
      kafka:
        condition: service_healthy
      kafka-topics-init:
        condition: service_completed_successfully
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: docker
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      AUTO_REPLAY_ENABLED: "true"
      AUTO_REPLAY_SOURCE_TYPE: SYNTHETIC
      AUTO_REPLAY_MAX_EVENTS: "300"
      AUTO_REPLAY_THROTTLE_MILLIS: "5"
      AUTO_REPLAY_START_DELAY_MILLIS: "15000"
    volumes:
      - ../data/generated:/app/data/generated
    ports:
      - "127.0.0.1:8082:8080"

  feature-enricher-service:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.backend
      args:
        MODULE_NAME: feature-enricher-service
    container_name: feature-enricher-service
    depends_on:
      kafka:
        condition: service_healthy
      kafka-topics-init:
        condition: service_completed_successfully
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: docker
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "127.0.0.1:8083:8080"

  fraud-scoring-service:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.backend
      args:
        MODULE_NAME: fraud-scoring-service
    container_name: fraud-scoring-service
    depends_on:
      kafka:
        condition: service_healthy
      kafka-topics-init:
        condition: service_completed_successfully
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: docker
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "127.0.0.1:8084:8080"

  alert-service:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.backend
      args:
        MODULE_NAME: alert-service
    container_name: alert-service
    depends_on:
      kafka:
        condition: service_healthy
      kafka-topics-init:
        condition: service_completed_successfully
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: docker
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MONGODB_URI: mongodb://mongodb:27017/fraud_alerts
    ports:
      - "127.0.0.1:8085:8080"

  analyst-console-ui:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.frontend
    container_name: analyst-console-ui
    depends_on:
      alert-service:
        condition: service_started
    ports:
      - "127.0.0.1:4173:80"
