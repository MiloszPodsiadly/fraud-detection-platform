spring:
  application:
    name: alert-service
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/fraud_alerts}
      auto-index-creation: true
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      auto-offset-reset: earliest
      group-id: ${spring.application.name}

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http:
          server:
            requests: true

app:
  audit:
    bank-mode:
      fail-closed: ${AUDIT_BANK_MODE_FAIL_CLOSED:false}
    external-anchoring:
      enabled: ${AUDIT_EXTERNAL_ANCHORING_ENABLED:false}
      publication:
        enabled: ${AUDIT_EXTERNAL_ANCHORING_PUBLICATION_ENABLED:${AUDIT_EXTERNAL_ANCHORING_ENABLED:false}}
        required: ${AUDIT_EXTERNAL_ANCHORING_PUBLICATION_REQUIRED:${AUDIT_EXTERNAL_ANCHORING_ENABLED:false}}
        fail-closed: ${AUDIT_EXTERNAL_ANCHORING_PUBLICATION_FAIL_CLOSED:${AUDIT_EXTERNAL_ANCHORING_PUBLICATION_REQUIRED:${AUDIT_EXTERNAL_ANCHORING_ENABLED:false}}}
      sink: ${AUDIT_EXTERNAL_ANCHORING_SINK:disabled}
      publish-limit: ${AUDIT_EXTERNAL_ANCHORING_PUBLISH_LIMIT:100}
      local-file:
        path: ${AUDIT_EXTERNAL_ANCHORING_LOCAL_FILE_PATH:./target/audit-external-anchors.jsonl}
      object-store:
        bucket: ${AUDIT_EXTERNAL_ANCHORING_OBJECT_STORE_BUCKET:}
        prefix: ${AUDIT_EXTERNAL_ANCHORING_OBJECT_STORE_PREFIX:}
        region: ${AUDIT_EXTERNAL_ANCHORING_OBJECT_STORE_REGION:}
        endpoint: ${AUDIT_EXTERNAL_ANCHORING_OBJECT_STORE_ENDPOINT:}
        access-key-id: ${AUDIT_EXTERNAL_ANCHORING_OBJECT_STORE_ACCESS_KEY_ID:}
        secret-access-key: ${AUDIT_EXTERNAL_ANCHORING_OBJECT_STORE_SECRET_ACCESS_KEY:}
        startup-check-enabled: ${AUDIT_EXTERNAL_ANCHORING_OBJECT_STORE_STARTUP_CHECK_ENABLED:true}
        startup-test-write-enabled: ${AUDIT_EXTERNAL_ANCHORING_OBJECT_STORE_STARTUP_TEST_WRITE_ENABLED:false}
        operation-timeout: ${AUDIT_EXTERNAL_ANCHORING_OBJECT_STORE_OPERATION_TIMEOUT:2s}
        retry-backoff: ${AUDIT_EXTERNAL_ANCHORING_OBJECT_STORE_RETRY_BACKOFF:100ms}
        max-attempts: ${AUDIT_EXTERNAL_ANCHORING_OBJECT_STORE_MAX_ATTEMPTS:2}
    trust-attestation:
      signing:
        mode: ${AUDIT_TRUST_ATTESTATION_SIGNING_MODE:disabled}
        local-dev-key-id: ${AUDIT_TRUST_ATTESTATION_LOCAL_DEV_KEY_ID:local-dev-trust-attestation-key}
        local-dev-secret: ${AUDIT_TRUST_ATTESTATION_LOCAL_DEV_SECRET:}
    trust:
      signing:
        kms-enabled: ${AUDIT_TRUST_SIGNING_KMS_ENABLED:false}
    trust-authority:
      enabled: ${AUDIT_TRUST_AUTHORITY_ENABLED:false}
      url: ${AUDIT_TRUST_AUTHORITY_URL:http://localhost:8095}
      hmac-secret: ${AUDIT_TRUST_AUTHORITY_HMAC_SECRET:}
      signing-required: ${AUDIT_TRUST_AUTHORITY_SIGNING_REQUIRED:false}
      identity-mode: ${AUDIT_TRUST_AUTHORITY_IDENTITY_MODE:hmac-local}
      caller-service-name: ${AUDIT_TRUST_AUTHORITY_CALLER_SERVICE_NAME:alert-service}
      caller-environment: ${AUDIT_TRUST_AUTHORITY_CALLER_ENVIRONMENT:local}
      caller-instance-id: ${AUDIT_TRUST_AUTHORITY_CALLER_INSTANCE_ID:}
      jwt-identity:
        issuer: ${AUDIT_TRUST_AUTHORITY_JWT_ISSUER:}
        audience: ${AUDIT_TRUST_AUTHORITY_JWT_AUDIENCE:}
        key-id: ${AUDIT_TRUST_AUTHORITY_JWT_KEY_ID:}
        private-key: ${AUDIT_TRUST_AUTHORITY_JWT_PRIVATE_KEY:}
        private-key-path: ${AUDIT_TRUST_AUTHORITY_JWT_PRIVATE_KEY_PATH:}
        ttl: ${AUDIT_TRUST_AUTHORITY_JWT_TTL:5m}
        authorities: ${AUDIT_TRUST_AUTHORITY_JWT_AUTHORITIES:AUDIT_ANCHOR AUDIT_INTEGRITY}
  security:
    demo-auth:
      enabled: ${APP_SECURITY_DEMO_AUTH_ENABLED:false}
    jwt:
      enabled: ${APP_SECURITY_JWT_ENABLED:false}
      # Required when APP_SECURITY_JWT_ENABLED=true.
      # Prefer jwk-set-uri for explicit key discovery in local/integration setups.
      issuer-uri: ${APP_SECURITY_JWT_ISSUER_URI:}
      jwk-set-uri: ${APP_SECURITY_JWT_JWK_SET_URI:}
      user-id-claim: ${APP_SECURITY_JWT_USER_ID_CLAIM:sub}
      access-claim: ${APP_SECURITY_JWT_ACCESS_CLAIM:groups}
      role-mapping:
        fraud-readonly-analyst: READ_ONLY_ANALYST
        fraud-analyst: ANALYST
        fraud-reviewer: REVIEWER
        fraud-ops-admin: FRAUD_OPS_ADMIN
  internal-auth:
    client:
      enabled: ${INTERNAL_AUTH_CLIENT_ENABLED:false}
      mode: ${INTERNAL_AUTH_CLIENT_MODE:TOKEN_VALIDATOR}
      service-name: ${INTERNAL_AUTH_SERVICE_NAME:alert-service}
      token: ${INTERNAL_AUTH_TOKEN:}
      allow-token-validator-in-prod: ${INTERNAL_AUTH_ALLOW_TOKEN_VALIDATOR_IN_PROD:false}
      jwt:
        algorithm: ${INTERNAL_AUTH_JWT_ALGORITHM:HS256}
        issuer: ${INTERNAL_AUTH_JWT_ISSUER:}
        audience: ${INTERNAL_AUTH_JWT_AUDIENCE:}
        secret: ${INTERNAL_AUTH_JWT_SECRET:}
        key-id: ${INTERNAL_AUTH_JWT_KEY_ID:}
        private-key-pem: ${INTERNAL_AUTH_JWT_PRIVATE_KEY_PEM:}
        private-key-path: ${INTERNAL_AUTH_JWT_PRIVATE_KEY_PATH:}
        ttl: ${INTERNAL_AUTH_JWT_TTL:5m}
        authorities: ${INTERNAL_AUTH_JWT_AUTHORITIES:}
      mtls:
        client-certificate-path: ${INTERNAL_AUTH_MTLS_CLIENT_CERTIFICATE_PATH:}
        client-private-key-path: ${INTERNAL_AUTH_MTLS_CLIENT_PRIVATE_KEY_PATH:}
        ca-certificate-paths: ${INTERNAL_AUTH_MTLS_CA_CERTIFICATE_PATHS:}
        expected-server-identity: ${INTERNAL_AUTH_MTLS_EXPECTED_SERVER_IDENTITY:}
        trust-all: ${INTERNAL_AUTH_MTLS_TRUST_ALL:false}
  kafka:
    topics:
      transaction-scored: transactions.scored
      fraud-alerts: fraud.alerts
      fraud-decisions: fraud.decisions
      transactions-dead-letter: transactions.dead-letter
    consumer:
      concurrency: 1
      retry-attempts: 3
      retry-backoff-millis: 1000
  assistant:
    mode: ${ASSISTANT_MODE:DETERMINISTIC}
    ollama-base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    ollama-model: ${OLLAMA_MODEL:llama3.2:3b}
    connect-timeout: ${ASSISTANT_CONNECT_TIMEOUT:500ms}
    read-timeout: ${ASSISTANT_READ_TIMEOUT:45s}
  governance:
    audit:
      ml-governance-base-url: ${ML_GOVERNANCE_BASE_URL:http://localhost:8090}
      history-limit: ${GOVERNANCE_AUDIT_HISTORY_LIMIT:50}
      analytics-max-audit-events: ${GOVERNANCE_AUDIT_ANALYTICS_MAX_AUDIT_EVENTS:10000}
      ml-lookup-timeout: ${GOVERNANCE_AUDIT_ML_LOOKUP_TIMEOUT:2s}
