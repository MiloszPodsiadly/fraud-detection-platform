openapi: 3.0.3
info:
  title: Alert Service API
  version: FDP-24
  description: Authenticated alert-service contracts for analyst workflows, durable platform Audit Read API, bounded audit integrity verification, selected sensitive read-access audit persistence, external anchor verification, bounded evidence export, derived audit trust attestation, public trust key export, governance advisory lifecycle projection, and human-review audit. FDP-20 extends tamper evidence outside the primary database boundary. FDP-22 adds a pluggable object-store external anchor sink boundary, verified external anchor references, and explicit external_immutability_level=NONE|CONFIGURED|ENFORCED; no WORM or full immutability claim is valid unless the adapter verifies infrastructure controls and reports ENFORCED. FDP-23 adds a separate local-first audit trust authority for Ed25519 external anchor hash signatures and public verification key export; the alert-service does not hold the trust authority private key. FDP-24 adds fail-closed posture reporting, durable analyst-decision outbox/idempotency semantics, and publication-status source-of-truth semantics. Audit integrity, trust authority signatures, and trust attestation do not imply certified WORM archive storage, legal notarization, SIEM integration, unbounded export, KMS/HSM signing unless explicitly integrated, or final compliance archive.
servers:
  - url: http://localhost:8085
paths:
  /api/v1/audit/events:
    get:
      summary: List durable platform audit events
      description: Returns bounded newest-first durable platform write/governance audit events from audit_events. This endpoint does not return read-access audit events from read_access_audit_events and is not itself proof that every sensitive platform read was audited. Requires audit:read. Filters are exact-match only; no regex, full-text search, export, aggregation, delete, or update operations are supported. Clients MUST check status before interpreting count or events. AVAILABLE with count 0 is a valid empty result. UNAVAILABLE means audit storage could not be read and returns reason_code AUDIT_STORE_UNAVAILABLE, a stable non-sensitive message, count 0, and an empty events array.
      security:
        - bearerAuth: []
        - demoAuth: []
      parameters:
        - name: event_type
          in: query
          required: false
          schema:
            type: string
            enum: [SUBMIT_ANALYST_DECISION, UPDATE_FRAUD_CASE, READ_AUDIT_EVENTS, VERIFY_AUDIT_INTEGRITY, VERIFY_EXTERNAL_AUDIT_INTEGRITY, EXPORT_AUDIT_EVIDENCE, READ_AUDIT_TRUST_ATTESTATION]
        - name: actor_id
          in: query
          required: false
          description: Exact backend-derived actor id match.
          schema:
            type: string
            minLength: 1
            maxLength: 120
        - name: resource_type
          in: query
          required: false
          schema:
            type: string
            enum: [ALERT, FRAUD_CASE, AUDIT_EVENT, AUDIT_INTEGRITY, AUDIT_EXTERNAL_INTEGRITY, AUDIT_EVIDENCE_EXPORT, AUDIT_TRUST_ATTESTATION]
        - name: resource_id
          in: query
          required: false
          description: Exact resource id match.
          schema:
            type: string
            minLength: 1
            maxLength: 160
        - name: from
          in: query
          required: false
          description: Inclusive ISO-8601 lower timestamp bound. If provided without to, the upper bound is request time.
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          description: Inclusive ISO-8601 upper timestamp bound.
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: Durable audit events returned or audit storage reported unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditEventReadResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/audit/integrity:
    get:
      summary: Verify bounded audit hash-chain integrity
      description: Performs read-only bounded application-level verification of durable platform audit events against local chain anchors. Requires audit:read. Verifies deterministic event hashes, partition-scoped previous-hash continuity, chain-position continuity, schema version, hash algorithm, fork indicators, and latest local chain-anchor consistency. Supports mode=HEAD, WINDOW, or FULL_CHAIN. WINDOW and HEAD can report an external predecessor without treating the first checked event as a false violation; FULL_CHAIN reports missing predecessors as violations. Returns VALID, INVALID, PARTIAL, or UNAVAILABLE. PARTIAL can mean the bounded result set was filled or the local verification time budget was reached. This endpoint does not repair data, export full audit history, delete/update audit records, provide WORM storage, protection against full DB administrator rewrite, legal notarization, legal non-repudiation, SIEM integration, HSM/KMS signing, or regulator-ready evidence packaging. External anchor verification is a separate audit:verify endpoint. Successful integrity reads create a bounded VERIFY_AUDIT_INTEGRITY audit event.
      security:
        - bearerAuth: []
        - demoAuth: []
      parameters:
        - name: from
          in: query
          required: false
          description: Inclusive ISO-8601 lower timestamp bound.
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          description: Inclusive ISO-8601 upper timestamp bound.
          schema:
            type: string
            format: date-time
        - name: source_service
          in: query
          required: false
          description: Optional bounded source-service chain scope.
          schema:
            type: string
            enum: [alert-service]
        - name: mode
          in: query
          required: false
          description: Verification mode. Defaults to HEAD unless from/to is supplied, in which case default is WINDOW.
          schema:
            type: string
            enum: [HEAD, WINDOW, FULL_CHAIN]
            default: HEAD
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 10000
            default: 100
      responses:
        "200":
          description: Bounded audit integrity verification result or unavailable store status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditIntegrityResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/audit/integrity/external:
    get:
      summary: Verify external audit anchor consistency
      description: Performs bounded read-only comparison between the local audit chain anchor and the external anchor. Requires audit:verify. Returns VALID, INVALID, PARTIAL, UNAVAILABLE, or CONFLICT. PUBLISHED means the anchor object was written to the external witness and verified by read-back at publication time; future witness availability is not guaranteed. LOCAL_STATUS_UNVERIFIED means external publication/read-back may have succeeded but local publication-status persistence failed and must not be counted as clean local PUBLISHED until recovered. Object-store sinks can verify by exact partition_key + chain_position lookup using the deterministic encoded object key before falling back to latest-anchor comparison. Latest object-store HEAD detection first verifies the optional External Head Manifest at head.json by manifest_hash and by reading the referenced anchor; the manifest is navigation metadata, not evidence. Invalid or missing manifests are not trusted and fall back to full paginated scan. Full scan requires continuation-token pagination and consumes every page; if listing may be truncated and pagination is unavailable, verification returns a degraded UNAVAILABLE state rather than reporting VALID from a best-effort HEAD. Detects missing, stale, ahead, mismatched hash, mismatched local anchor id, mismatched object key binding, mismatched payload hash binding, mismatched anchor id/version, mismatched hash algorithm, unsupported external schema version, incompatible same-position witness records, and external payload tampering. Response includes external_immutability_level and durability_guarantee; NONE, CONFIGURED, or WITNESS_RETENTION is not a fake WORM/legal proof. verified_at is application read-back time, not external timestamp proof; timestamp_value is witness metadata when available. This endpoint does not repair data, mutate audit records, export full history, or provide WORM/legal notarization. Real S3/GCS/Azure object-store adapters remain future deployment work.
      security:
        - bearerAuth: []
        - demoAuth: []
      parameters:
        - name: source_service
          in: query
          required: false
          description: Optional bounded source-service chain scope.
          schema:
            type: string
            enum: [alert-service]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
      responses:
        "200":
          description: External anchor verification result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalAuditIntegrityResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/audit/integrity/external/coverage:
    get:
      summary: Inspect bounded external anchor coverage
      description: Returns bounded external anchor coverage for the local audit chain head or from a supplied from_position. Per-position state comes from the publication-status repository, not one external object read per position. Requests are protected by Redis-backed per-principal or per-IP request-cost limiting. Clients must treat missing_ranges, truncated, local_ahead_of_external, required_publication_failures, local_status_unverified, and unrecovered_count as operational evidence gaps. This endpoint is read-only, bounded, and does not export audit events or repair anchors.
      security:
        - bearerAuth: []
        - demoAuth: []
      parameters:
        - name: source_service
          in: query
          required: false
          schema:
            type: string
            enum: [alert-service]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 100
        - name: from_position
          in: query
          required: false
          description: Inclusive chain-position start for the bounded coverage window. Defaults to the latest bounded head window.
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "200":
          description: Bounded external anchor coverage result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalAuditAnchorCoverageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/audit/evidence/export:
    get:
      summary: Export bounded audit evidence
      description: Returns a bounded JSON evidence package for a required source_service and inclusive from/to window. Requires audit:export. Includes safe audit event summaries, event hashes, previous hashes, chain positions, local anchor references, external anchor references when available, signature metadata when available, external_anchor_status, anchor_coverage, and export_fingerprint. Clients must treat status=PARTIAL as an incomplete evidence package. strict=true rejects partial packages with 409 and does not return event data. Repeated export attempts are softly rate-limited per authenticated actor per service instance and return 429 on exceed. Multi-instance deployments require API gateway or shared infrastructure rate limiting. It never returns raw payloads, tokens, stack traces, transaction payloads, customer/account/card identifiers, or advisory note bodies. No unbounded export, full-text search, delete, update, cursor pagination, or aggregation is provided.
      security:
        - bearerAuth: []
        - demoAuth: []
      parameters:
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: source_service
          in: query
          required: true
          schema:
            type: string
            enum: [alert-service]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
        - name: strict
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: When true, PARTIAL evidence packages are rejected with 409 instead of returning partial event summaries.
      responses:
        "200":
          description: Bounded audit evidence export or unavailable local audit store status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditEvidenceExportResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Strict evidence export rejected a partial evidence package.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "429":
          description: Soft per-actor evidence export rate limit exceeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /api/v1/audit/trust/attestation:
    get:
      summary: Get derived audit trust attestation
      description: Returns a bounded derived trust assessment over FDP-19 internal integrity and FDP-20 external anchor verification signals. Requires audit:verify and records READ_AUDIT_TRUST_ATTESTATION with bounded metadata. The attestation fingerprint includes source_service, limit, mode, signer_mode, signature_key_id when present, trust status fields, external_immutability_level, anchor coverage, latest chain fields, external anchor reference, and limitations so it can be reproduced externally. Clients must interpret trust_level together with attestation_signature_strength, external anchor signature_status, external integrity signature_verification_status, and external_immutability_level. SIGNED_BY_LOCAL_AUTHORITY requires signature_verification_status=VALID for external-anchor signature metadata from a separate local authority; stored signature fields alone never upgrade trust. SIGNED_ATTESTATION represents stronger trust only when attestation_signature_strength=PRODUCTION_READY, signer_mode is backed by externally managed KMS/HSM signing material, and external_immutability_level=ENFORCED. This endpoint does not implement a second external verification stack, a second evidence export, an external anchor sink, legal notarization, legal non-repudiation, regulator-certified archive, WORM storage, SIEM integration, or KMS/HSM signing unless explicitly integrated. Local-dev signing provides integrity metadata only and never upgrades trust level.
      security:
        - bearerAuth: []
        - demoAuth: []
      parameters:
        - name: source_service
          in: query
          required: false
          description: Optional bounded source-service chain scope.
          schema:
            type: string
            enum: [alert-service]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
        - name: mode
          in: query
          required: false
          schema:
            type: string
            enum: [HEAD]
            default: HEAD
      responses:
        "200":
          description: Bounded audit trust attestation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditTrustAttestationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /api/v1/audit/trust/keys:
    get:
      summary: Export audit trust public verification keys
      description: Returns bounded public verification key metadata from the configured audit trust authority. Requires audit:verify. This endpoint never returns private keys and does not claim KMS/HSM, legal notarization, WORM, SIEM, or certified archive trust. Clients use these keys for local/offline signature verification only.
      security:
        - bearerAuth: []
        - demoAuth: []
      responses:
        "200":
          description: Bounded public verification keys returned.
          content:
            application/json:
              schema:
                type: array
                maxItems: 20
                items:
                  $ref: "#/components/schemas/AuditTrustAuthorityKey"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /system/trust-level:
    get:
      summary: Get deployment trust posture
      description: Requires audit:verify. Returns bounded live deployment posture for external audit anchoring. BEST_EFFORT and FDP24_DEGRADED must not be marketed as FDP-24 healthy fail-closed mode. SIGNED_EXTERNAL means trust-authority signing is enabled and required; it is not WORM, notarization, SIEM, mTLS, or legal trust. FDP24_HEALTHY requires zero unresolved degradations, zero pending degradation resolutions, zero unknown outbox confirmations, zero pending outbox resolutions, and zero terminal outbox failures.
      security:
        - bearerAuth: []
        - demoAuth: []
      responses:
        "200":
          description: Deployment trust posture returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemTrustLevelResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/audit/degradations:
    get:
      summary: List unresolved audit degradation events
      description: Requires audit:verify. Returns a bounded operator list of unresolved durable audit degradation events. This is an operational workflow, not an audit event export.
      security:
        - bearerAuth: []
        - demoAuth: []
      responses:
        "200":
          description: Unresolved degradation events returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditDegradationListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/audit/degradations/{auditId}/resolve:
    post:
      summary: Resolve audit degradation event
      description: Requires audit-degradation:resolve. Records ATTEMPTED before mutation, SUCCESS after mutation, and FAILED on update failure. In bank fail-closed mode, structured evidence is mandatory and resolution is dual-control: first request marks resolution_pending, second distinct actor approves. A post-commit success-audit failure returns committed-incomplete and records durable degradation instead of pretending the resolution is fully evidenced.
      security:
        - bearerAuth: []
        - demoAuth: []
      parameters:
        - name: auditId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 160
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveAuditDegradationRequest"
      responses:
        "200":
          description: Degradation event resolved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditDegradationEvent"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/decision-outbox/unknown-confirmations:
    get:
      summary: List decision outbox unknown confirmations
      description: Requires audit:verify. Returns bounded PUBLISH_CONFIRMATION_UNKNOWN outbox rows for manual reconciliation. It never returns decision payloads, customer data, transaction payloads, or response bodies.
      security:
        - bearerAuth: []
        - demoAuth: []
      responses:
        "200":
          description: Unknown confirmations returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnknownConfirmationsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/decision-outbox/unknown-confirmations/{alertId}/resolve:
    post:
      summary: Resolve decision outbox unknown confirmation
      description: Requires decision-outbox:reconcile. Resolves PUBLISH_CONFIRMATION_UNKNOWN as PUBLISHED or RETRY_REQUESTED with a mandatory reason. PUBLISHED requires BROKER_OFFSET evidence or equivalent broker confirmation. In bank fail-closed mode, structured evidence is mandatory and resolution is dual-control. RETRY_REQUESTED reuses the same eventId and dedupeKey; there is no blind automatic retry.
      security:
        - bearerAuth: []
        - demoAuth: []
      parameters:
        - name: alertId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 160
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveOutboxConfirmationRequest"
      responses:
        "200":
          description: Unknown confirmation resolved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnknownConfirmation"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/v1/alerts/{alertId}:
    get:
      summary: Get one alert
      description: Returns one alert for an authenticated analyst. Alert-service records a best-effort sensitive read-access audit event with backend-derived actor identity and bounded metadata only; audit persistence failure does not block the read response.
      security:
        - bearerAuth: []
        - demoAuth: []
      parameters:
        - name: alertId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 160
      responses:
        "200":
          description: Alert details returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObject"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/alerts/{alertId}/decision:
    post:
      summary: Submit analyst decision
      description: Records an analyst decision through the FDP-25 Phase 1 regulated mutation coordinator. X-Idempotency-Key is required. The coordinator stores a regulated mutation command, atomically claims execution with a bounded lease, writes ATTEMPTED audit before business mutation, persists the business decision plus durable same-document outbox, then writes SUCCESS audit before returning COMMITTED_EVIDENCE_PENDING. The same idempotency key and request body replay the stored response snapshot; the same key with a different body returns 409; a missing key returns 400. Kafka publication is asynchronous from the durable outbox and at-least-once unless consumers dedupe by event id. FraudDecisionEvent carries delivery=AT_LEAST_ONCE and dedupeKey=eventId. operation_status is mandatory: REJECTED_BEFORE_MUTATION maps to HTTP 503 with no command response body; IN_PROGRESS, RECOVERY_REQUIRED, and COMMIT_UNKNOWN map to HTTP 202; COMMITTED_EVIDENCE_PENDING means local SUCCESS audit was recorded and external evidence promotion remains pending; COMMITTED_EVIDENCE_INCOMPLETE means the business decision and outbox committed but local success audit/evidence completion degraded. FDP-25 Phase 1 is not distributed ACID across MongoDB, external witnesses, and Kafka and does not transactionally eliminate post-commit audit degradation. COMMITTED_FULLY_ANCHORED is async-only and is not exposed by this synchronous request path.
      security:
        - bearerAuth: []
        - demoAuth: []
      parameters:
        - name: alertId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 160
          - name: X-Idempotency-Key
            in: header
            required: true
            schema:
              type: string
            minLength: 1
            maxLength: 160
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitAnalystDecisionRequest"
      responses:
        "200":
          description: Decision request reached a stable operation state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitAnalystDecisionResponse"
        "202":
          description: Decision command is accepted but still processing, requires recovery, or has an uncertain commit window.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitAnalystDecisionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Idempotency key was reused with a different payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "503":
          description: Required audit persistence or evidence precondition failed before command success could be reported; mutation was not executed for pre-mutation failures.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /api/v1/fraud-cases/{caseId}:
    get:
      summary: Get one fraud case
      description: Returns one fraud case for an authenticated analyst. Alert-service records a best-effort sensitive read-access audit event with backend-derived actor identity and bounded metadata only; audit persistence failure does not block the read response.
      security:
        - bearerAuth: []
        - demoAuth: []
      parameters:
        - name: caseId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 160
      responses:
        "200":
          description: Fraud case details returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObject"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/transactions/scored:
    get:
      summary: List scored transaction projections
      description: Returns a bounded scored transaction page for an authenticated analyst. Alert-service records a best-effort sensitive read-access audit event with a hashed query shape, page/size, bounded result count, and backend-derived actor identity; audit persistence failure does not block the read response.
      security:
        - bearerAuth: []
        - demoAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Scored transaction page returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedGenericObject"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /governance/advisories:
    get:
      summary: List governance advisories with derived lifecycle status
      description: Returns ML advisory events enriched with lifecycle_status derived at read time from latest audit event. Lifecycle is not persisted as source of truth and does not trigger workflow actions. OPEN means audit lookup succeeded and no audit events exist; UNKNOWN means lifecycle cannot be determined because audit lookup failed or audit truth is unavailable. Filtering by lifecycle_status applies to the bounded advisory result set. It does not guarantee global completeness. If lifecycle enrichment is degraded the response status is PARTIAL with reason_code=AUDIT_UNAVAILABLE. Alert-service records a best-effort sensitive read-access audit event with a hashed query shape and bounded metadata only; audit persistence failure does not block the read response.
      security:
        - bearerAuth: []
        - demoAuth: []
      parameters:
        - name: severity
          in: query
          required: false
          schema:
            type: string
            enum: [LOW, MEDIUM, HIGH, CRITICAL]
        - name: model_version
          in: query
          required: false
          schema:
            type: string
            maxLength: 80
            pattern: "^[A-Za-z0-9._-]+$"
        - name: lifecycle_status
          in: query
          required: false
          description: Applied after advisory projection and limited to the bounded advisory result set.
          schema:
            $ref: "#/components/schemas/GovernanceAdvisoryLifecycleStatus"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 100
      responses:
        "200":
          description: Advisory list returned with read-time lifecycle projection.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceAdvisoryListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /governance/advisories/analytics:
    get:
      summary: Get bounded governance advisory audit analytics
      description: Returns read-only analytics for the bounded advisory projection window. The advisory population is the distinct advisory_event_id values returned by the advisory projection in the requested window; audit events are used only to classify that population. UNKNOWN lifecycle is separate and is never counted as OPEN. Analytics are for visibility only; they are not SLA enforcement, do not trigger actions, and are not persisted as source of truth. Alert-service records a best-effort sensitive read-access audit event with bounded metadata only; audit persistence failure does not block the read response.
      security:
        - bearerAuth: []
        - demoAuth: []
      parameters:
        - name: window_days
          in: query
          required: false
          description: Bounded analytics window in days.
          schema:
            type: integer
            minimum: 1
            maximum: 30
            default: 7
      responses:
        "200":
          description: Analytics returned for the bounded window.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceAdvisoryAnalyticsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /governance/advisories/{event_id}:
    get:
      summary: Get one governance advisory with derived lifecycle status
      description: Returns one bounded-history advisory event enriched with lifecycle_status derived at read time from latest audit event. OPEN means audit lookup succeeded and no audit events exist; UNKNOWN means lifecycle cannot be determined. Alert-service records a best-effort sensitive read-access audit event with backend-derived actor identity and bounded metadata only; audit persistence failure does not block the read response.
      security:
        - bearerAuth: []
        - demoAuth: []
      parameters:
        - $ref: "#/components/parameters/EventId"
      responses:
        "200":
          description: Advisory event returned with lifecycle projection.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceAdvisoryEvent"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /governance/advisories/{event_id}/audit:
    get:
      summary: List governance advisory audit history
      description: Returns bounded newest-first human-review audit history for one governance advisory event. Alert-service records a best-effort sensitive read-access audit event with backend-derived actor identity and bounded metadata only; audit persistence failure does not block the read response.
      security:
        - bearerAuth: []
        - demoAuth: []
      parameters:
        - $ref: "#/components/parameters/EventId"
      responses:
        "200":
          description: Audit history returned. Status may be UNAVAILABLE when storage cannot be read.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceAuditHistoryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      summary: Append governance advisory audit event
      description: Records human review only. Does not mutate advisory events, scoring, model behavior, retraining, rollback, or fraud decisions.
      security:
        - bearerAuth: []
        - demoAuth: []
      parameters:
        - $ref: "#/components/parameters/EventId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GovernanceAuditRequest"
            example:
              decision: ACKNOWLEDGED
              note: Reviewed by operator
      responses:
        "201":
          description: Audit event appended.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceAuditEvent"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    demoAuth:
      type: apiKey
      in: header
      name: X-Demo-User-Id
      description: Local/dev demo auth headers; roles are supplied through X-Demo-Roles.
  parameters:
    EventId:
      name: event_id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 120
        pattern: "^[A-Za-z0-9._:-]+$"
  schemas:
    GenericObject:
      type: object
      additionalProperties: true
    SystemTrustLevelResponse:
      type: object
      additionalProperties: false
      required: [guarantee_level, publication_enabled, publication_required, fail_closed, external_anchor_strength, coverage_status, witness_status, signature_policy, required_publication_failures, local_status_unverified, missing_ranges, post_commit_audit_degraded, unresolved_degradation_count, pending_degradation_resolution_count, post_commit_audit_degraded_resolved, outbox_failed_terminal_count, terminal_outbox_failure_count, outbox_publish_confirmation_unknown_count, unknown_outbox_confirmation_count, pending_outbox_resolution_count, outbox_oldest_pending_age_seconds, outbox_oldest_ambiguous_age_seconds]
      properties:
        guarantee_level:
          type: string
          enum: [NONE, BEST_EFFORT, FDP24_CONFIGURED, FDP24_HEALTHY, FDP24_DEGRADED]
        publication_enabled:
          type: boolean
        publication_required:
          type: boolean
        fail_closed:
          type: boolean
        external_anchor_strength:
          type: string
          enum: [NONE, UNSIGNED_EXTERNAL, SIGNED_EXTERNAL]
          description: Signing strength only when live external publication is healthy. This does not provide WORM storage, notarization, SIEM integration, or legal trust.
        coverage_status:
          type: string
          enum: [HEALTHY, DEGRADED, UNAVAILABLE]
        witness_status:
          type: string
          enum: [LIVE_WITNESS_VERIFIED, PROVIDER_CAPABILITY_VERIFIED, DECLARED_CAPABLE, UNAVAILABLE, DISABLED]
          description: PROVIDER_CAPABILITY_VERIFIED requires provider-side capability checks; declared capabilities alone are DECLARED_CAPABLE. LIVE_WITNESS_VERIFIED is reserved for actual live external proof verification.
        signature_policy:
          type: string
          enum: [OPTIONAL, REQUIRED_FOR_TRUST, REQUIRED_FOR_PUBLICATION]
        required_publication_failures:
          type: integer
          minimum: 0
        local_status_unverified:
          type: integer
          minimum: 0
        missing_ranges:
          type: integer
          minimum: 0
        post_commit_audit_degraded:
          type: integer
          format: int64
          minimum: 0
        unresolved_degradation_count:
          type: integer
          format: int64
          minimum: 0
        pending_degradation_resolution_count:
          type: integer
          format: int64
          minimum: 0
        post_commit_audit_degraded_resolved:
          type: integer
          format: int64
          minimum: 0
        outbox_failed_terminal_count:
          type: integer
          format: int64
          minimum: 0
        terminal_outbox_failure_count:
          type: integer
          format: int64
          minimum: 0
        outbox_publish_confirmation_unknown_count:
          type: integer
          format: int64
          minimum: 0
        unknown_outbox_confirmation_count:
          type: integer
          format: int64
          minimum: 0
        pending_outbox_resolution_count:
          type: integer
          format: int64
          minimum: 0
        outbox_oldest_pending_age_seconds:
          type: integer
          format: int64
          nullable: true
          minimum: 0
        outbox_oldest_ambiguous_age_seconds:
          type: integer
          format: int64
          nullable: true
          minimum: 0
        reason_code:
          type: string
          nullable: true
    AuditDegradationListResponse:
      type: object
      additionalProperties: false
      required: [events]
      properties:
        events:
          type: array
          maxItems: 100
          items:
            $ref: "#/components/schemas/AuditDegradationEvent"
    AuditDegradationEvent:
      type: object
      additionalProperties: false
      required: [audit_id, type, resource_type, resource_id, operation, timestamp, resolved, resolution_pending, resolution_requested_at, resolution_requested_by, resolved_at, resolved_by, resolution_reason, resolution_evidence_type, resolution_evidence_reference, resolution_evidence_verified_at, resolution_evidence_verified_by, approved_at, approved_by, approval_reason]
      properties:
        audit_id:
          type: string
        type:
          type: string
        resource_type:
          type: string
        resource_id:
          type: string
          nullable: true
        operation:
          type: string
        timestamp:
          type: string
          format: date-time
        resolved:
          type: boolean
        resolution_pending:
          type: boolean
        resolution_requested_at:
          type: string
          format: date-time
          nullable: true
        resolution_requested_by:
          type: string
          nullable: true
        resolved_at:
          type: string
          format: date-time
          nullable: true
        resolved_by:
          type: string
          nullable: true
        resolution_reason:
          type: string
          nullable: true
          maxLength: 500
        resolution_evidence_type:
          type: string
          nullable: true
          enum: [BROKER_OFFSET, EXTERNAL_ANCHOR_REFERENCE, TICKET, RUNBOOK_STEP, OTHER]
        resolution_evidence_reference:
          type: string
          nullable: true
          maxLength: 500
        resolution_evidence_verified_at:
          type: string
          format: date-time
          nullable: true
        resolution_evidence_verified_by:
          type: string
          nullable: true
        approved_at:
          type: string
          format: date-time
          nullable: true
        approved_by:
          type: string
          nullable: true
        approval_reason:
          type: string
          nullable: true
          maxLength: 500
    ResolveAuditDegradationRequest:
      type: object
      additionalProperties: false
      required: [reason]
      properties:
        reason:
          type: string
          minLength: 1
          maxLength: 500
        evidence_reference:
          nullable: true
          $ref: "#/components/schemas/ResolutionEvidenceReference"
    ResolutionEvidenceReference:
      type: object
      additionalProperties: false
      required: [type, reference, verified_at, verified_by]
      properties:
        type:
          type: string
          enum: [BROKER_OFFSET, EXTERNAL_ANCHOR_REFERENCE, TICKET, RUNBOOK_STEP, OTHER]
        reference:
          type: string
          minLength: 1
          maxLength: 500
        verified_at:
          type: string
          format: date-time
        verified_by:
          type: string
          minLength: 1
          maxLength: 120
    UnknownConfirmationsResponse:
      type: object
      additionalProperties: false
      required: [events]
      properties:
        events:
          type: array
          maxItems: 100
          items:
            $ref: "#/components/schemas/UnknownConfirmation"
    UnknownConfirmation:
      type: object
      additionalProperties: false
      required: [alert_id, event_id, dedupe_key, status, decided_at, attempts, last_attempt_at, published_at, failure_reason, resolution_pending, resolution_requested_at, resolution_requested_by, resolution_evidence_type, resolution_evidence_reference, resolution_evidence_verified_at, resolution_evidence_verified_by, resolution_approved_at, resolution_approved_by, resolution_approval_reason]
      properties:
        alert_id:
          type: string
        event_id:
          type: string
          nullable: true
        dedupe_key:
          type: string
          nullable: true
        status:
          type: string
          enum: [PUBLISH_CONFIRMATION_UNKNOWN, PUBLISHED, PENDING]
        decided_at:
          type: string
          format: date-time
          nullable: true
        attempts:
          type: integer
          minimum: 0
        last_attempt_at:
          type: string
          format: date-time
          nullable: true
        published_at:
          type: string
          format: date-time
          nullable: true
        failure_reason:
          type: string
          nullable: true
        resolution_pending:
          type: boolean
        resolution_requested_at:
          type: string
          format: date-time
          nullable: true
        resolution_requested_by:
          type: string
          nullable: true
        resolution_evidence_type:
          type: string
          nullable: true
          enum: [BROKER_OFFSET, EXTERNAL_ANCHOR_REFERENCE, TICKET, RUNBOOK_STEP, OTHER]
        resolution_evidence_reference:
          type: string
          nullable: true
          maxLength: 500
        resolution_evidence_verified_at:
          type: string
          format: date-time
          nullable: true
        resolution_evidence_verified_by:
          type: string
          nullable: true
        resolution_approved_at:
          type: string
          format: date-time
          nullable: true
        resolution_approved_by:
          type: string
          nullable: true
        resolution_approval_reason:
          type: string
          nullable: true
          maxLength: 500
    ResolveOutboxConfirmationRequest:
      type: object
      additionalProperties: false
      required: [resolution, reason]
      properties:
        resolution:
          type: string
          enum: [PUBLISHED, RETRY_REQUESTED]
        reason:
          type: string
          minLength: 1
          maxLength: 500
        evidence_reference:
          nullable: true
          $ref: "#/components/schemas/ResolutionEvidenceReference"
    SubmitAnalystDecisionRequest:
      type: object
      additionalProperties: false
      required: [analystId, decision, decisionReason, tags, decisionMetadata]
      properties:
        analystId:
          type: string
          minLength: 1
          maxLength: 120
          description: Submitted analyst id; backend actor resolution remains authoritative.
        decision:
          type: string
          enum: [CONFIRMED_FRAUD, FALSE_POSITIVE, NEEDS_MORE_REVIEW]
        decisionReason:
          type: string
          minLength: 1
          maxLength: 1000
        tags:
          type: array
          maxItems: 20
          items:
            type: string
            maxLength: 80
        decisionMetadata:
          type: object
          additionalProperties: true
    SubmitAnalystDecisionResponse:
      type: object
      additionalProperties: false
      required: [alertId, decision, resultingStatus, decisionEventId, decidedAt, operation_status]
      properties:
        alertId:
          type: string
        decision:
          type: string
          enum: [CONFIRMED_FRAUD, FALSE_POSITIVE, NEEDS_MORE_REVIEW]
        resultingStatus:
          type: string
          enum: [OPEN, IN_REVIEW, RESOLVED]
        decisionEventId:
          type: string
          nullable: true
        decidedAt:
          type: string
          format: date-time
          nullable: true
        operation_status:
          type: string
          enum: [REJECTED_BEFORE_MUTATION, IN_PROGRESS, RECOVERY_REQUIRED, COMMIT_UNKNOWN, COMMITTED_EVIDENCE_PENDING, COMMITTED_EVIDENCE_INCOMPLETE]
          description: Mandatory operation state. REJECTED_BEFORE_MUTATION is returned as HTTP 503 with no command response body. IN_PROGRESS, RECOVERY_REQUIRED, and COMMIT_UNKNOWN are returned as HTTP 202 and must not be treated as completed success. COMMITTED_EVIDENCE_PENDING is conservative state before full evidence completion is persisted. COMMITTED_EVIDENCE_INCOMPLETE means the business decision and durable outbox committed while post-commit evidence completion degraded. This is not a rollback claim. COMMITTED_FULLY_ANCHORED is intentionally not exposed until a safe promotion path exists.
    PagedGenericObject:
      type: object
      required:
        - content
        - page
        - size
        - totalElements
        - totalPages
      additionalProperties: true
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/GenericObject"
        page:
          type: integer
          minimum: 0
        size:
          type: integer
          minimum: 1
        totalElements:
          type: integer
          minimum: 0
        totalPages:
          type: integer
          minimum: 0
    AuditEventReadResponse:
      type: object
      additionalProperties: false
      required:
        - status
        - count
        - limit
        - events
      properties:
        status:
          type: string
          enum: [AVAILABLE, UNAVAILABLE]
        reason_code:
          type: string
          nullable: true
          description: Null when status is AVAILABLE. When status is UNAVAILABLE, this is AUDIT_STORE_UNAVAILABLE.
          enum: [AUDIT_STORE_UNAVAILABLE]
        message:
          type: string
          nullable: true
          description: Null when status is AVAILABLE. When status is UNAVAILABLE, this is a stable non-sensitive reason message.
          maxLength: 120
        count:
          type: integer
          minimum: 0
        limit:
          type: integer
          minimum: 1
          maximum: 100
        events:
          type: array
          items:
            $ref: "#/components/schemas/AuditEvent"
    AuditEvent:
      type: object
      additionalProperties: false
      required:
        - audit_event_id
        - event_type
        - actor_id
        - actor_display_name
        - actor_roles
        - actor_type
        - resource_type
        - resource_id
        - action
        - outcome
        - occurred_at
        - correlation_id
        - source_service
        - partition_key
        - chain_position
        - request_id
        - metadata_summary
        - previous_event_hash
        - event_hash
        - hash_algorithm
        - schema_version
        - compensated
        - superseded_by_event_id
        - business_effective
        - business_effective_status
        - audit_evidence_status
        - external_anchor_status
        - compensation_type
        - related_event_id
      properties:
        audit_event_id:
          type: string
        event_type:
          type: string
          enum: [SUBMIT_ANALYST_DECISION, UPDATE_FRAUD_CASE, READ_AUDIT_EVENTS, VERIFY_AUDIT_INTEGRITY, VERIFY_EXTERNAL_AUDIT_INTEGRITY, EXPORT_AUDIT_EVIDENCE, EXTERNAL_ANCHOR_REQUIRED_FAILED]
        actor_id:
          type: string
          description: Backend-derived authenticated actor identity.
        actor_display_name:
          type: string
        actor_roles:
          type: array
          items:
            type: string
        actor_type:
          type: string
          enum: [HUMAN]
        resource_type:
          type: string
          enum: [ALERT, FRAUD_CASE, AUDIT_EVENT, AUDIT_INTEGRITY, AUDIT_EXTERNAL_INTEGRITY, AUDIT_EVIDENCE_EXPORT]
        resource_id:
          type: string
          nullable: true
        action:
          type: string
          enum: [SUBMIT_ANALYST_DECISION, UPDATE_FRAUD_CASE, READ_AUDIT_EVENTS, VERIFY_AUDIT_INTEGRITY, VERIFY_EXTERNAL_AUDIT_INTEGRITY, EXPORT_AUDIT_EVIDENCE, EXTERNAL_ANCHOR_REQUIRED_FAILED]
        outcome:
          type: string
          enum: [ATTEMPTED, SUCCESS, REJECTED, FAILED, ABORTED_EXTERNAL_ANCHOR_REQUIRED]
        occurred_at:
          type: string
          format: date-time
        correlation_id:
          type: string
          nullable: true
          maxLength: 120
        source_service:
          type: string
          enum: [alert-service]
        partition_key:
          type: string
          enum: ["source_service:alert-service"]
          description: Partition used for previous_event_hash continuity.
        chain_position:
          type: integer
          format: int64
          nullable: true
          minimum: 1
          description: Unique per-partition chain position for FDP-19 audit records; null only for immutable legacy local records created before chain positions existed.
        request_id:
          type: string
          nullable: true
          maxLength: 120
        metadata_summary:
          $ref: "#/components/schemas/AuditEventMetadataSummary"
        previous_event_hash:
          type: string
          nullable: true
          description: Previous event hash within the source_service-scoped audit chain.
        event_hash:
          type: string
          description: SHA-256 canonical hash of immutable audit event fields excluding event_hash itself.
        hash_algorithm:
          type: string
          enum: [SHA-256]
        schema_version:
          type: string
          enum: ["1.0"]
        compensated:
          type: boolean
          description: True when this event was superseded by a later compensating audit event. Compensation enrichment uses a bounded lookup for returned audit ids and is not limited to events present in the current page.
        superseded_by_event_id:
          type: string
          nullable: true
          description: Audit event id of the compensating event when compensated=true.
        business_effective:
          type: boolean
          description: Backward-compatible boolean derived from business_effective_status. External anchor compensation after a committed SUCCESS does not make this false.
        business_effective_status:
          type: string
          enum: [TRUE, FALSE, UNKNOWN]
          description: Authoritative business truth. TRUE means the business write succeeded; FALSE means it did not happen; UNKNOWN is reserved for cases where the audit record cannot prove business state.
        audit_evidence_status:
          type: string
          enum: [EXTERNALLY_ANCHORED, LOCAL_ONLY, ANCHOR_REQUIRED_FAILED, UNAVAILABLE, COMPENSATED]
          description: Audit proof state. ANCHOR_REQUIRED_FAILED means the business event may be real while external proof failed.
        external_anchor_status:
          type: string
          enum: [PUBLISHED, UNVERIFIED, FAILED, MISSING, CONFLICT, LOCAL_STATUS_UNVERIFIED, UNKNOWN]
          description: Per-event external anchor interpretation. Audit read without anchor lookup uses LOCAL_STATUS_UNVERIFIED unless a required anchor failure compensation is known.
        compensation_type:
          type: string
          enum: [EXTERNAL_ANCHOR_FAILURE, BUSINESS_WRITE_FAILURE, MANUAL_REVERSAL, UNKNOWN]
          description: Compensation reason. EXTERNAL_ANCHOR_FAILURE is evidence compensation only and is not a business rollback.
        related_event_id:
          type: string
          nullable: true
          description: For compensation events, the audit event id being compensated.
    AuditEventMetadataSummary:
      type: object
      additionalProperties: false
      description: Bounded safe metadata summary. Does not include raw payloads, feature vectors, tokens, secrets, stack traces, or customer/account/card data.
      required:
        - correlation_id
        - request_id
        - source_service
        - schema_version
        - failure_category
        - failure_reason
        - endpoint_action
        - filters_summary
        - count_returned
        - from
        - to
        - limit
        - returned_count
        - export_status
        - reason_code
        - external_anchor_status
        - anchor_coverage
        - export_fingerprint
        - trust_level
        - internal_integrity_status
        - external_integrity_status
        - attestation_fingerprint
      properties:
        correlation_id:
          type: string
          nullable: true
          maxLength: 120
        request_id:
          type: string
          nullable: true
          maxLength: 120
        source_service:
          type: string
          nullable: true
          enum: [alert-service]
        schema_version:
          type: string
          nullable: true
          enum: ["1.0"]
        failure_category:
          type: string
          nullable: true
          enum: [NONE, VALIDATION, AUTHORIZATION, DEPENDENCY, CONFLICT, UNKNOWN]
        failure_reason:
          type: string
          nullable: true
          maxLength: 120
        endpoint_action:
          type: string
          nullable: true
          maxLength: 120
        filters_summary:
          type: string
          nullable: true
          maxLength: 120
        count_returned:
          type: integer
          nullable: true
          minimum: 0
          maximum: 10000
        from:
          type: string
          nullable: true
          maxLength: 120
        to:
          type: string
          nullable: true
          maxLength: 120
        limit:
          type: integer
          nullable: true
          minimum: 0
          maximum: 500
        returned_count:
          type: integer
          nullable: true
          minimum: 0
          maximum: 500
        export_status:
          type: string
          nullable: true
          enum: [AVAILABLE, PARTIAL, UNAVAILABLE, RATE_LIMITED, REJECTED_STRICT_MODE]
        reason_code:
          type: string
          nullable: true
          maxLength: 120
        external_anchor_status:
          type: string
          nullable: true
          enum: [AVAILABLE, PARTIAL, UNAVAILABLE, DISABLED, VALID, MISSING, STALE, INVALID]
        anchor_coverage:
          nullable: true
          $ref: "#/components/schemas/AuditEvidenceExportAnchorCoverage"
        export_fingerprint:
          type: string
          nullable: true
          minLength: 64
          maxLength: 64
        trust_level:
          type: string
          nullable: true
          enum: [INTERNAL_ONLY, PARTIAL_EXTERNAL, EXTERNALLY_ANCHORED, SIGNED_ATTESTATION, UNAVAILABLE]
        internal_integrity_status:
          type: string
          nullable: true
          enum: [VALID, INVALID, PARTIAL, UNAVAILABLE]
        external_integrity_status:
          type: string
          nullable: true
          enum: [VALID, INVALID, PARTIAL, UNAVAILABLE]
        attestation_fingerprint:
          type: string
          nullable: true
          minLength: 64
          maxLength: 64
    AuditIntegrityResponse:
      type: object
      additionalProperties: false
      required:
        - status
        - checked
        - limit
        - verification_mode
        - partial_window
        - external_predecessor
        - window_start_has_external_predecessor
        - violations
      properties:
        status:
          type: string
          enum: [VALID, INVALID, PARTIAL, UNAVAILABLE]
        checked:
          type: integer
          minimum: 0
        limit:
          type: integer
          minimum: 1
          maximum: 10000
        verification_mode:
          type: string
          nullable: true
          enum: [HEAD, WINDOW, FULL_CHAIN]
        partial_window:
          type: boolean
        external_predecessor:
          type: boolean
        window_start_has_external_predecessor:
          type: boolean
        reason_code:
          type: string
          nullable: true
          enum: [AUDIT_STORE_UNAVAILABLE, INTEGRITY_VERIFICATION_TIME_BUDGET_EXCEEDED]
        message:
          type: string
          nullable: true
          maxLength: 120
        first_event_hash:
          type: string
          nullable: true
        last_event_hash:
          type: string
          nullable: true
        partition_key:
          type: string
          nullable: true
          enum: ["source_service:alert-service"]
        last_anchor_hash:
          type: string
          nullable: true
        violations:
          type: array
          items:
            $ref: "#/components/schemas/AuditIntegrityViolation"
    AuditIntegrityViolation:
      type: object
      additionalProperties: false
      required:
        - violation_type
        - position
        - reason_code
      properties:
        violation_type:
          type: string
          enum: [EVENT_HASH_MISMATCH, PREVIOUS_HASH_MISMATCH, INVALID_SCHEMA_VERSION, UNSUPPORTED_HASH_ALGORITHM, ANCHOR_MISSING, ANCHOR_HASH_MISMATCH, ANCHOR_CHAIN_POSITION_MISMATCH, MISSING_PREDECESSOR, CHAIN_FORK_DETECTED, CHAIN_POSITION_INVALID, CHAIN_POSITION_DUPLICATE, CHAIN_POSITION_GAP, EXTERNAL_ANCHOR_MISSING, STALE_EXTERNAL_ANCHOR, EXTERNAL_CHAIN_POSITION_AHEAD, EXTERNAL_HASH_MISMATCH, EXTERNAL_CHAIN_POSITION_MISMATCH, EXTERNAL_HASH_ALGORITHM_MISMATCH, EXTERNAL_SCHEMA_VERSION_UNSUPPORTED, EXTERNAL_LOCAL_ANCHOR_ID_MISMATCH, EXTERNAL_ANCHOR_CONFLICT, SIGNATURE_INVALID, SIGNATURE_UNKNOWN_KEY, SIGNATURE_KEY_REVOKED, SIGNATURE_UNSIGNED, SIGNATURE_UNSIGNED_REQUIRED, SIGNATURE_UNAVAILABLE, SIGNATURE_UNAVAILABLE_REQUIRED]
        position:
          type: integer
          minimum: 1
        reason_code:
          type: string
          enum: [EVENT_HASH_MISMATCH, PREVIOUS_HASH_MISMATCH, UNSUPPORTED_SCHEMA_VERSION, UNSUPPORTED_HASH_ALGORITHM, ANCHOR_MISSING, ANCHOR_HASH_MISMATCH, ANCHOR_CHAIN_POSITION_MISMATCH, MISSING_PREDECESSOR, CHAIN_FORK_DETECTED, CHAIN_POSITION_INVALID, CHAIN_POSITION_DUPLICATE, CHAIN_POSITION_GAP, EXTERNAL_ANCHOR_MISSING, STALE_EXTERNAL_ANCHOR, EXTERNAL_CHAIN_POSITION_AHEAD, EXTERNAL_HASH_MISMATCH, EXTERNAL_CHAIN_POSITION_MISMATCH, EXTERNAL_HASH_ALGORITHM_MISMATCH, EXTERNAL_SCHEMA_VERSION_UNSUPPORTED, EXTERNAL_LOCAL_ANCHOR_ID_MISMATCH, EXTERNAL_ANCHOR_CONFLICT, SIGNATURE_INVALID, SIGNATURE_UNKNOWN_KEY, SIGNATURE_KEY_REVOKED, SIGNATURE_UNSIGNED, SIGNATURE_UNSIGNED_REQUIRED, SIGNATURE_UNAVAILABLE, SIGNATURE_UNAVAILABLE_REQUIRED]
    ExternalAuditIntegrityResponse:
      type: object
      additionalProperties: false
      required: [status, integrity_status, trust_level, signature_policy, checked, limit, source_service, partition_key, external_immutability_level, durability_guarantee, timestamp_trust_level, signature_verification_status, violations]
      properties:
        status:
          type: string
          enum: [VALID, INVALID, PARTIAL, UNAVAILABLE, CONFLICT]
          description: Backward-compatible structural integrity status. VALID means structure/hash consistency only, not trusted evidence by itself.
        integrity_status:
          type: string
          enum: [VALID, INVALID, PARTIAL, UNAVAILABLE, CONFLICT]
          description: Structural integrity result. Clients must not interpret this as trust without trust_level and signature_policy.
        trust_level:
          type: string
          enum: [LOCAL_ONLY, EXTERNAL_UNSIGNED, EXTERNAL_SIGNED, EXTERNAL_INDEPENDENTLY_VERIFIED]
          description: EXTERNAL_SIGNED means signature verification succeeded or signed metadata is present. EXTERNAL_INDEPENDENTLY_VERIFIED is reserved for a real independent verifier and is not returned by signature verification alone.
        signature_policy:
          type: string
          enum: [OPTIONAL, REQUIRED_FOR_TRUST, REQUIRED_FOR_PUBLICATION]
        checked:
          type: integer
          minimum: 0
        limit:
          type: integer
          minimum: 1
          maximum: 100
        source_service:
          type: string
          enum: [alert-service]
        partition_key:
          type: string
          enum: ["source_service:alert-service"]
        reason_code:
          type: string
          nullable: true
          enum: [AUDIT_STORE_UNAVAILABLE, EXTERNAL_ANCHOR_STORE_UNAVAILABLE, EXTERNAL_ANCHOR_MISSING, STALE_EXTERNAL_ANCHOR, HEAD_SCAN_PAGINATION_UNSUPPORTED, HEAD_SCAN_LIMIT_EXCEEDED, CONFLICT, EXTERNAL_ANCHOR_ID_MISMATCH, EXTERNAL_ANCHOR_ID_VERSION_UNSUPPORTED, EXTERNAL_PAYLOAD_HASH_MISMATCH, EXTERNAL_OBJECT_KEY_MISMATCH, SIGNATURE_INVALID, SIGNATURE_UNKNOWN_KEY, SIGNATURE_KEY_REVOKED, SIGNATURE_UNSIGNED, SIGNATURE_UNSIGNED_REQUIRED, SIGNATURE_UNAVAILABLE, SIGNATURE_UNAVAILABLE_REQUIRED]
        message:
          type: string
          nullable: true
          maxLength: 160
        local_anchor:
          nullable: true
          $ref: "#/components/schemas/AuditAnchorSummary"
        external_anchor:
          nullable: true
          $ref: "#/components/schemas/AuditAnchorSummary"
        external_immutability_level:
          $ref: "#/components/schemas/ExternalImmutabilityLevel"
        durability_guarantee:
          type: string
          enum: [NONE, WITNESS_RETENTION, WORM, LEDGER]
          description: Declared durability class from verified witness capabilities. WITNESS_RETENTION is operational retention, not a legal WORM claim.
        timestamp_trust_level:
          type: string
          enum: [WEAK, MEDIUM, STRONG, CRYPTOGRAPHIC]
          description: Timestamp interpretation for external references. APP_OBSERVED is not proof; storage/signed/ledger timestamps are progressively stronger signals when backed by the witness capabilities.
        signature_verification_status:
          type: string
          enum: [VALID, INVALID, UNAVAILABLE, UNKNOWN_KEY, KEY_REVOKED, UNSIGNED]
          description: Verification status produced by the trust authority over stored signature metadata. If trust authority verification is enabled, UNSIGNED or UNAVAILABLE cannot report VALID external integrity; they downgrade to PARTIAL unless signing is required, where they become INVALID. SIGNED_BY_LOCAL_AUTHORITY requires VALID; stored signature fields alone do not upgrade trust.
        signing_key_id:
          type: string
          nullable: true
          description: Bounded signing key identifier from verified signature metadata when present.
        signing_algorithm:
          type: string
          nullable: true
          enum: [Ed25519]
        signing_authority:
          type: string
          nullable: true
        signature_reason_code:
          type: string
          nullable: true
          enum: [SIGNATURE_INVALID, SIGNATURE_UNKNOWN_KEY, SIGNATURE_KEY_REVOKED, SIGNATURE_UNAVAILABLE, SIGNATURE_UNSIGNED, SIGNATURE_UNSIGNED_REQUIRED, SIGNATURE_UNAVAILABLE_REQUIRED, AUDIT_STORE_UNAVAILABLE, EXTERNAL_ANCHOR_STORE_UNAVAILABLE, CONFLICT]
        conflicting_hashes:
          type: array
          items:
            type: string
          description: Present only when status=CONFLICT. Contains bounded incompatible event hashes observed for the same chain position.
        witness_sources:
          type: array
          items:
            type: string
          description: Present only when status=CONFLICT. Contains bounded witness/source labels for incompatible anchors.
        violations:
          type: array
          items:
            $ref: "#/components/schemas/AuditIntegrityViolation"
    ExternalAuditAnchorCoverageResponse:
      type: object
      additionalProperties: false
      required: [status, latest_local_position, latest_external_position, position_lag, missing_ranges, truncated, limit, coverage_status, max_position_lag, max_missing_ranges, local_ahead_of_external, required_publication_failures, local_status_unverified, recovered_count, unrecovered_count]
      properties:
        status:
          type: string
          enum: [AVAILABLE, UNAVAILABLE]
        latest_local_position:
          type: integer
          format: int64
          minimum: 0
        latest_external_position:
          type: integer
          format: int64
          minimum: 0
        position_lag:
          type: integer
          format: int64
          minimum: 0
        time_lag_seconds:
          type: integer
          format: int64
          nullable: true
          minimum: 0
        missing_ranges:
          type: array
          maxItems: 50
          items:
            $ref: "#/components/schemas/ExternalAuditAnchorMissingRange"
        truncated:
          type: boolean
          description: True when the bounded coverage window cannot represent all local positions or all missing ranges.
        limit:
          type: integer
          minimum: 1
          maximum: 100
        reason_code:
          type: string
          nullable: true
          enum: [AUDIT_STORE_UNAVAILABLE, EXTERNAL_ANCHOR_STORE_UNAVAILABLE, HEAD_SCAN_PAGINATION_UNSUPPORTED, HEAD_SCAN_LIMIT_EXCEEDED, CONFLICT]
        message:
          type: string
          nullable: true
          maxLength: 160
        coverage_status:
          type: string
          enum: [HEALTHY, DEGRADED]
          description: HEALTHY means the bounded coverage window is complete within configured thresholds; DEGRADED means lag, gaps, truncation, required publication failures, unrecovered status gaps, or unavailable evidence must be investigated.
        max_position_lag:
          type: integer
          format: int64
          minimum: 0
        max_time_lag_seconds:
          type: integer
          format: int64
          nullable: true
          minimum: 0
        max_missing_ranges:
          type: integer
          minimum: 0
        local_ahead_of_external:
          type: boolean
          description: True when the latest local anchor position is ahead of the latest verified external anchor position.
        required_publication_failures:
          type: integer
          minimum: 0
          description: Count of bounded-window local anchors whose required external publication failed after the local anchor was created.
        local_status_unverified:
          type: integer
          minimum: 0
          description: Count of bounded-window local anchors with missing or unverified durable publication status.
        recovered_count:
          type: integer
          minimum: 0
          description: Count of bounded-window local publication statuses recovered by reconciliation.
        unrecovered_count:
          type: integer
          minimum: 0
          description: Count of bounded-window local anchors that still need operator recovery or external witness investigation.
    ExternalAuditAnchorMissingRange:
      type: object
      additionalProperties: false
      required: [from_chain_position, to_chain_position]
      properties:
        from_chain_position:
          type: integer
          format: int64
          minimum: 1
        to_chain_position:
          type: integer
          format: int64
          minimum: 1
    AuditEvidenceExportResponse:
      type: object
      additionalProperties: false
      required: [status, count, limit, source_service, from, to, external_anchor_status, anchor_coverage, partial_chain_range, events]
      properties:
        status:
          type: string
          enum: [AVAILABLE, PARTIAL, UNAVAILABLE]
          description: AVAILABLE means local events, local anchors, and external anchors were available. PARTIAL means the export is incomplete as an evidence package.
        count:
          type: integer
          minimum: 0
        limit:
          type: integer
          minimum: 1
          maximum: 500
        source_service:
          type: string
          enum: [alert-service]
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time
        reason_code:
          type: string
          nullable: true
          enum:
            - EXTERNAL_ANCHORS_UNAVAILABLE
            - EXTERNAL_ANCHOR_GAPS
            - INTERNAL_ERROR
        message:
          type: string
          nullable: true
          maxLength: 160
        external_anchor_status:
          type: string
          enum: [AVAILABLE, PARTIAL, UNAVAILABLE, DISABLED]
        anchor_coverage:
          $ref: "#/components/schemas/AuditEvidenceExportAnchorCoverage"
        export_fingerprint:
          type: string
          nullable: true
          minLength: 64
          maxLength: 64
          description: SHA-256 over canonical export query/result identifiers, anchor coverage, and exported chain-range boundary fields. Unavailable local store responses may omit it.
        chain_range_start:
          type: integer
          format: int64
          nullable: true
          minimum: 1
          description: First exported chain position when events are present.
        chain_range_end:
          type: integer
          format: int64
          nullable: true
          minimum: 1
          description: Last exported chain position when events are present.
        predecessor_hash:
          type: string
          nullable: true
          minLength: 64
          maxLength: 64
          description: Previous event hash for partial chain ranges that start after position 1. Offline verifiers must require this boundary proof for partial ranges.
        partial_chain_range:
          type: boolean
          description: True when the exported event range does not start at the genesis chain position and must be interpreted with predecessor_hash boundary proof.
        events:
          type: array
          items:
            $ref: "#/components/schemas/AuditEvidenceExportEvent"
    AuditEvidenceExportAnchorCoverage:
      type: object
      additionalProperties: false
      required:
        - total_events
        - events_with_local_anchor
        - events_with_external_anchor
        - events_missing_external_anchor
        - coverage_ratio
      properties:
        total_events:
          type: integer
          minimum: 0
        events_with_local_anchor:
          type: integer
          minimum: 0
        events_with_external_anchor:
          type: integer
          minimum: 0
        events_missing_external_anchor:
          type: integer
          minimum: 0
        coverage_ratio:
          type: number
          format: double
          minimum: 0
          maximum: 1
    AuditEvidenceExportEvent:
      type: object
      additionalProperties: false
      required: [audit_event_id, event_type, actor_id, actor_roles, resource_type, action, outcome, occurred_at, metadata_summary, event_hash, chain_position, compensated, superseded_by_event_id, business_effective, business_effective_status, audit_evidence_status, external_anchor_status, trust_level, integrity_status, signature_policy, signature_status, evidence_source, confidence, compensation_type, related_event_id]
      properties:
        audit_event_id:
          type: string
        event_type:
          type: string
        actor_id:
          type: string
        actor_roles:
          type: array
          items:
            type: string
        resource_type:
          type: string
        resource_id:
          type: string
          nullable: true
        action:
          type: string
        outcome:
          type: string
          enum: [ATTEMPTED, SUCCESS, REJECTED, FAILED, ABORTED_EXTERNAL_ANCHOR_REQUIRED]
        occurred_at:
          type: string
          format: date-time
        metadata_summary:
          $ref: "#/components/schemas/AuditEventMetadataSummary"
        event_hash:
          type: string
        previous_event_hash:
          type: string
          nullable: true
        chain_position:
          type: integer
          format: int64
          nullable: true
        local_anchor:
          nullable: true
          $ref: "#/components/schemas/AuditEvidenceExportAnchorReference"
        external_anchor:
          nullable: true
          $ref: "#/components/schemas/AuditEvidenceExportAnchorReference"
        compensated:
          type: boolean
          description: True when this event was superseded by a later compensating audit event. Compensation enrichment uses a bounded lookup for returned audit ids and is not limited to events present in the export window.
        superseded_by_event_id:
          type: string
          nullable: true
          description: Audit event id of the compensating event when compensated=true.
        business_effective:
          type: boolean
          description: Backward-compatible boolean derived from business_effective_status. outcome=SUCCESS with audit_evidence_status=ANCHOR_REQUIRED_FAILED is possible and still means the business write happened.
        business_effective_status:
          type: string
          enum: [TRUE, FALSE, UNKNOWN]
          description: Authoritative business truth for the exported event.
        audit_evidence_status:
          type: string
          enum: [EXTERNALLY_ANCHORED, LOCAL_ONLY, ANCHOR_REQUIRED_FAILED, UNAVAILABLE, COMPENSATED]
          description: Audit proof state for the exported event.
        external_anchor_status:
          type: string
          enum: [PUBLISHED, UNVERIFIED, FAILED, MISSING, CONFLICT, LOCAL_STATUS_UNVERIFIED, UNKNOWN]
          description: Per-event external anchor state used by evidence consumers.
        trust_level:
          type: string
          enum: [LOCAL_ONLY, EXTERNAL_UNSIGNED, EXTERNAL_SIGNED, EXTERNAL_INDEPENDENTLY_VERIFIED]
          description: Per-event trust interpretation. Signed or verified values require corresponding signature fields; local-only is not external trust.
        integrity_status:
          type: string
          enum: [VALID, INVALID, PARTIAL, UNAVAILABLE]
          description: Per-event structural integrity interpretation, separate from trust_level.
        signature_policy:
          type: string
          enum: [OPTIONAL, REQUIRED_FOR_TRUST, REQUIRED_FOR_PUBLICATION]
        signature_status:
          type: string
          enum: [UNSIGNED, SIGNED, INVALID, UNAVAILABLE, UNKNOWN_KEY, KEY_REVOKED]
        evidence_source:
          type: string
          enum: [LOCAL_CHAIN, PUBLICATION_STATUS_REPO, EXTERNAL_WITNESS, ARTIFACT_VERIFIER]
        confidence:
          type: string
          enum: [STRUCTURAL_VALID, EXTERNALLY_ANCHORED_UNSIGNED, EXTERNALLY_ANCHORED_SIGNED, INDEPENDENTLY_VERIFIED]
        compensation_type:
          type: string
          enum: [EXTERNAL_ANCHOR_FAILURE, BUSINESS_WRITE_FAILURE, MANUAL_REVERSAL, UNKNOWN]
          description: Compensation reason. EXTERNAL_ANCHOR_FAILURE does not imply business rollback.
        related_event_id:
          type: string
          nullable: true
          description: For compensation events, the audit event id being compensated.
    AuditEvidenceExportAnchorReference:
      type: object
      additionalProperties: false
      required: [chain_position, last_event_hash, hash_algorithm]
      properties:
        anchor_id:
          type: string
          nullable: true
        external_anchor_id:
          type: string
          nullable: true
        anchor_id_version:
          type: integer
          nullable: true
          enum: [1]
        local_anchor_id:
          type: string
          nullable: true
        partition_key:
          type: string
          nullable: true
        chain_position:
          type: integer
          format: int64
          minimum: 1
        last_event_hash:
          type: string
        hash_algorithm:
          type: string
          enum: [SHA-256]
        schema_version:
          type: string
          nullable: true
          enum: ["1.0"]
        sink_type:
          type: string
          nullable: true
          enum: [local-file, object-store]
        external_immutability_level:
          nullable: true
          $ref: "#/components/schemas/ExternalImmutabilityLevel"
        external_key:
          type: string
          nullable: true
          description: Deterministic external object key or local external anchor identifier. It is bounded anchor metadata, not credentials or raw payload.
        external_hash:
          type: string
          nullable: true
          minLength: 64
          maxLength: 64
        publication_status:
          type: string
          nullable: true
          enum: [PUBLISHED, UNVERIFIED, PENDING, FAILED, INVALID, CONFLICT]
        publication_reason:
          type: string
          nullable: true
          enum: [HEAD_MANIFEST_UPDATE_FAILED]
        manifest_status:
          type: string
          nullable: true
          enum: [FAILED]
        signature_status:
          type: string
          nullable: true
          enum: [SIGNED, UNSIGNED, SIGNATURE_UNAVAILABLE, SIGNATURE_FAILED]
        signature:
          type: string
          nullable: true
          description: Bounded asymmetric signature metadata; no private key material.
        signing_key_id:
          type: string
          nullable: true
        signing_algorithm:
          type: string
          nullable: true
          enum: [Ed25519]
        signed_at:
          type: string
          format: date-time
          nullable: true
        signing_authority:
          type: string
          nullable: true
        signed_payload_hash:
          type: string
          nullable: true
          minLength: 64
          maxLength: 64
    AuditAnchorSummary:
      type: object
      additionalProperties: false
      properties:
        anchor_id:
          type: string
          nullable: true
        external_anchor_id:
          type: string
          nullable: true
        local_anchor_id:
          type: string
          nullable: true
        chain_position:
          type: integer
          format: int64
          minimum: 1
        last_event_hash:
          type: string
        hash_algorithm:
          type: string
          enum: [SHA-256]
        schema_version:
          type: string
          nullable: true
          enum: ["1.0"]
        created_at:
          type: string
          format: date-time
          nullable: true
        sink_type:
          type: string
          nullable: true
          enum: [local-file, object-store, disabled]
        publication_status:
          type: string
          nullable: true
          enum: [PUBLISHED, UNVERIFIED, LOCAL_STATUS_UNVERIFIED, LOCAL_ANCHOR_CREATED_EXTERNAL_REQUIRED_FAILED, PARTIAL, PENDING, FAILED, INVALID, CONFLICT, MISSING, UNAVAILABLE]
        publication_reason:
          type: string
          nullable: true
          enum: [HEAD_MANIFEST_UPDATE_FAILED, STATUS_PERSISTENCE_FAILED_AFTER_EXTERNAL_PUBLISH, EXTERNAL_ANCHOR_REQUIRED_FAILED]
        manifest_status:
          type: string
          nullable: true
          enum: [FAILED]
        external_reference:
          nullable: true
          $ref: "#/components/schemas/ExternalAnchorReference"
        external_immutability_level:
          $ref: "#/components/schemas/ExternalImmutabilityLevel"
    AuditTrustAttestationResponse:
      type: object
      additionalProperties: false
      required:
        - status
        - trust_level
        - internal_integrity_status
        - external_integrity_status
        - external_anchor_status
        - external_immutability_level
        - anchor_coverage
        - attestation_fingerprint
        - signer_mode
        - attestation_signature_strength
        - external_trust_dependency
        - source_service
        - limit
        - limitations
      properties:
        status:
          type: string
          enum: [AVAILABLE, UNAVAILABLE]
        trust_level:
          type: string
          enum: [INTERNAL_ONLY, PARTIAL_EXTERNAL, EXTERNALLY_ANCHORED, SIGNED_BY_LOCAL_AUTHORITY, INDEPENDENTLY_VERIFIABLE, SIGNED_ATTESTATION, UNAVAILABLE]
          description: Derived trust assessment. SIGNED_BY_LOCAL_AUTHORITY requires valid internal integrity, valid external anchor verification, signature_verification_status=VALID for Ed25519 external-anchor signature metadata, a known public key, and signing_authority other than alert-service. Stored signature fields alone never upgrade trust. INDEPENDENTLY_VERIFIABLE is reserved for offline evidence bundles that verify without alert-service, MongoDB, or object-store access. SIGNED_ATTESTATION requires valid external anchoring, external_immutability_level=ENFORCED, and PRODUCTION_READY attestation signing backed by externally managed KMS/HSM signing material; local-dev signing never upgrades trust level.
        internal_integrity_status:
          type: string
          enum: [VALID, INVALID, PARTIAL, UNAVAILABLE]
        external_integrity_status:
          type: string
          enum: [VALID, INVALID, PARTIAL, UNAVAILABLE]
        external_anchor_status:
          type: string
          enum: [VALID, DISABLED, MISSING, STALE, PARTIAL, INVALID, UNAVAILABLE]
        external_immutability_level:
          $ref: "#/components/schemas/ExternalImmutabilityLevel"
        anchor_coverage:
          $ref: "#/components/schemas/AuditTrustAttestationAnchorCoverage"
        latest_chain_position:
          type: integer
          format: int64
          nullable: true
        latest_event_hash:
          type: string
          nullable: true
        latest_external_anchor_reference:
          nullable: true
          $ref: "#/components/schemas/AuditTrustAttestationExternalAnchorReference"
        attestation_fingerprint:
          type: string
          minLength: 64
          maxLength: 64
          description: SHA-256 fingerprint of the bounded trust attestation payload.
        attestation_signature:
          type: string
          nullable: true
          description: Present only when attestation signing is enabled. Local-dev signing is integrity metadata only, not legal signing.
        signing_key_id:
          type: string
          nullable: true
          description: Signing key id for attestation_signature; no private key material is exposed.
        signer_mode:
          type: string
          enum: [disabled, local-dev, kms-ready]
          description: Configured attestation signer mode. kms-ready requires app.audit.trust.signing.kms-enabled=true and fails closed unless a real KMS/HSM adapter is integrated.
        attestation_signature_strength:
          type: string
          enum: [NONE, LOCAL_DEV, PRODUCTION_READY]
          description: Mandatory for interpreting trust_level. LOCAL_DEV signatures are integrity-only and do not add external trust. PRODUCTION_READY is reserved for future real KMS/HSM-backed signing.
        external_trust_dependency:
          type: string
          enum: [REQUIRED, OPTIONAL]
          description: REQUIRED when the derived trust level depends on valid FDP-20 external anchors.
        source_service:
          type: string
          enum: [alert-service]
        limit:
          type: integer
          minimum: 1
          maximum: 500
        limitations:
          type: array
          items:
            type: string
          description: Explicit limitations such as not_legal_notarization, not_worm_storage, not_siem_integration, not_kms_hsm_signing_unless_explicitly_integrated, local_signature_not_external_trust, external_immutability_not_enforced, no_worm_claim_without_infrastructure_enforcement, external_trust_incomplete, and derived_from_fdp19_fdp20_source_of_truth.
    AuditTrustAttestationAnchorCoverage:
      type: object
      additionalProperties: false
      required:
        - total_anchors_checked
        - external_anchors_matched
        - external_anchors_missing
        - coverage_ratio
      properties:
        total_anchors_checked:
          type: integer
          minimum: 0
        external_anchors_matched:
          type: integer
          minimum: 0
        external_anchors_missing:
          type: integer
          minimum: 0
        coverage_ratio:
          type: number
          format: double
          minimum: 0
          maximum: 1
    AuditTrustAttestationExternalAnchorReference:
      $ref: "#/components/schemas/ExternalAnchorReference"
    ExternalAnchorReference:
      type: object
      additionalProperties: false
      required: [anchor_id, external_key, anchor_hash, external_hash, verified_at, timestamp_type, timestamp_trust_level]
      properties:
        anchor_id:
          type: string
        external_key:
          type: string
          description: Deterministic external object key or local external anchor identifier. It is bounded anchor metadata, not credentials or raw payload.
        anchor_hash:
          type: string
          minLength: 64
          maxLength: 64
        external_hash:
          type: string
          minLength: 64
          maxLength: 64
        verified_at:
          type: string
          format: date-time
          description: Application read-back verification time; not external timestamp proof.
        timestamp_value:
          type: string
          format: date-time
          nullable: true
          description: Witness-provided timestamp metadata when available. Null means no verified witness timestamp was provided.
        timestamp_type:
          type: string
          enum: [APP_OBSERVED, STORAGE_OBSERVED, SIGNED_TIMESTAMP, LEDGER_TIMESTAMP]
          description: APP_OBSERVED is application metadata only and is not external timestamp proof.
        timestamp_trust_level:
          type: string
          enum: [WEAK, MEDIUM, STRONG, CRYPTOGRAPHIC]
          description: WEAK application-observed timestamps are not proof of external time. Stronger values require verified witness support.
        timestamp_source:
          type: string
          nullable: true
          description: Bounded timestamp source label such as APP_CLOCK or WITNESS_METADATA; never a raw URL or provider error.
        timestamp_verified:
          type: boolean
          nullable: true
          description: True only when timestamp metadata is verified by the witness adapter.
        signature_status:
          type: string
          nullable: true
          enum: [SIGNED, UNSIGNED, SIGNATURE_UNAVAILABLE, SIGNATURE_FAILED]
        signature:
          type: string
          nullable: true
          description: Asymmetric signature over the canonical audit anchor payload hash; no private key material.
        signing_key_id:
          type: string
          nullable: true
        signing_algorithm:
          type: string
          nullable: true
          enum: [Ed25519]
        signed_at:
          type: string
          format: date-time
          nullable: true
        signing_authority:
          type: string
          nullable: true
          description: Signing authority name. SIGNED_BY_LOCAL_AUTHORITY requires a value other than alert-service.
        signed_payload_hash:
          type: string
          nullable: true
          minLength: 64
          maxLength: 64
    AuditTrustAuthorityKey:
      type: object
      additionalProperties: false
      required: [key_id, algorithm, public_key, key_fingerprint_sha256, valid_from, status]
      properties:
        key_id:
          type: string
        algorithm:
          type: string
          enum: [Ed25519]
        public_key:
          type: string
          description: Base64 DER/SPKI public key material. Private keys are never returned.
        key_fingerprint_sha256:
          type: string
          minLength: 64
          maxLength: 64
          description: Hex SHA-256 fingerprint of the DER/SPKI public key.
        valid_from:
          type: string
          format: date-time
        valid_until:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum: [ACTIVE, RETIRED, REVOKED]
    ExternalImmutabilityLevel:
      type: string
      description: NONE is the default and means no verified external immutability. CONFIGURED means controls may be configured but are not verified as enforced by this response. ENFORCED means the external adapter verified infrastructure immutability controls. Only ENFORCED can support a WORM interpretation, and even then this is not legal notarization or compliance certification.
      enum: [NONE, CONFIGURED, ENFORCED]
    GovernanceAdvisoryLifecycleStatus:
      type: string
      description: Read-time projection from latest audit decision. OPEN means audit lookup succeeded and no audit event exists. UNKNOWN means lifecycle cannot be determined because audit lookup failed or audit truth is unavailable.
      enum:
        - OPEN
        - UNKNOWN
        - ACKNOWLEDGED
        - NEEDS_FOLLOW_UP
        - DISMISSED_AS_NOISE
    GovernanceAdvisoryListResponse:
      type: object
      required:
        - status
        - count
        - retention_limit
        - advisory_events
      properties:
        status:
          type: string
          enum: [AVAILABLE, PARTIAL, UNAVAILABLE]
        reason_code:
          type: string
          nullable: true
          description: Present when lifecycle enrichment is degraded. AUDIT_UNAVAILABLE means lifecycle_status may be UNKNOWN and clients must not interpret missing audit history as OPEN.
          enum: [AUDIT_UNAVAILABLE]
        count:
          type: integer
        retention_limit:
          type: integer
        advisory_events:
          type: array
          items:
            $ref: "#/components/schemas/GovernanceAdvisoryEvent"
    GovernanceAdvisoryAnalyticsResponse:
      type: object
      additionalProperties: false
      required:
        - status
        - window
        - totals
        - decision_distribution
        - lifecycle_distribution
        - review_timeliness
      properties:
        status:
          type: string
          description: AVAILABLE when advisory and audit sources are both readable, PARTIAL when one source is degraded or the audit scan limit is exceeded, and UNAVAILABLE when both sources are unavailable.
          enum: [AVAILABLE, PARTIAL, UNAVAILABLE]
        reason_code:
          type: string
          nullable: true
          description: Optional degradation reason returned only for PARTIAL or UNAVAILABLE analytics responses.
          enum: [AUDIT_LIMIT_EXCEEDED, AUDIT_UNAVAILABLE, ADVISORY_UNAVAILABLE]
        window:
          type: object
          additionalProperties: false
          required: [from, to, days]
          properties:
            from:
              type: string
              format: date-time
            to:
              type: string
              format: date-time
            days:
              type: integer
              minimum: 1
              maximum: 30
        totals:
          type: object
          additionalProperties: false
          description: Counts distinct advisory_event_id values from the bounded advisory projection window. reviewed means at least one matching audit event exists; open means zero matching audit events exist only when audit source is readable; resolved groups reviewed lifecycle states; unknown means audit truth was unavailable for lifecycle classification.
          required: [advisories, reviewed, open, resolved, unknown]
          properties:
            advisories:
              type: integer
              minimum: 0
            reviewed:
              type: integer
              minimum: 0
            open:
              type: integer
              minimum: 0
            resolved:
              type: integer
              minimum: 0
            unknown:
              type: integer
              minimum: 0
        decision_distribution:
          type: object
          description: Latest audit decision distribution for reviewed advisories in the bounded advisory projection window. Audit-only advisory IDs outside that projection are not counted.
          additionalProperties:
            type: integer
            minimum: 0
          properties:
            ACKNOWLEDGED:
              type: integer
              minimum: 0
            NEEDS_FOLLOW_UP:
              type: integer
              minimum: 0
            DISMISSED_AS_NOISE:
              type: integer
              minimum: 0
        lifecycle_distribution:
          type: object
          description: Lifecycle distribution of the bounded advisory projection after read-time lifecycle enrichment. Counts sum to totals.advisories. UNKNOWN is separate and must not be interpreted as OPEN.
          additionalProperties:
            type: integer
            minimum: 0
          properties:
            OPEN:
              type: integer
              minimum: 0
            UNKNOWN:
              type: integer
              minimum: 0
            ACKNOWLEDGED:
              type: integer
              minimum: 0
            NEEDS_FOLLOW_UP:
              type: integer
              minimum: 0
            DISMISSED_AS_NOISE:
              type: integer
              minimum: 0
        review_timeliness:
          type: object
          additionalProperties: false
          description: Time-to-first-review percentiles in minutes. Only advisories with at least one valid non-negative audit duration are sampled; status is LOW_CONFIDENCE when fewer than five valid samples exist.
          required:
            - status
            - time_to_first_review_p50_minutes
            - time_to_first_review_p95_minutes
          properties:
            status:
              type: string
              enum: [AVAILABLE, LOW_CONFIDENCE]
            time_to_first_review_p50_minutes:
              type: number
              minimum: 0
            time_to_first_review_p95_minutes:
              type: number
              minimum: 0
    GovernanceAdvisoryEvent:
      type: object
      required:
        - event_id
        - event_type
        - severity
        - drift_status
        - confidence
        - advisory_confidence_context
        - model_name
        - model_version
        - lifecycle_context
        - recommended_actions
        - created_at
        - lifecycle_status
      properties:
        event_id:
          type: string
        event_type:
          type: string
        severity:
          type: string
        drift_status:
          type: string
        confidence:
          type: string
        advisory_confidence_context:
          type: string
        model_name:
          type: string
        model_version:
          type: string
        lifecycle_context:
          type: object
          additionalProperties: true
        recommended_actions:
          type: array
          items:
            type: string
        explanation:
          type: string
          nullable: true
        created_at:
          type: string
        lifecycle_status:
          $ref: "#/components/schemas/GovernanceAdvisoryLifecycleStatus"
    GovernanceAuditRequest:
      type: object
      additionalProperties: false
      required:
        - decision
      properties:
        decision:
          type: string
          enum:
            - ACKNOWLEDGED
            - NEEDS_FOLLOW_UP
            - DISMISSED_AS_NOISE
        note:
          type: string
          nullable: true
          maxLength: 500
      description: Actor fields are not accepted from clients; actor attribution is backend-derived.
    GovernanceAuditHistoryResponse:
      type: object
      required:
        - advisory_event_id
        - status
        - audit_events
      properties:
        advisory_event_id:
          type: string
        status:
          type: string
          enum:
            - AVAILABLE
            - UNAVAILABLE
        audit_events:
          type: array
          items:
            $ref: "#/components/schemas/GovernanceAuditEvent"
    GovernanceAuditEvent:
      type: object
      required:
        - audit_id
        - advisory_event_id
        - decision
        - actor_id
        - actor_display_name
        - actor_roles
        - created_at
        - model_name
        - model_version
        - advisory_severity
        - advisory_confidence
        - advisory_confidence_context
      properties:
        audit_id:
          type: string
        advisory_event_id:
          type: string
        decision:
          type: string
          enum:
            - ACKNOWLEDGED
            - NEEDS_FOLLOW_UP
            - DISMISSED_AS_NOISE
        note:
          type: string
          nullable: true
          maxLength: 500
        actor_id:
          type: string
        actor_display_name:
          type: string
        actor_roles:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        model_name:
          type: string
        model_version:
          type: string
        advisory_severity:
          type: string
        advisory_confidence:
          type: string
        advisory_confidence_context:
          type: string
    ApiErrorResponse:
      type: object
      required:
        - timestamp
        - status
        - error
        - message
        - details
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: string
  responses:
    BadRequest:
      description: Request validation failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    Unauthorized:
      description: Authentication is required.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    Forbidden:
      description: Authenticated actor lacks the required authority.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    NotFound:
      description: Advisory event was not found in bounded advisory history.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    Conflict:
      description: Request conflicts with current resource state.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    ServiceUnavailable:
      description: Audit persistence or advisory lookup is unavailable.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
