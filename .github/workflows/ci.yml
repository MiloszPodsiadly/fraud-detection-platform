name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend Maven Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build and test backend modules
        run: mvn -B verify

  fdp42-fraud-case-management:
    name: FDP-42 Fraud Case Management
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify Docker is available for Testcontainers
        run: docker version

      - name: Run FDP-42 fraud case proof suite
        run: mvn -B "-Dsurefire.failIfNoSpecifiedTests=false" -pl alert-service -am "-Dtest=FraudCaseTransitionPolicyTest,Fdp42FraudCaseManagementServiceTest,FraudCaseControllerTest,FraudCaseManagementServiceTest,FraudCaseMutationInvariantTest,FraudCaseAuditServiceTest,Fdp42FraudCaseAuditAppendOnlyArchitectureTest,Fdp42FraudCaseDocumentationNoOverclaimTest,FraudCaseSecurityIntegrationTest,FraudCaseTransactionIntegrationTest,AlertSecurityConfigTest,AlertSecurityConfigJwtEnabledTest,DemoAuthSecurityConfigTest,AnalystRoleTest" test

      - name: Verify FDP-42 proof suite reports
        run: node scripts/ci/verify-junit-reports.mjs --suite fdp42

      - name: Upload FDP-42 test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fdp42-fraud-case-management-test-reports
          if-no-files-found: error
          path: |
            alert-service/target/surefire-reports/
            alert-service/target/failsafe-reports/

  fdp43-fraud-case-idempotency:
    name: FDP-43 Fraud Case Idempotency
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - backend
      - fdp42-fraud-case-management
      - regulated-mutation-regression

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify Docker is available for Testcontainers
        run: docker version

      - name: Run FDP-43 fraud case idempotency proof suite
        run: mvn -B "-Dsurefire.failIfNoSpecifiedTests=false" -pl alert-service -am "-Dtest=IdempotencyCanonicalHasherTest,SharedIdempotencyKeyPolicyTest,FraudCaseLifecycleIdempotencyConflictPolicyTest,Fdp43FraudCaseLifecycleIdempotencyArchitectureTest,Fdp43FraudCaseLifecyclePublicPathIdempotencyArchitectureTest,FraudCaseControllerTest,FraudCaseSecurityIntegrationTest,FraudCaseTransactionIntegrationTest,FraudCaseLifecycleIdempotencyGlobalKeyRegressionIntegrationTest,FraudCaseLifecycleIdempotencyConcurrencyIntegrationTest,FraudCaseLifecycleIdempotencyFailureIntegrationTest,FraudCaseLifecycleIdempotencyServiceRaceTest,RegulatedMutationIdempotencyPrimitiveCompatibilityTest" test

      - name: Verify FDP-43 proof suite reports
        run: node scripts/ci/verify-junit-reports.mjs --suite fdp43

      - name: Upload FDP-43 test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fdp43-fraud-case-idempotency-test-reports
          if-no-files-found: error
          path: |
            alert-service/target/surefire-reports/
            alert-service/target/failsafe-reports/

  fdp44-fraud-case-idempotency-hardening:
    name: FDP-44 Fraud Case Idempotency Hardening
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - backend
      - fdp42-fraud-case-management
      - regulated-mutation-regression
      - fdp43-fraud-case-idempotency

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify Docker is available for Testcontainers
        run: docker version

      - name: Run FDP-44 fraud case idempotency hardening suite
        run: mvn -B "-Dsurefire.failIfNoSpecifiedTests=false" -pl alert-service -am "-Dtest=Fdp44FraudCaseLifecycleApiSurfaceStructuralTest,Fdp44FraudCaseLifecycleReplaySnapshotTest,Fdp44FraudCaseLifecycleReplaySnapshotFailClosedTest,Fdp44FraudCaseLifecycleReplaySnapshotCoverageTest,Fdp44FraudCaseLifecycleReplaySnapshotMapperStructuralTest,Fdp44FraudCaseLifecycleReplayEquivalenceIntegrationTest,Fdp44FraudCaseIdempotencyRetentionOperationalTest,Fdp44FraudCaseIdempotencyOperationalDocsNoOverclaimTest,FraudCaseLifecycleIdempotencyServiceRaceTest,FraudCaseLifecycleIdempotencyGlobalKeyRegressionIntegrationTest,FraudCaseLifecycleIdempotencyConcurrencyIntegrationTest,FraudCaseLifecycleIdempotencyFailureIntegrationTest,AlertServiceMetricsTest" test

      - name: Verify FDP-44 proof suite reports
        run: node scripts/ci/verify-junit-reports.mjs --suite fdp44

      - name: Upload FDP-44 test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fdp44-fraud-case-idempotency-hardening-test-reports
          if-no-files-found: error
          path: |
            alert-service/target/surefire-reports/
            alert-service/target/failsafe-reports/

  fdp45-fraud-case-work-queue-read-model:
    name: FDP-45 Fraud Case Work Queue Read Model
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs:
      - backend
      - fdp42-fraud-case-management
      - regulated-mutation-regression
      - fdp43-fraud-case-idempotency
      - fdp44-fraud-case-idempotency-hardening

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify Docker is available for Testcontainers
        run: docker version

      - name: Run FDP-45 fraud case work queue read model suite
        run: >-
          mvn -B "-Dsurefire.failIfNoSpecifiedTests=false" -pl alert-service -am
          "-Dtest=Fdp45FraudCaseReadModelSingleSourceOfTruthTest,Fdp45FraudCaseWorkQueuePaginationTest,Fdp45FraudCaseWorkQueueSortingTest,Fdp45FraudCaseWorkQueueFilterTest,Fdp45FraudCaseWorkQueueDuplicateParamTest,Fdp45FraudCaseWorkQueueSlaConfigTest,Fdp45FraudCaseProdSlaConfigTest,Fdp45FraudCaseWorkQueueSlaAgeTest,Fdp45FraudCaseWorkQueueReadOnlySafetyTest,Fdp45FraudCaseWorkQueueSecurityTest,Fdp45FraudCaseWorkQueueObservabilityTest,Fdp45FraudCaseWorkQueueFailureMetricsTest,Fdp45FraudCaseWorkQueueReadAccessAuditTest,Fdp45FraudCaseWorkQueueMongoIntegrationTest,Fdp45FraudCaseWorkQueueContractCompatibilityTest,Fdp45FraudCaseWorkQueueDocsNoOverclaimTest,Fdp45FraudCaseLegacyListValidationTest,Fdp45FraudCaseLegacyDeepPaginationValidationTest,Fdp45FraudCaseWorkQueueDeepPaginationTest,Fdp45FraudCaseWorkQueueIndexReadinessTest,Fdp45FraudCaseCompoundIndexReadinessDocsTest,Fdp45FraudCaseWorkQueueOpenApiContractTest,Fdp45FraudCaseWorkQueueFailedReadAuditTest,Fdp45FraudCaseWorkQueueFilterLengthTest,Fdp45FraudCaseWorkQueueNoDuplicateAuditAdviceTest,Fdp45ReadAccessAuditResponseAdviceMarkerTest,Fdp45FraudCaseWorkQueueAuditPrecedenceTest,Fdp45SensitiveReadAuditUnavailableRunbookTest,Fdp45FraudCaseReadPolicyNamingBoundaryTest,Fdp45FraudCaseLegacyExactCountCompatibilityDocsTest,Fdp45FraudCaseLegacyPaginationReleaseNotesTest,Fdp45FraudCaseReadQueryPolicyContractTest,Fdp45FraudCaseWorkQueueCursorArchitectureTest,Fdp45FraudCaseWorkQueueCursorCodecTest,Fdp45FraudCaseWorkQueueCursorPaginationTest,Fdp45FraudCaseWorkQueueCursorQueryFingerprintTest,Fdp45FraudCaseWorkQueueCursorFilterBindingTest,Fdp45FraudCaseWorkQueueCursorPageCombinationTest,Fdp45FraudCaseWorkQueueCursorSecretProfileTest,Fdp45FraudCaseWorkQueueCursorObservabilityTest,Fdp45FraudCaseWorkQueueCursorDocsContractTest,Fdp45FraudCaseWorkQueueSortFieldCoverageTest,Fdp45FraudCaseWorkQueueCursorSizeChangeTest,SensitiveReadAuditServiceTest"
          test

      - name: Verify FDP-45 proof suite reports
        run: node scripts/ci/verify-junit-reports.mjs --suite fdp45

      - name: Upload FDP-45 test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fdp45-fraud-case-work-queue-read-model-test-reports
          if-no-files-found: error
          path: |
            alert-service/target/surefire-reports/
            alert-service/target/failsafe-reports/

  ml:
    name: Python ML Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ML dependencies
        run: pip install -r ml-inference-service/requirements.txt

      - name: Run ML unit tests
        run: python -m unittest discover -s ml-inference-service/tests
        env:
          PYTHONPATH: ml-inference-service

      - name: Validate trained model artifact loads
        run: python -m app.train_model --examples 1000 --epochs 20 --output /tmp/model_artifact.json
        env:
          PYTHONPATH: ml-inference-service

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: analyst-console-ui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: analyst-console-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify generated authority constants
        run: npm run check:authorities

      - name: Run frontend tests
        run: npm test

      - name: Build UI
        run: npm run build

  fdp28-proof:
    name: FDP-28 Docker Integration Proof
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Verify Docker is available for Testcontainers
        run: docker version

      - name: Run FDP-28 proof suite with Testcontainers
        run: mvn -B -pl alert-service -am -Dgroups=failure-injection,invariant-proof,integration test

  fdp35-production-readiness:
    name: FDP-35 Production Readiness Proof
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Verify Docker is available for Testcontainers
        run: docker version

      - name: Run FDP-35 proof suite
        run: mvn -B -pl alert-service -am -Dgroups=production-readiness,e2e,recovery-proof,integration test

      - name: Upload FDP-35 test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fdp35-production-readiness-test-reports
          if-no-files-found: ignore
          path: |
            alert-service/target/surefire-reports/
            alert-service/target/failsafe-reports/

  fdp47-analyst-console-ux-and-summary:
    name: Analyst Console Product Gate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs:
      - frontend
      - fdp45-fraud-case-work-queue-read-model

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: analyst-console-ui/package-lock.json

      - name: Ensure FDP-47 tests are not skipped
        run: node scripts/ci/guard-test-activation.mjs --suite fdp47

      - name: Run FDP-46 backend search and audit tests
        run: mvn -B -pl alert-service -am "-Dsurefire.failIfNoSpecifiedTests=false" "-Dtest=ScoredTransactionControllerValidationTest,ScoredTransactionSearchPolicyTest,TransactionMonitoringServiceSearchTest,ScoredTransactionDocumentMapperTest,ScoredTransactionSearchIndexReadinessTest,ReadAccessAuditClassifierTest,ReadAccessAuditEndpointTest,ReadAccessAuditServiceTest,ReadAccessAuditResponseAdviceTest,Fdp45ReadAccessAuditResponseAdviceMarkerTest,AlertServiceMetricsTest,AlertSecurityConfigTest" test

      - name: Verify FDP-46 backend test reports
        run: node scripts/ci/verify-junit-reports.mjs --suite fdp46

      - name: Run FDP-47 backend summary tests
        run: mvn -B -pl alert-service -am "-Dsurefire.failIfNoSpecifiedTests=false" "-Dtest=FraudCaseWorkQueueSummaryControllerTest,ReadAccessAuditClassifierTest,ReadAccessResultCountExtractorTest,Fdp45FraudCaseReadModelSingleSourceOfTruthTest,Fdp45FraudCaseWorkQueueReadOnlySafetyTest,Fdp45FraudCaseWorkQueueOpenApiContractTest,Fdp47FraudCaseWorkQueueSummaryContractTest,Fdp45FraudCaseWorkQueueObservabilityTest,FraudCaseSecurityIntegrationTest" test

      - name: Verify FDP-47 backend test reports
        run: node scripts/ci/verify-junit-reports.mjs --suite fdp47

      - name: Install frontend dependencies
        working-directory: analyst-console-ui
        run: npm ci

      - name: Run FDP-47 frontend tests
        working-directory: analyst-console-ui
        run: npm test -- --run src/App.test.jsx src/pages/AlertsListPage.test.jsx src/components/FraudCaseWorkQueuePanel.test.jsx src/api/alertsApi.test.js

      - name: Build FDP-47 UI
        working-directory: analyst-console-ui
        run: npm run build

  fdp48-bff-session-request-lifecycle:
    name: FDP-48 BFF Session & Request Lifecycle
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - backend
      - frontend
      - fdp47-analyst-console-ux-and-summary

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: analyst-console-ui/package-lock.json

      - name: Ensure FDP-48 tests are not skipped
        run: node scripts/ci/guard-test-activation.mjs --suite fdp48

      - name: Run FDP-48 backend BFF security tests
        run: mvn -B -pl alert-service -am "-Dsurefire.failIfNoSpecifiedTests=false" "-Dtest=BffSessionSecurityIntegrationTest,BffSecurityPropertiesTest,BffLogoutSuccessHandlerTest,OidcAnalystAuthoritiesMapperTest,AlertSecurityConfigJwtEnabledTest,AlertServiceMetricsTest" test

      - name: Verify FDP-48 backend reports
        run: node scripts/ci/verify-junit-reports.mjs --suite fdp48

      - name: Install frontend dependencies
        working-directory: analyst-console-ui
        run: npm ci

      - name: Run FDP-48 frontend lifecycle tests
        working-directory: analyst-console-ui
        run: npm test -- --run src/auth/authProvider.test.js src/api/alertsApi.test.js src/fraudCases/useFraudCaseWorkQueue.test.js src/fraudCases/useFraudCaseWorkQueueSummary.test.js src/workspace/workspaceDataHooks.test.js src/workspace/useWorkspaceRoute.test.js --reporter=default --reporter=junit --outputFile=./test-results/fdp48-vitest.xml

      - name: Guard FDP-48 API client boundary
        working-directory: analyst-console-ui
        run: npm run check:api-client-boundary

      - name: Verify FDP-48 frontend report
        run: node scripts/ci/verify-vitest-reports.mjs --suite fdp48

      - name: Build FDP-48 UI
        working-directory: analyst-console-ui
        run: npm run build

  fdp49-security-route-boundary-hardening:
    name: FDP-49 Security Route Boundary Hardening
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - backend
      - frontend
      - fdp48-bff-session-request-lifecycle

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: analyst-console-ui/package-lock.json

      # FDP-49 protects post-BFF route/auth boundaries and must remain required for merge.
      - name: Ensure FDP-49 tests are not skipped
        run: node scripts/ci/guard-test-activation.mjs --suite fdp49

      - name: Run FDP-49 backend security route tests
        run: mvn -B -pl alert-service -am "-Dsurefire.failIfNoSpecifiedTests=false" "-Dtest=AuthorizationRulesCoverageTest,AuthorizationRuleGroupRegistrationTest,RouteCoverageAgainstMvcMappingsTest,SecurityMatcherOrderRegressionTest,DenyByDefaultSecurityTest,SpaFallbackSecurityTest,BffCsrfBoundaryRegressionTest,BearerVsSessionCsrfRegressionTest,BffSessionSecurityIntegrationTest,SecurityRouteRegistryDocumentationTest,SecurityRouteOwnershipRegistryTest,SingleSecurityFilterChainGuardTest,Fdp49NoNewBusinessSemanticsTest,AlertServiceMetricsTest" test

      - name: Verify FDP-49 backend reports
        run: node scripts/ci/verify-junit-reports.mjs --suite fdp49

      - name: Run FDP-49 security grep guardrails
        run: |
          if grep -R "anyRequest()\.permitAll()" alert-service/src/main/java/com/frauddetection/alert/security/config; then
            echo "FDP-49 forbids anyRequest().permitAll() in alert-service security config" >&2
            exit 1
          fi
          if grep -R 'requestMatchers("/api/\*\*")\.permitAll()' alert-service/src/main/java/com/frauddetection/alert/security/config; then exit 1; fi
          if grep -R 'requestMatchers("/api/v1/\*\*")\.permitAll()' alert-service/src/main/java/com/frauddetection/alert/security/config; then exit 1; fi
          if grep -R 'requestMatchers("/governance/\*\*")\.permitAll()' alert-service/src/main/java/com/frauddetection/alert/security/config; then exit 1; fi
          if grep -R 'requestMatchers("/system/\*\*")\.permitAll()' alert-service/src/main/java/com/frauddetection/alert/security/config; then exit 1; fi
          if grep -R 'requestMatchers("/bff/\*\*")\.permitAll()' alert-service/src/main/java/com/frauddetection/alert/security/config; then exit 1; fi
          if grep -R "HttpMethod\.POST\|HttpMethod\.PUT\|HttpMethod\.PATCH\|HttpMethod\.DELETE" alert-service/src/main/java/com/frauddetection/alert/security/config/SpaFallbackAuthorizationRules.java; then
            echo "FDP-49 SPA fallback must remain GET-only" >&2
            exit 1
          fi

      - name: Install frontend dependencies
        working-directory: analyst-console-ui
        run: npm ci

      - name: Run FDP-49 frontend API client boundary tests
        working-directory: analyst-console-ui
        run: npm test -- --run src/api/apiClientBoundary.test.js src/auth/authProvider.test.js src/api/alertsApi.test.js src/workspace/workspaceDataHooks.test.js src/fraudCases/useFraudCaseWorkQueue.test.js src/fraudCases/useFraudCaseWorkQueueSummary.test.js --reporter=default --reporter=junit --outputFile=./test-results/fdp49-vitest.xml

      - name: Guard FDP-49 API client boundary
        working-directory: analyst-console-ui
        run: |
          npm run check:api-client-boundary:fdp49
          echo "fdp49_api_client_boundary_guard_ran=true" > test-results/fdp49-api-client-boundary-guard.txt

      - name: Verify FDP-49 frontend report
        run: node scripts/ci/verify-vitest-reports.mjs --suite fdp49

      - name: Build FDP-49 UI
        working-directory: analyst-console-ui
        run: npm run build

      - name: Upload FDP-49 route boundary reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fdp49-route-boundary-reports
          if-no-files-found: ignore
          path: |
            alert-service/target/surefire-reports/
            analyst-console-ui/test-results/fdp49-vitest.xml
            analyst-console-ui/test-results/fdp49-api-client-boundary-guard.txt

  fdp54-ci-docs-governance:
    name: FDP-54 CI Docs Governance
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify FDP-54 shared scope helpers
        run: node scripts/check-fdp-scope-helpers-smoke.mjs

      - name: Guard documentation overclaims
        run: node scripts/check-doc-overclaims.mjs

      - name: Compare CI jobs with evidence map
        run: node scripts/compare-ci-jobs.mjs

  analyst-console-frontend-architecture-gate:
    name: Analyst Console Frontend Architecture Gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - frontend
      - fdp49-security-route-boundary-hardening

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: analyst-console-ui/package-lock.json

      - name: Install frontend dependencies
        working-directory: analyst-console-ui
        run: npm ci

      - name: Ensure frontend architecture tests are not skipped or focused
        run: node scripts/ci/guard-test-activation.mjs --suite frontend-architecture

      - name: FDP-50 API client boundary
        working-directory: analyst-console-ui
        run: |
          echo "::group::FDP-50 API client boundary"
          npm test -- --run src/api/apiClientBoundary.test.js src/auth/authProvider.test.js src/api/alertsApi.test.js src/workspace/workspaceDataHooks.test.js src/workspace/useWorkspaceRoute.test.js src/fraudCases/useFraudCaseWorkQueue.test.js src/fraudCases/useFraudCaseWorkQueueSummary.test.js src/App.test.jsx --reporter=default --reporter=junit --outputFile=./test-results/fdp50-vitest.xml
          echo "::endgroup::"

      - name: FDP-51 runtime provider
        working-directory: analyst-console-ui
        run: |
          echo "::group::FDP-51 runtime provider"
          npm test -- --run src/workspace/WorkspaceRuntimeProvider.test.jsx src/workspace/useWorkspaceCounters.test.js src/workspace/useGovernanceAuditWorkflow.test.js src/workspace/workspaceRefreshContract.test.js src/workspace/workspaceDataHooks.test.js src/components/GovernanceReviewQueue.test.jsx src/pages/AlertDetailsPage.test.jsx src/pages/FraudCaseDetailsPage.test.jsx src/pages/AlertsListPage.test.jsx src/App.test.jsx src/api/alertsApi.test.js src/api/apiClientBoundary.test.js --reporter=default --reporter=junit --outputFile=./test-results/fdp51-vitest.xml
          echo "::endgroup::"

      - name: FDP-52 detail UX
        working-directory: analyst-console-ui
        run: |
          echo "::group::FDP-52 detail UX"
          npm test -- --run src/workspace/WorkspaceDashboardShell.test.jsx src/workspace/WorkspaceDetailRouter.test.jsx src/workspace/AnalystWorkspaceContainer.test.jsx src/workspace/FraudTransactionWorkspaceContainer.test.jsx src/workspace/TransactionScoringWorkspaceContainer.test.jsx src/workspace/GovernanceWorkspaceContainer.test.jsx src/workspace/ReportsWorkspaceContainer.test.jsx src/workspace/WorkspaceContainerBoundary.test.jsx src/components/DetailHeader.test.jsx src/components/DetailStateBanner.test.jsx src/utils/idempotencyKey.test.js src/pages/AlertDetailsPage.test.jsx src/pages/FraudCaseDetailsPage.test.jsx src/App.test.jsx --reporter=default --reporter=junit --outputFile=./test-results/fdp52-vitest.xml
          echo "::endgroup::"

      - name: FDP-53 runtime ownership
        working-directory: analyst-console-ui
        run: |
          echo "::group::FDP-53 runtime ownership"
