spring:
  application:
    name: alert-service
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/fraud_alerts}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      auto-offset-reset: earliest
      group-id: ${spring.application.name}

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info

app:
  kafka:
    topics:
      transaction-scored: transactions.scored
      fraud-alerts: fraud.alerts
      fraud-decisions: fraud.decisions
      transactions-dead-letter: transactions.dead-letter
    consumer:
      concurrency: 1
      retry-attempts: 3
      retry-backoff-millis: 1000
