<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Fraud detection runtime flow</title>
  <desc id="desc">Runtime sequence from transaction intake through enrichment, scoring, alert creation, analyst review, and audit evidence.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 25px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 14px Arial, sans-serif; fill: #475569; }
      .step { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 14; }
      .event { fill: #fff7ed; stroke: #f97316; }
      .svc { fill: #eff6ff; stroke: #3b82f6; }
      .audit { fill: #f5f3ff; stroke: #8b5cf6; }
      .num { font: 700 18px Arial, sans-serif; fill: #2563eb; }
      .label { font: 700 14px Arial, sans-serif; fill: #111827; }
      .small { font: 400 12px Arial, sans-serif; fill: #475569; }
      .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .branch { stroke: #64748b; stroke-width: 1.8; fill: none; marker-end: url(#arrow); stroke-dasharray: 6 5; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="520"/>
  <text class="title" x="48" y="52">Runtime Flow</text>
  <text class="subtitle" x="48" y="78">The happy path keeps each service responsible for one bounded transition.</text>

  <rect class="step svc" x="55" y="135" width="130" height="95"/>
  <text class="num" x="75" y="165">1</text>
  <text class="label" x="75" y="190">Produce</text>
  <text class="small" x="75" y="210">ingest API or</text>
  <text class="small" x="75" y="226">synthetic replay</text>

  <rect class="step event" x="225" y="135" width="140" height="95"/>
  <text class="num" x="245" y="165">2</text>
  <text class="label" x="245" y="190">Raw topic</text>
  <text class="small" x="245" y="210">transactions.raw</text>

  <rect class="step svc" x="405" y="135" width="150" height="95"/>
  <text class="num" x="425" y="165">3</text>
  <text class="label" x="425" y="190">Enrich</text>
  <text class="small" x="425" y="210">behavior window</text>
  <text class="small" x="425" y="226">features</text>

  <rect class="step event" x="595" y="135" width="150" height="95"/>
  <text class="num" x="615" y="165">4</text>
  <text class="label" x="615" y="190">Enriched topic</text>
  <text class="small" x="615" y="210">transactions.enriched</text>

  <rect class="step svc" x="785" y="135" width="150" height="95"/>
  <text class="num" x="805" y="165">5</text>
  <text class="label" x="805" y="190">Score</text>
  <text class="small" x="805" y="210">rules and optional</text>
  <text class="small" x="805" y="226">ML signal</text>

  <rect class="step event" x="975" y="135" width="150" height="95"/>
  <text class="num" x="995" y="165">6</text>
  <text class="label" x="995" y="190">Scored topic</text>
  <text class="small" x="995" y="210">transactions.scored</text>

  <rect class="step svc" x="405" y="335" width="170" height="95"/>
  <text class="num" x="425" y="365">7</text>
  <text class="label" x="425" y="390">Alert workflow</text>
  <text class="small" x="425" y="410">alerts, cases,</text>
  <text class="small" x="425" y="426">analyst decisions</text>

  <rect class="step audit" x="640" y="335" width="170" height="95"/>
  <text class="num" x="660" y="365">8</text>
  <text class="label" x="660" y="390">Audit evidence</text>
  <text class="small" x="660" y="410">actor-bound writes</text>
  <text class="small" x="660" y="426">and recovery state</text>

  <rect class="step svc" x="875" y="335" width="170" height="95"/>
  <text class="num" x="895" y="365">9</text>
  <text class="label" x="895" y="390">Analyst console</text>
  <text class="small" x="895" y="410">review queue and</text>
  <text class="small" x="895" y="426">case workflow</text>

  <path class="arrow" d="M185 183 H225"/>
  <path class="arrow" d="M365 183 H405"/>
  <path class="arrow" d="M555 183 H595"/>
  <path class="arrow" d="M745 183 H785"/>
  <path class="arrow" d="M935 183 H975"/>
  <path class="arrow" d="M1050 230 C1040 300 620 300 490 335"/>
  <path class="arrow" d="M575 383 H640"/>
  <path class="arrow" d="M810 383 H875"/>
  <path class="branch" d="M860 135 C860 75 710 75 665 135"/>
  <text class="small" x="700" y="95">optional model score</text>
</svg>
