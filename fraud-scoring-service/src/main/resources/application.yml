spring:
  application:
    name: fraud-scoring-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      auto-offset-reset: earliest
      group-id: ${spring.application.name}

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http:
          server:
            requests: true

app:
  internal-auth:
    client:
      enabled: ${INTERNAL_AUTH_CLIENT_ENABLED:false}
      mode: ${INTERNAL_AUTH_CLIENT_MODE:TOKEN_VALIDATOR}
      service-name: ${INTERNAL_AUTH_SERVICE_NAME:fraud-scoring-service}
      token: ${INTERNAL_AUTH_TOKEN:}
      allow-token-validator-in-prod: ${INTERNAL_AUTH_ALLOW_TOKEN_VALIDATOR_IN_PROD:false}
      jwt:
        algorithm: ${INTERNAL_AUTH_JWT_ALGORITHM:HS256}
        issuer: ${INTERNAL_AUTH_JWT_ISSUER:}
        audience: ${INTERNAL_AUTH_JWT_AUDIENCE:}
        secret: ${INTERNAL_AUTH_JWT_SECRET:}
        key-id: ${INTERNAL_AUTH_JWT_KEY_ID:}
        private-key-pem: ${INTERNAL_AUTH_JWT_PRIVATE_KEY_PEM:}
        private-key-path: ${INTERNAL_AUTH_JWT_PRIVATE_KEY_PATH:}
        ttl: ${INTERNAL_AUTH_JWT_TTL:5m}
        authorities: ${INTERNAL_AUTH_JWT_AUTHORITIES:}
  kafka:
    topics:
      transaction-enriched: transactions.enriched
      transaction-scored: transactions.scored
      transactions-dead-letter: transactions.dead-letter
    consumer:
      concurrency: 1
      retry-attempts: 3
      retry-backoff-millis: 1000
  scoring:
    high-threshold: 0.75
    critical-threshold: 0.90
    mode: ${SCORING_MODE:RULE_BASED}
    ml:
      base-url: ${ML_MODEL_BASE_URL:http://localhost:8090}
      connect-timeout: ${ML_MODEL_CONNECT_TIMEOUT:500ms}
      read-timeout: ${ML_MODEL_READ_TIMEOUT:1500ms}
