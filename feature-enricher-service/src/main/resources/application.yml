spring:
  application:
    name: feature-enricher-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      auto-offset-reset: earliest
      group-id: ${spring.application.name}

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info

app:
  kafka:
    topics:
      transaction-raw: transactions.raw
      transaction-enriched: transactions.enriched
      transactions-dead-letter: transactions.dead-letter
    consumer:
      concurrency: 1
      retry-attempts: 3
      retry-backoff-millis: 1000
  feature-store:
    recent-transaction-window: PT1M
    merchant-frequency-window: P7D
    transaction-key-ttl: P8D
    known-device-ttl: P180D
    last-transaction-ttl: P30D
