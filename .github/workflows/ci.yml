name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend Maven Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build and test backend modules
        run: mvn -B verify

  ml:
    name: Python ML Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run ML unit tests
        run: python -m unittest discover -s ml-inference-service/tests
        env:
          PYTHONPATH: ml-inference-service

      - name: Validate trained model artifact loads
        run: python -m app.train_model --examples 1000 --epochs 20 --output /tmp/model_artifact.json
        env:
          PYTHONPATH: ml-inference-service

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: analyst-console-ui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: analyst-console-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify generated authority constants
        run: npm run check:authorities

      - name: Run frontend tests
        run: npm test

      - name: Build UI
        run: npm run build

  docker:
    name: Docker Compose Build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs:
      - backend
      - ml
      - frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose file
        run: docker compose -f deployment/docker-compose.yml config --quiet

      - name: Build compose images
        run: docker compose -f deployment/docker-compose.yml build
