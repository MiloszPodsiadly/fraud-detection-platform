x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-service-defaults: &service-defaults
  restart: unless-stopped
  logging: *default-logging
  networks:
    - backend

x-java-healthcheck: &java-healthcheck
  test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health/readiness >/dev/null || exit 1"]
  interval: 15s
  timeout: 5s
  retries: 10
  start_period: 45s

services:
  kafka:
    <<: *service-defaults
    image: apache/kafka:3.8.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  kafka-topics-init:
    image: apache/kafka:3.8.0
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./init-kafka-topics.sh:/opt/init/init-kafka-topics.sh:ro
    environment:
      BOOTSTRAP_SERVER: kafka:9092
    restart: "no"
    command:
      - /bin/bash
      - /opt/init/init-kafka-topics.sh
    logging: *default-logging
    networks:
      - backend

  mongodb:
    <<: *service-defaults
    image: mongo:7.0
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  redis:
    <<: *service-defaults
    image: redis:7.2-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 10s

  ml-inference-service:
    <<: *service-defaults
    build:
      context: ..
      dockerfile: deployment/Dockerfile.ml-inference
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGODB_URI: mongodb://mongodb:27017/fraud_governance
      GOVERNANCE_SNAPSHOT_COLLECTION: ml_governance_snapshots
      GOVERNANCE_SNAPSHOT_RETENTION_LIMIT: "500"
      GOVERNANCE_SNAPSHOT_INTERVAL_REQUESTS: "50"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/health', timeout=2).read()"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 15s

  audit-trust-authority:
    <<: *service-defaults
    build:
      context: ..
      dockerfile: deployment/Dockerfile.backend
      args:
        MODULE_NAME: audit-trust-authority
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: docker,docker-local
      TRUST_AUTHORITY_NAME: ${TRUST_AUTHORITY_NAME:-local-trust-authority}
      TRUST_AUTHORITY_KEY_ID: ${TRUST_AUTHORITY_KEY_ID:-local-ed25519-key-1}
      MONGODB_URI: mongodb://mongodb:27017/fraud_trust_authority?serverSelectionTimeoutMS=5000&connectTimeoutMS=3000&socketTimeoutMS=5000
      TRUST_AUTHORITY_PRIVATE_KEY_PATH: /tmp/audit-trust-authority/ed25519-private.key
      TRUST_AUTHORITY_PUBLIC_KEY_PATH: /tmp/audit-trust-authority/ed25519-public.key
      TRUST_AUTHORITY_AUDIT_PATH: /tmp/audit-trust-authority/trust-authority-audit.jsonl
    healthcheck: *java-healthcheck

  prometheus:
    <<: *service-defaults
    image: prom/prometheus:v3.3.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=2d
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus-data:/prometheus

  grafana:
    <<: *service-defaults
    image: grafana/grafana:11.6.1
    depends_on:
      prometheus:
        condition: service_started
    environment:
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana

  transaction-ingest-service:
    <<: *service-defaults
    build:
      context: ..
      dockerfile: deployment/Dockerfile.backend
      args:
        MODULE_NAME: transaction-ingest-service
    depends_on:
      kafka:
        condition: service_healthy
      kafka-topics-init:
        condition: service_completed_successfully
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: docker
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    healthcheck: *java-healthcheck

  transaction-simulator-service:
    <<: *service-defaults
    build:
      context: ..
      dockerfile: deployment/Dockerfile.backend
      args:
        MODULE_NAME: transaction-simulator-service
    depends_on:
      kafka:
        condition: service_healthy
      kafka-topics-init:
        condition: service_completed_successfully
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: docker
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    volumes:
      - ../data/generated:/app/data/generated
    healthcheck: *java-healthcheck

  feature-enricher-service:
    <<: *service-defaults
    build:
      context: ..
      dockerfile: deployment/Dockerfile.backend
      args:
        MODULE_NAME: feature-enricher-service
    depends_on:
      kafka:
        condition: service_healthy
      kafka-topics-init:
        condition: service_completed_successfully
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: docker
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis
      REDIS_PORT: 6379
    healthcheck: *java-healthcheck

  fraud-scoring-service:
    <<: *service-defaults
    build:
      context: ..
      dockerfile: deployment/Dockerfile.backend
      args:
        MODULE_NAME: fraud-scoring-service
    depends_on:
      kafka:
        condition: service_healthy
      kafka-topics-init:
        condition: service_completed_successfully
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      ml-inference-service:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: docker
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ML_MODEL_BASE_URL: http://ml-inference-service:8090
      SCORING_MODE: SHADOW
    healthcheck: *java-healthcheck

  alert-service:
    <<: *service-defaults
    build:
      context: ..
      dockerfile: deployment/Dockerfile.backend
      args:
        MODULE_NAME: alert-service
    depends_on:
      kafka:
        condition: service_healthy
      kafka-topics-init:
        condition: service_completed_successfully
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      audit-trust-authority:
        condition: service_healthy
      ml-inference-service:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: docker
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MONGODB_URI: mongodb://mongodb:27017/fraud_alerts?serverSelectionTimeoutMS=5000&connectTimeoutMS=3000&socketTimeoutMS=5000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ML_GOVERNANCE_BASE_URL: http://ml-inference-service:8090
      AUDIT_EXTERNAL_ANCHORING_ENABLED: ${AUDIT_EXTERNAL_ANCHORING_ENABLED:-false}
      AUDIT_EXTERNAL_ANCHORING_SINK: ${AUDIT_EXTERNAL_ANCHORING_SINK:-local-file}
      AUDIT_EXTERNAL_ANCHORING_LOCAL_FILE_PATH: ${AUDIT_EXTERNAL_ANCHORING_LOCAL_FILE_PATH:-/tmp/audit-external-anchors.jsonl}
      AUDIT_EXTERNAL_ANCHORING_INITIAL_DELAY_MS: ${AUDIT_EXTERNAL_ANCHORING_INITIAL_DELAY_MS:-5000}
      AUDIT_EXTERNAL_ANCHORING_PUBLISH_DELAY_MS: ${AUDIT_EXTERNAL_ANCHORING_PUBLISH_DELAY_MS:-10000}
      AUDIT_TRUST_AUTHORITY_ENABLED: ${AUDIT_TRUST_AUTHORITY_ENABLED:-false}
      AUDIT_TRUST_AUTHORITY_URL: http://audit-trust-authority:8080
      AUDIT_TRUST_AUTHORITY_SIGNING_REQUIRED: ${AUDIT_TRUST_AUTHORITY_SIGNING_REQUIRED:-false}
      AUDIT_TRUST_AUTHORITY_CALLER_SERVICE_NAME: alert-service
      AUDIT_TRUST_AUTHORITY_CALLER_ENVIRONMENT: ${AUDIT_TRUST_AUTHORITY_CALLER_ENVIRONMENT:-docker-local}
      ASSISTANT_MODE: ${ASSISTANT_MODE:-DETERMINISTIC}
    healthcheck: *java-healthcheck

  analyst-console-ui:
    <<: *service-defaults
    build:
      context: ..
      dockerfile: deployment/Dockerfile.frontend
    depends_on:
      alert-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - backend
      - edge

networks:
  backend:
  edge:

volumes:
  mongodb-data:
  redis-data:
  prometheus-data:
  grafana-data:
