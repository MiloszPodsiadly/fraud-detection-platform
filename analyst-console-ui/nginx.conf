server {
  listen 80;
  server_name _;
  server_tokens off;

  root /usr/share/nginx/html;
  index index.html;

  add_header Content-Security-Policy "default-src 'self'; base-uri 'none'; frame-ancestors 'none'; form-action 'self'; connect-src 'self' http://localhost:8086; img-src 'self' data:; script-src 'self'; style-src 'self'" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;

  location /oauth2/ {
    proxy_pass http://alert-service:8080/oauth2/;
    proxy_http_version 1.1;
    proxy_pass_request_headers on;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Port 4173;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /login/oauth2/ {
    proxy_pass http://alert-service:8080/login/oauth2/;
    proxy_http_version 1.1;
    proxy_pass_request_headers on;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Port 4173;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /bff/ {
    proxy_pass http://alert-service:8080/bff/;
    proxy_http_version 1.1;
    proxy_pass_request_headers on;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Port 4173;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/ {
    proxy_pass http://alert-service:8080/api/;
    proxy_http_version 1.1;
    proxy_pass_request_headers on;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Port 4173;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /governance/advisories {
    proxy_pass http://alert-service:8080/governance/advisories;
    proxy_http_version 1.1;
    proxy_pass_request_headers on;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Port 4173;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /governance/advisories/ {
    proxy_pass http://alert-service:8080/governance/advisories/;
    proxy_http_version 1.1;
    proxy_pass_request_headers on;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Port 4173;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /auth/callback {
    return 302 /;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
