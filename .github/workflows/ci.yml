            alert-service/target/failsafe-reports/
            alert-service/target/fdp38-chaos/

  fdp39-release-governance:
    name: FDP-39 Release Governance Gate
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      FDP39_EVENT_NAME: ${{ github.event_name }}
      FDP39_DIFF_BASE_SHA: ${{ github.event.before || '' }}
      FDP39_DIFF_HEAD_SHA: ${{ github.sha }}
    needs:
      - backend
      - regulated-mutation-regression
      - fdp35-production-readiness
      - fdp36-real-chaos
      - fdp37-production-image-chaos
      - fdp38-live-runtime-checkpoint-chaos

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify Docker is available for FDP-39 release governance
        run: docker version

      - name: Build and export release image filesystem
        run: |
          set -euo pipefail
          docker build -f deployment/Dockerfile.backend --build-arg MODULE_NAME=alert-service -t fdp39-alert-service:${GITHUB_SHA} .
          IMAGE_ID=$(docker image inspect fdp39-alert-service:${GITHUB_SHA} --format '{{.Id}}')
          IMAGE_DIGEST_OR_ID=$(docker image inspect fdp39-alert-service:${GITHUB_SHA} --format '{{if .RepoDigests}}{{index .RepoDigests 0}}{{else}}{{.Id}}{{end}}')
          test -n "$IMAGE_ID"
          test -n "$IMAGE_DIGEST_OR_ID"
          mkdir -p alert-service/target/fdp39-governance/release-image-root
          CONTAINER_ID=$(docker create fdp39-alert-service:${GITHUB_SHA})
          docker export "$CONTAINER_ID" -o alert-service/target/fdp39-governance/release-image.tar
          docker rm "$CONTAINER_ID"
          tar -xf alert-service/target/fdp39-governance/release-image.tar -C alert-service/target/fdp39-governance/release-image-root
          if find alert-service/target/fdp39-governance/release-image-root -path '*target/test-classes*' -print -quit | grep -q .; then
            echo "FDP-39 release image contains test classes"
            exit 1
          fi
          if grep -R -a -E 'Fdp38LiveRuntimeCheckpointBarrierConfiguration|fdp38-live-runtime-checkpoint|Fdp38LiveRuntimeCheckpoint|LIVE_IN_FLIGHT_REQUEST_KILL|RUNTIME_REACHED_TEST_FIXTURE|Dockerfile.alert-service-fdp38-fixture' alert-service/target/fdp39-governance/release-image-root; then
            echo "FDP-39 release image contains FDP-38 fixture/test code"
            exit 1
          fi
          echo "FDP39_RELEASE_IMAGE=fdp39-alert-service:${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "FDP39_RELEASE_IMAGE_ID=${IMAGE_ID}" >> "$GITHUB_ENV"
          echo "FDP39_RELEASE_IMAGE_DIGEST=${IMAGE_DIGEST_OR_ID}" >> "$GITHUB_ENV"

      - name: Build fixture image only for non-release provenance
        run: |
          set -euo pipefail
          docker build -f deployment/Dockerfile.alert-service-fdp38-fixture -t fdp38-alert-service-test-fixture:${GITHUB_SHA} .
          IMAGE_ID=$(docker image inspect fdp38-alert-service-test-fixture:${GITHUB_SHA} --format '{{.Id}}')
          IMAGE_DIGEST_OR_ID=$(docker image inspect fdp38-alert-service-test-fixture:${GITHUB_SHA} --format '{{if .RepoDigests}}{{index .RepoDigests 0}}{{else}}{{.Id}}{{end}}')
          test -n "$IMAGE_ID"
          test -n "$IMAGE_DIGEST_OR_ID"
          echo "FDP39_FIXTURE_IMAGE=fdp38-alert-service-test-fixture:${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "FDP39_FIXTURE_IMAGE_ID=${IMAGE_ID}" >> "$GITHUB_ENV"
          echo "FDP39_FIXTURE_IMAGE_DIGEST=${IMAGE_DIGEST_OR_ID}" >> "$GITHUB_ENV"

      - name: Generate FDP-39 CI governance artifacts
        run: bash scripts/fdp39-generate-governance-artifacts.sh
        env:
          RELEASE_IMAGE_NAME: ${{ env.FDP39_RELEASE_IMAGE }}
          RELEASE_IMAGE_ID: ${{ env.FDP39_RELEASE_IMAGE_ID }}
          RELEASE_IMAGE_DIGEST: ${{ env.FDP39_RELEASE_IMAGE_DIGEST }}
          RELEASE_IMAGE_SCAN_ROOT: alert-service/target/fdp39-governance/release-image-root
          FIXTURE_IMAGE_NAME: ${{ env.FDP39_FIXTURE_IMAGE }}
          FIXTURE_IMAGE_ID: ${{ env.FDP39_FIXTURE_IMAGE_ID }}
          FIXTURE_IMAGE_DIGEST: ${{ env.FDP39_FIXTURE_IMAGE_DIGEST }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Run FDP-39 governance tests
        run: mvn -B -pl alert-service -am "-Dsurefire.failIfNoSpecifiedTests=false" "-Dfdp39.ci-mode=true" "-Dfdp39.event-name=${FDP39_EVENT_NAME}" "-Dfdp39.base-sha=${FDP39_DIFF_BASE_SHA}" "-Dfdp39.head-sha=${FDP39_DIFF_HEAD_SHA}" "-Dfdp39.release-image.scan-root=target/fdp39-governance/release-image-root" "-Dfdp39.commit-sha=${GITHUB_SHA}" "-Dfdp39.branch-name=${GITHUB_REF_NAME}" "-Dfdp39.github-run-id=${GITHUB_RUN_ID}" "-Dfdp39.github-workflow=${GITHUB_WORKFLOW}" "-Dfdp39.release-image.name=${FDP39_RELEASE_IMAGE}" "-Dfdp39.release-image.id=${FDP39_RELEASE_IMAGE_ID}" "-Dfdp39.release-image.digest=${FDP39_RELEASE_IMAGE_DIGEST}" "-Dfdp39.fixture-image.name=${FDP39_FIXTURE_IMAGE}" "-Dfdp39.fixture-image.id=${FDP39_FIXTURE_IMAGE_ID}" "-Dfdp39.fixture-image.digest=${FDP39_FIXTURE_IMAGE_DIGEST}" "-Dtest=RegulatedMutationReleaseImageSeparationTest,FixtureDockerfileMustNotBeUsedByReleaseWorkflowTest,Fdp39GovernanceArtifactsTest,Fdp39NoOverclaimDocumentationTest,Fdp39MustNotChangeRuntimeMutationSemanticsTest,RegulatedMutationRecoveryInspectionGovernanceTest" test

      - name: Verify FDP-39 governance artifacts
        if: always()
        run: node scripts/ci/verify-fdp39-artifacts.mjs

      - name: Upload FDP-39 release governance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fdp39-release-governance-reports
          if-no-files-found: error
          path: |
            alert-service/target/surefire-reports/
            alert-service/target/fdp39-governance/fdp39-*.json
            alert-service/target/fdp39-governance/fdp39-*.md

