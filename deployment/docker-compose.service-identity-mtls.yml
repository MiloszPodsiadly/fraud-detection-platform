services:
  ml-inference-service:
    environment:
      INTERNAL_AUTH_MODE: MTLS_SERVICE_IDENTITY
      INTERNAL_AUTH_PROFILE: docker-local
      INTERNAL_AUTH_ALLOWED_SERVICE_AUTHORITIES: fraud-scoring-service:ml-score,alert-service:governance-read
      INTERNAL_AUTH_MTLS_SERVER_CERTFILE: /run/service-identity/mtls/ml-inference-service.pem
      INTERNAL_AUTH_MTLS_SERVER_KEYFILE: /run/service-identity/mtls/ml-inference-service-key.pem
      INTERNAL_AUTH_MTLS_CA_FILE: /run/service-identity/mtls/local-dev-ca.pem
      INTERNAL_AUTH_MTLS_SPIFFE_TRUST_DOMAIN: fraud-platform
    volumes:
      - ./service-identity/mtls:/run/service-identity/mtls:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import ssl,urllib.request; ctx=ssl.create_default_context(cafile='/run/service-identity/mtls/local-dev-ca.pem'); urllib.request.urlopen('https://localhost:8090/health', context=ctx, timeout=2).read()"]

  fraud-scoring-service:
    environment:
      ML_MODEL_BASE_URL: https://ml-inference-service:8090
      INTERNAL_AUTH_CLIENT_ENABLED: "true"
      INTERNAL_AUTH_CLIENT_MODE: MTLS_SERVICE_IDENTITY
      INTERNAL_AUTH_SERVICE_NAME: fraud-scoring-service
      INTERNAL_AUTH_MTLS_CLIENT_CERTIFICATE_PATH: /run/service-identity/mtls/fraud-scoring-service.pem
      INTERNAL_AUTH_MTLS_CLIENT_PRIVATE_KEY_PATH: /run/service-identity/mtls/fraud-scoring-service-key.pem
      INTERNAL_AUTH_MTLS_CA_CERTIFICATE_PATHS: /run/service-identity/mtls/local-dev-ca.pem
      INTERNAL_AUTH_MTLS_EXPECTED_SERVER_IDENTITY: ml-inference-service
      INTERNAL_AUTH_MTLS_TRUST_ALL: "false"
    volumes:
      - ./service-identity/mtls:/run/service-identity/mtls:ro

  alert-service:
    environment:
      ML_GOVERNANCE_BASE_URL: https://ml-inference-service:8090
      INTERNAL_AUTH_CLIENT_ENABLED: "true"
      INTERNAL_AUTH_CLIENT_MODE: MTLS_SERVICE_IDENTITY
      INTERNAL_AUTH_SERVICE_NAME: alert-service
      INTERNAL_AUTH_MTLS_CLIENT_CERTIFICATE_PATH: /run/service-identity/mtls/alert-service.pem
      INTERNAL_AUTH_MTLS_CLIENT_PRIVATE_KEY_PATH: /run/service-identity/mtls/alert-service-key.pem
      INTERNAL_AUTH_MTLS_CA_CERTIFICATE_PATHS: /run/service-identity/mtls/local-dev-ca.pem
      INTERNAL_AUTH_MTLS_EXPECTED_SERVER_IDENTITY: ml-inference-service
      INTERNAL_AUTH_MTLS_TRUST_ALL: "false"
    volumes:
      - ./service-identity/mtls:/run/service-identity/mtls:ro
