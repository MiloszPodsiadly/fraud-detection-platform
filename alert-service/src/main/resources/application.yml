spring:
  application:
    name: alert-service
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/fraud_alerts}
      auto-index-creation: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      auto-offset-reset: earliest
      group-id: ${spring.application.name}

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http:
          server:
            requests: true

app:
  security:
    demo-auth:
      enabled: ${APP_SECURITY_DEMO_AUTH_ENABLED:false}
    jwt:
      enabled: ${APP_SECURITY_JWT_ENABLED:false}
      # Required when APP_SECURITY_JWT_ENABLED=true.
      # Prefer jwk-set-uri for explicit key discovery in local/integration setups.
      issuer-uri: ${APP_SECURITY_JWT_ISSUER_URI:}
      jwk-set-uri: ${APP_SECURITY_JWT_JWK_SET_URI:}
      user-id-claim: ${APP_SECURITY_JWT_USER_ID_CLAIM:sub}
      access-claim: ${APP_SECURITY_JWT_ACCESS_CLAIM:groups}
      role-mapping:
        fraud-readonly-analyst: READ_ONLY_ANALYST
        fraud-analyst: ANALYST
        fraud-reviewer: REVIEWER
        fraud-ops-admin: FRAUD_OPS_ADMIN
  kafka:
    topics:
      transaction-scored: transactions.scored
      fraud-alerts: fraud.alerts
      fraud-decisions: fraud.decisions
      transactions-dead-letter: transactions.dead-letter
    consumer:
      concurrency: 1
      retry-attempts: 3
      retry-backoff-millis: 1000
  assistant:
    mode: ${ASSISTANT_MODE:DETERMINISTIC}
    ollama-base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    ollama-model: ${OLLAMA_MODEL:llama3.2:3b}
    connect-timeout: ${ASSISTANT_CONNECT_TIMEOUT:500ms}
    read-timeout: ${ASSISTANT_READ_TIMEOUT:45s}
  governance:
    audit:
      ml-governance-base-url: ${ML_GOVERNANCE_BASE_URL:http://localhost:8090}
      history-limit: ${GOVERNANCE_AUDIT_HISTORY_LIMIT:50}
      retention-per-advisory-event: ${GOVERNANCE_AUDIT_RETENTION_PER_ADVISORY_EVENT:500}
      ml-lookup-timeout: ${GOVERNANCE_AUDIT_ML_LOOKUP_TIMEOUT:2s}
