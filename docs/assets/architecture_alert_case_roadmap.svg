<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Alert to fraud case roadmap</title>
  <desc id="desc">Flow from scored alert through analyst decision, fraud case projection, reviewer workflow, and future hardening.</desc>
  <defs>
    <marker id="arrow-ac" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 26px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 14px Arial, sans-serif; fill: #475569; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; rx: 14; }
      .alert { fill: #fff7ed; stroke: #f97316; }
      .decision { fill: #eff6ff; stroke: #3b82f6; }
      .case { fill: #ecfdf5; stroke: #22c55e; }
      .future { fill: #f1f5f9; stroke: #94a3b8; stroke-dasharray: 7 5; }
      .label { font: 700 14px Arial, sans-serif; fill: #111827; }
      .small { font: 400 12px Arial, sans-serif; fill: #475569; }
      .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow-ac); }
      .dashed { stroke: #64748b; stroke-width: 1.9; fill: none; marker-end: url(#arrow-ac); stroke-dasharray: 7 5; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="420"/>
  <text class="title" x="48" y="52">Alert To Case Roadmap</text>
  <text class="subtitle" x="48" y="78">Current local workflow plus explicitly marked future hardening.</text>

  <rect class="box alert" x="70" y="155" width="170" height="82"/>
  <text class="label" x="104" y="188">High-Risk Alert</text>
  <text class="small" x="104" y="210">scored transaction</text>
  <rect class="box decision" x="315" y="155" width="180" height="82"/>
  <text class="label" x="350" y="188">Analyst Decision</text>
  <text class="small" x="350" y="210">regulated mutation</text>
  <rect class="box case" x="575" y="155" width="180" height="82"/>
  <text class="label" x="620" y="188">Fraud Case</text>
  <text class="small" x="620" y="210">local lifecycle</text>
  <rect class="box case" x="835" y="155" width="180" height="82"/>
  <text class="label" x="873" y="188">Review Queue</text>
  <text class="small" x="873" y="210">operator workflow</text>
  <rect class="box future" x="450" y="295" width="315" height="58"/>
  <text class="label" x="485" y="322">Future Hardening</text>
  <text class="small" x="485" y="342">treat as roadmap until implemented and tested</text>

  <path class="arrow" d="M 240 196 L 315 196"/>
  <path class="arrow" d="M 495 196 L 575 196"/>
  <path class="arrow" d="M 755 196 L 835 196"/>
  <path class="dashed" d="M 665 237 C 665 265 620 270 608 295"/>
</svg>
