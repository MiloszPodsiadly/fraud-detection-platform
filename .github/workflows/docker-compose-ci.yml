name: Docker Compose CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-compose-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compose-config:
    name: Compose config / ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: base
            files: -f deployment/docker-compose.yml
          - name: dev
            files: -f deployment/docker-compose.yml -f deployment/docker-compose.dev.yml
          - name: ai-opt-in
            files: -f deployment/docker-compose.yml -f deployment/docker-compose.dev.yml -f deployment/docker-compose.ai.yml
          - name: oidc
            files: -f deployment/docker-compose.yml -f deployment/docker-compose.dev.yml -f deployment/docker-compose.oidc.yml
          - name: jwt-service-identity
            files: -f deployment/docker-compose.yml -f deployment/docker-compose.dev.yml -f deployment/docker-compose.service-identity-jwt.yml
          - name: rs256-service-identity
            files: -f deployment/docker-compose.yml -f deployment/docker-compose.dev.yml -f deployment/docker-compose.service-identity-rs256.yml
          - name: mtls-service-identity
            files: -f deployment/docker-compose.yml -f deployment/docker-compose.dev.yml -f deployment/docker-compose.service-identity-mtls.yml
          - name: hardened
            files: -f deployment/docker-compose.yml -f deployment/docker-compose.dev.yml -f deployment/docker-compose.hardened.yml
          - name: full-local-security-hardened
            files: -f deployment/docker-compose.yml -f deployment/docker-compose.dev.yml -f deployment/docker-compose.oidc.yml -f deployment/docker-compose.service-identity-mtls.yml -f deployment/docker-compose.trust-authority-jwt.yml -f deployment/docker-compose.hardened.yml
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate supported Compose combination
        run: docker compose --env-file deployment/.env.example ${{ matrix.files }} config --quiet

  resolved-security-config:
    name: Resolved Compose Security Assertions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify committed local runtime fixture is explicitly scoped
        run: |
          test -f deployment/.env
          grep -F "Committed local runtime fixture" deployment/.env
          grep -F "intentionally committed for local evaluation" README.md

      - name: Assert base does not publish host ports
        run: docker compose --env-file deployment/.env.example -f deployment/docker-compose.yml config --format json | node scripts/check-compose-security-config.mjs base

      - name: Assert default dev excludes AI and is localhost-only
        run: docker compose --env-file deployment/.env.example -f deployment/docker-compose.yml -f deployment/docker-compose.dev.yml config --format json | node scripts/check-compose-security-config.mjs dev

      - name: Assert opt-in AI config
        run: docker compose --env-file deployment/.env.example -f deployment/docker-compose.yml -f deployment/docker-compose.dev.yml -f deployment/docker-compose.ai.yml config --format json | node scripts/check-compose-security-config.mjs ai

      - name: Assert recommended local security demonstration and app hardening
        run: docker compose --env-file deployment/.env.example -f deployment/docker-compose.yml -f deployment/docker-compose.dev.yml -f deployment/docker-compose.oidc.yml -f deployment/docker-compose.service-identity-mtls.yml -f deployment/docker-compose.trust-authority-jwt.yml -f deployment/docker-compose.hardened.yml config --format json | node scripts/check-compose-security-config.mjs security-hardened

  runtime-smoke:
    name: Runtime Smoke / default dev without AI
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start services and verify health endpoints
        run: bash scripts/ci/compose-runtime-smoke.sh dev

  app-hardening-runtime-smoke:
    name: Runtime Smoke / app hardening
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start services and verify read-only application runtime
        run: bash scripts/ci/compose-runtime-smoke.sh app-hardening

  backend-images:
    name: Backend image / ${{ matrix.module }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - transaction-ingest-service
          - transaction-simulator-service
          - feature-enricher-service
          - fraud-scoring-service
          - alert-service
          - audit-trust-authority
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend module image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployment/Dockerfile.backend
          push: false
          tags: fdp-local/${{ matrix.module }}:${{ github.sha }}
          build-args: |
            MODULE_NAME=${{ matrix.module }}
          cache-from: type=gha,scope=fdp-backend-${{ matrix.module }}
          cache-to: type=gha,mode=max,scope=fdp-backend-${{ matrix.module }}

  service-images:
    name: Service image / ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ml-inference-service
            dockerfile: deployment/Dockerfile.ml-inference
          - name: analyst-console-ui
            dockerfile: deployment/Dockerfile.frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build service image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          tags: fdp-local/${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha,scope=fdp-${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=fdp-${{ matrix.name }}
