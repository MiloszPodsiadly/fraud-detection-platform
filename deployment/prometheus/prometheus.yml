global:
  scrape_interval: 10s
  evaluation_interval: 10s

rule_files:
  - /etc/prometheus/alerts/fdp5-ml-observability.rules.yml

scrape_configs:
  - job_name: ml-inference-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - ml-inference-service:8090

  - job_name: fraud-scoring-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - fraud-scoring-service:8080

  - job_name: alert-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - alert-service:8080
