openapi: 3.0.3
info:
  title: Alert Service API
  version: FDP-20
  description: Authenticated alert-service contracts for analyst workflows, durable platform Audit Read API, bounded audit integrity verification, selected sensitive read-access audit persistence, external anchor verification, bounded evidence export, governance advisory lifecycle projection, and human-review audit. FDP-20 extends tamper evidence outside the primary database boundary. It does not create legal non-repudiation. Audit integrity does not imply certified WORM archive storage, legal notarization, SIEM integration, unbounded export, HSM/KMS signing, or final compliance archive.
servers:
  - url: http://localhost:8085
paths:
  /api/v1/audit/events:
    get:
      summary: List durable platform audit events
      description: Returns bounded newest-first durable platform write/governance audit events from audit_events. This endpoint does not return read-access audit events from read_access_audit_events and is not itself proof that every sensitive platform read was audited. Requires audit:read. Filters are exact-match only; no regex, full-text search, export, aggregation, delete, or update operations are supported. Clients MUST check status before interpreting count or events. AVAILABLE with count 0 is a valid empty result. UNAVAILABLE means audit storage could not be read and returns reason_code AUDIT_STORE_UNAVAILABLE, a stable non-sensitive message, count 0, and an empty events array.
      security:
        - bearerAuth: []
        - demoAuth: []
      parameters:
        - name: event_type
          in: query
          required: false
          schema:
            type: string
            enum: [SUBMIT_ANALYST_DECISION, UPDATE_FRAUD_CASE, READ_AUDIT_EVENTS, VERIFY_AUDIT_INTEGRITY, VERIFY_EXTERNAL_AUDIT_INTEGRITY, EXPORT_AUDIT_EVIDENCE]
        - name: actor_id
          in: query
          required: false
          description: Exact backend-derived actor id match.
          schema:
            type: string
            minLength: 1
            maxLength: 120
        - name: resource_type
          in: query
          required: false
          schema:
            type: string
            enum: [ALERT, FRAUD_CASE, AUDIT_EVENT, AUDIT_INTEGRITY, AUDIT_EXTERNAL_INTEGRITY, AUDIT_EVIDENCE_EXPORT]
        - name: resource_id
          in: query
          required: false
          description: Exact resource id match.
          schema:
            type: string
            minLength: 1
            maxLength: 160
        - name: from
          in: query
          required: false
          description: Inclusive ISO-8601 lower timestamp bound. If provided without to, the upper bound is request time.
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          description: Inclusive ISO-8601 upper timestamp bound.
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: Durable audit events returned or audit storage reported unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditEventReadResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/audit/integrity:
    get:
      summary: Verify bounded audit hash-chain integrity
      description: Performs read-only bounded application-level verification of durable platform audit events against local chain anchors. Requires audit:read. Verifies deterministic event hashes, partition-scoped previous-hash continuity, chain-position continuity, schema version, hash algorithm, fork indicators, and latest local chain-anchor consistency. Supports mode=HEAD, WINDOW, or FULL_CHAIN. WINDOW and HEAD can report an external predecessor without treating the first checked event as a false violation; FULL_CHAIN reports missing predecessors as violations. Returns VALID, INVALID, PARTIAL, or UNAVAILABLE. PARTIAL can mean the bounded result set was filled or the local verification time budget was reached. This endpoint does not repair data, export full audit history, delete/update audit records, provide WORM storage, protection against full DB administrator rewrite, legal notarization, legal non-repudiation, SIEM integration, HSM/KMS signing, or regulator-ready evidence packaging. External anchor verification is a separate audit:verify endpoint. Successful integrity reads create a bounded VERIFY_AUDIT_INTEGRITY audit event.
      security:
        - bearerAuth: []
        - demoAuth: []
      parameters:
        - name: from
          in: query
          required: false
          description: Inclusive ISO-8601 lower timestamp bound.
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          description: Inclusive ISO-8601 upper timestamp bound.
          schema:
            type: string
            format: date-time
        - name: source_service
          in: query
          required: false
          description: Optional bounded source-service chain scope.
          schema:
            type: string
            enum: [alert-service]
        - name: mode
          in: query
          required: false
          description: Verification mode. Defaults to HEAD unless from/to is supplied, in which case default is WINDOW.
          schema:
            type: string
            enum: [HEAD, WINDOW, FULL_CHAIN]
            default: HEAD
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 10000
            default: 100
      responses:
        "200":
          description: Bounded audit integrity verification result or unavailable store status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditIntegrityResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/audit/integrity/external:
    get:
      summary: Verify external audit anchor consistency
      description: Performs bounded read-only comparison between the latest local audit chain anchor and the latest external anchor. Requires audit:verify. Returns VALID, INVALID, PARTIAL, or UNAVAILABLE. Detects missing, stale, ahead, mismatched hash, mismatched local anchor id, mismatched hash algorithm, and unsupported external schema version. This endpoint does not repair data, mutate audit records, export full history, or provide WORM/legal notarization.
      security:
        - bearerAuth: []
        - demoAuth: []
      parameters:
        - name: source_service
          in: query
          required: false
          schema:
            type: string
            enum: [alert-service]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
      responses:
        "200":
          description: External anchor verification result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalAuditIntegrityResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/audit/evidence/export:
    get:
      summary: Export bounded audit evidence
      description: Returns a bounded JSON evidence package for a required source_service and inclusive from/to window. Requires audit:export. Includes safe audit event summaries, event hashes, previous hashes, chain positions, local anchor references, external anchor references when available, external_anchor_status, and anchor_coverage. Clients must treat status=PARTIAL as an incomplete evidence package. It never returns raw payloads, tokens, stack traces, transaction payloads, customer/account/card identifiers, or advisory note bodies. No unbounded export, full-text search, delete, update, cursor pagination, or aggregation is provided.
      security:
        - bearerAuth: []
        - demoAuth: []
      parameters:
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: source_service
          in: query
          required: true
          schema:
            type: string
            enum: [alert-service]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
      responses:
        "200":
          description: Bounded audit evidence export or unavailable local audit store status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditEvidenceExportResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/alerts/{alertId}:
    get:
      summary: Get one alert
      description: Returns one alert for an authenticated analyst. Alert-service records a best-effort sensitive read-access audit event with backend-derived actor identity and bounded metadata only; audit persistence failure does not block the read response.
      security:
        - bearerAuth: []
        - demoAuth: []
      parameters:
        - name: alertId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 160
      responses:
        "200":
          description: Alert details returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObject"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/fraud-cases/{caseId}:
    get:
      summary: Get one fraud case
      description: Returns one fraud case for an authenticated analyst. Alert-service records a best-effort sensitive read-access audit event with backend-derived actor identity and bounded metadata only; audit persistence failure does not block the read response.
      security:
        - bearerAuth: []
        - demoAuth: []
      parameters:
        - name: caseId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 160
      responses:
        "200":
          description: Fraud case details returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObject"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/transactions/scored:
    get:
      summary: List scored transaction projections
      description: Returns a bounded scored transaction page for an authenticated analyst. Alert-service records a best-effort sensitive read-access audit event with a hashed query shape, page/size, bounded result count, and backend-derived actor identity; audit persistence failure does not block the read response.
      security:
        - bearerAuth: []
        - demoAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Scored transaction page returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedGenericObject"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /governance/advisories:
    get:
      summary: List governance advisories with derived lifecycle status
      description: Returns ML advisory events enriched with lifecycle_status derived at read time from latest audit event. Lifecycle is not persisted as source of truth and does not trigger workflow actions. Filtering by lifecycle_status applies to the bounded advisory result set. It does not guarantee global completeness. Alert-service records a best-effort sensitive read-access audit event with a hashed query shape and bounded metadata only; audit persistence failure does not block the read response.
      security:
        - bearerAuth: []
        - demoAuth: []
      parameters:
        - name: severity
          in: query
          required: false
          schema:
            type: string
            enum: [LOW, MEDIUM, HIGH, CRITICAL]
        - name: model_version
          in: query
          required: false
          schema:
            type: string
            maxLength: 80
            pattern: "^[A-Za-z0-9._-]+$"
        - name: lifecycle_status
          in: query
          required: false
          description: Applied after advisory projection and limited to the bounded advisory result set.
          schema:
            $ref: "#/components/schemas/GovernanceAdvisoryLifecycleStatus"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 100
      responses:
        "200":
          description: Advisory list returned with read-time lifecycle projection.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceAdvisoryListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /governance/advisories/analytics:
    get:
      summary: Get bounded governance advisory audit analytics
      description: Returns read-only analytics for the bounded advisory projection window. The advisory population is the distinct advisory_event_id values returned by the advisory projection in the requested window; audit events are used only to classify that population. Analytics are for visibility only; they are not SLA enforcement, do not trigger actions, and are not persisted as source of truth. Alert-service records a best-effort sensitive read-access audit event with bounded metadata only; audit persistence failure does not block the read response.
      security:
        - bearerAuth: []
        - demoAuth: []
      parameters:
        - name: window_days
          in: query
          required: false
          description: Bounded analytics window in days.
          schema:
            type: integer
            minimum: 1
            maximum: 30
            default: 7
      responses:
        "200":
          description: Analytics returned for the bounded window.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceAdvisoryAnalyticsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /governance/advisories/{event_id}:
    get:
      summary: Get one governance advisory with derived lifecycle status
      description: Returns one bounded-history advisory event enriched with lifecycle_status derived at read time from latest audit event. Alert-service records a best-effort sensitive read-access audit event with backend-derived actor identity and bounded metadata only; audit persistence failure does not block the read response.
      security:
        - bearerAuth: []
        - demoAuth: []
      parameters:
        - $ref: "#/components/parameters/EventId"
      responses:
        "200":
          description: Advisory event returned with lifecycle projection.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceAdvisoryEvent"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /governance/advisories/{event_id}/audit:
    get:
      summary: List governance advisory audit history
      description: Returns bounded newest-first human-review audit history for one governance advisory event. Alert-service records a best-effort sensitive read-access audit event with backend-derived actor identity and bounded metadata only; audit persistence failure does not block the read response.
      security:
        - bearerAuth: []
        - demoAuth: []
      parameters:
        - $ref: "#/components/parameters/EventId"
      responses:
        "200":
          description: Audit history returned. Status may be UNAVAILABLE when storage cannot be read.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceAuditHistoryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      summary: Append governance advisory audit event
      description: Records human review only. Does not mutate advisory events, scoring, model behavior, retraining, rollback, or fraud decisions.
      security:
        - bearerAuth: []
        - demoAuth: []
      parameters:
        - $ref: "#/components/parameters/EventId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GovernanceAuditRequest"
            example:
              decision: ACKNOWLEDGED
              note: Reviewed by operator
      responses:
        "201":
          description: Audit event appended.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceAuditEvent"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    demoAuth:
      type: apiKey
      in: header
      name: X-Demo-User-Id
      description: Local/dev demo auth headers; roles are supplied through X-Demo-Roles.
  parameters:
    EventId:
      name: event_id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 120
        pattern: "^[A-Za-z0-9._:-]+$"
  schemas:
    GenericObject:
      type: object
      additionalProperties: true
    PagedGenericObject:
      type: object
      required:
        - content
        - page
        - size
        - totalElements
        - totalPages
      additionalProperties: true
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/GenericObject"
        page:
          type: integer
          minimum: 0
        size:
          type: integer
          minimum: 1
        totalElements:
          type: integer
          minimum: 0
        totalPages:
          type: integer
          minimum: 0
    AuditEventReadResponse:
      type: object
      additionalProperties: false
      required:
        - status
        - count
        - limit
        - events
      properties:
        status:
          type: string
          enum: [AVAILABLE, UNAVAILABLE]
        reason_code:
          type: string
          nullable: true
          description: Null when status is AVAILABLE. When status is UNAVAILABLE, this is AUDIT_STORE_UNAVAILABLE.
          enum: [AUDIT_STORE_UNAVAILABLE]
        message:
          type: string
          nullable: true
          description: Null when status is AVAILABLE. When status is UNAVAILABLE, this is a stable non-sensitive reason message.
          maxLength: 120
        count:
          type: integer
          minimum: 0
        limit:
          type: integer
          minimum: 1
          maximum: 100
        events:
          type: array
          items:
            $ref: "#/components/schemas/AuditEvent"
    AuditEvent:
      type: object
      additionalProperties: false
      required:
        - audit_event_id
        - event_type
        - actor_id
        - actor_display_name
        - actor_roles
        - actor_type
        - resource_type
        - resource_id
        - action
        - outcome
        - occurred_at
        - correlation_id
        - source_service
        - partition_key
        - chain_position
        - request_id
        - metadata_summary
        - previous_event_hash
        - event_hash
        - hash_algorithm
        - schema_version
      properties:
        audit_event_id:
          type: string
        event_type:
          type: string
          enum: [SUBMIT_ANALYST_DECISION, UPDATE_FRAUD_CASE, READ_AUDIT_EVENTS, VERIFY_AUDIT_INTEGRITY, VERIFY_EXTERNAL_AUDIT_INTEGRITY, EXPORT_AUDIT_EVIDENCE]
        actor_id:
          type: string
          description: Backend-derived authenticated actor identity.
        actor_display_name:
          type: string
        actor_roles:
          type: array
          items:
            type: string
        actor_type:
          type: string
          enum: [HUMAN]
        resource_type:
          type: string
          enum: [ALERT, FRAUD_CASE, AUDIT_EVENT, AUDIT_INTEGRITY, AUDIT_EXTERNAL_INTEGRITY, AUDIT_EVIDENCE_EXPORT]
        resource_id:
          type: string
          nullable: true
        action:
          type: string
          enum: [SUBMIT_ANALYST_DECISION, UPDATE_FRAUD_CASE, READ_AUDIT_EVENTS, VERIFY_AUDIT_INTEGRITY, VERIFY_EXTERNAL_AUDIT_INTEGRITY, EXPORT_AUDIT_EVIDENCE]
        outcome:
          type: string
          enum: [SUCCESS, REJECTED, FAILED]
        occurred_at:
          type: string
          format: date-time
        correlation_id:
          type: string
          nullable: true
          maxLength: 120
        source_service:
          type: string
          enum: [alert-service]
        partition_key:
          type: string
          enum: ["source_service:alert-service"]
          description: Partition used for previous_event_hash continuity.
        chain_position:
          type: integer
          format: int64
          nullable: true
          minimum: 1
          description: Unique per-partition chain position for FDP-19 audit records; null only for immutable legacy local records created before chain positions existed.
        request_id:
          type: string
          nullable: true
          maxLength: 120
        metadata_summary:
          $ref: "#/components/schemas/AuditEventMetadataSummary"
        previous_event_hash:
          type: string
          nullable: true
          description: Previous event hash within the source_service-scoped audit chain.
        event_hash:
          type: string
          description: SHA-256 canonical hash of immutable audit event fields excluding event_hash itself.
        hash_algorithm:
          type: string
          enum: [SHA-256]
        schema_version:
          type: string
          enum: ["1.0"]
    AuditEventMetadataSummary:
      type: object
      additionalProperties: false
      description: Bounded safe metadata summary. Does not include raw payloads, feature vectors, tokens, secrets, stack traces, or customer/account/card data.
      required:
        - correlation_id
        - request_id
        - source_service
        - schema_version
        - failure_category
        - failure_reason
        - endpoint_action
        - filters_summary
        - count_returned
      properties:
        correlation_id:
          type: string
          nullable: true
          maxLength: 120
        request_id:
          type: string
          nullable: true
          maxLength: 120
        source_service:
          type: string
          nullable: true
          enum: [alert-service]
        schema_version:
          type: string
          nullable: true
          enum: ["1.0"]
        failure_category:
          type: string
          nullable: true
          enum: [NONE, VALIDATION, AUTHORIZATION, DEPENDENCY, CONFLICT, UNKNOWN]
        failure_reason:
          type: string
          nullable: true
          maxLength: 120
        endpoint_action:
          type: string
          nullable: true
          maxLength: 120
        filters_summary:
          type: string
          nullable: true
          maxLength: 120
        count_returned:
          type: integer
          nullable: true
          minimum: 0
          maximum: 10000
    AuditIntegrityResponse:
      type: object
      additionalProperties: false
      required:
        - status
        - checked
        - limit
        - verification_mode
        - partial_window
        - external_predecessor
        - window_start_has_external_predecessor
        - violations
      properties:
        status:
          type: string
          enum: [VALID, INVALID, PARTIAL, UNAVAILABLE]
        checked:
          type: integer
          minimum: 0
        limit:
          type: integer
          minimum: 1
          maximum: 10000
        verification_mode:
          type: string
          nullable: true
          enum: [HEAD, WINDOW, FULL_CHAIN]
        partial_window:
          type: boolean
        external_predecessor:
          type: boolean
        window_start_has_external_predecessor:
          type: boolean
        reason_code:
          type: string
          nullable: true
          enum: [AUDIT_STORE_UNAVAILABLE, INTEGRITY_VERIFICATION_TIME_BUDGET_EXCEEDED]
        message:
          type: string
          nullable: true
          maxLength: 120
        first_event_hash:
          type: string
          nullable: true
        last_event_hash:
          type: string
          nullable: true
        partition_key:
          type: string
          nullable: true
          enum: ["source_service:alert-service"]
        last_anchor_hash:
          type: string
          nullable: true
        violations:
          type: array
          items:
            $ref: "#/components/schemas/AuditIntegrityViolation"
    AuditIntegrityViolation:
      type: object
      additionalProperties: false
      required:
        - violation_type
        - position
        - reason_code
      properties:
        violation_type:
          type: string
          enum: [EVENT_HASH_MISMATCH, PREVIOUS_HASH_MISMATCH, INVALID_SCHEMA_VERSION, UNSUPPORTED_HASH_ALGORITHM, ANCHOR_MISSING, ANCHOR_HASH_MISMATCH, ANCHOR_CHAIN_POSITION_MISMATCH, MISSING_PREDECESSOR, CHAIN_FORK_DETECTED, CHAIN_POSITION_INVALID, CHAIN_POSITION_DUPLICATE, CHAIN_POSITION_GAP, EXTERNAL_ANCHOR_MISSING, STALE_EXTERNAL_ANCHOR, EXTERNAL_CHAIN_POSITION_AHEAD, EXTERNAL_HASH_MISMATCH, EXTERNAL_CHAIN_POSITION_MISMATCH, EXTERNAL_HASH_ALGORITHM_MISMATCH, EXTERNAL_SCHEMA_VERSION_UNSUPPORTED, EXTERNAL_LOCAL_ANCHOR_ID_MISMATCH]
        position:
          type: integer
          minimum: 1
        reason_code:
          type: string
          enum: [EVENT_HASH_MISMATCH, PREVIOUS_HASH_MISMATCH, UNSUPPORTED_SCHEMA_VERSION, UNSUPPORTED_HASH_ALGORITHM, ANCHOR_MISSING, ANCHOR_HASH_MISMATCH, ANCHOR_CHAIN_POSITION_MISMATCH, MISSING_PREDECESSOR, CHAIN_FORK_DETECTED, CHAIN_POSITION_INVALID, CHAIN_POSITION_DUPLICATE, CHAIN_POSITION_GAP, EXTERNAL_ANCHOR_MISSING, STALE_EXTERNAL_ANCHOR, EXTERNAL_CHAIN_POSITION_AHEAD, EXTERNAL_HASH_MISMATCH, EXTERNAL_CHAIN_POSITION_MISMATCH, EXTERNAL_HASH_ALGORITHM_MISMATCH, EXTERNAL_SCHEMA_VERSION_UNSUPPORTED, EXTERNAL_LOCAL_ANCHOR_ID_MISMATCH]
    ExternalAuditIntegrityResponse:
      type: object
      additionalProperties: false
      required: [status, checked, limit, source_service, partition_key, violations]
      properties:
        status:
          type: string
          enum: [VALID, INVALID, PARTIAL, UNAVAILABLE]
        checked:
          type: integer
          minimum: 0
        limit:
          type: integer
          minimum: 1
          maximum: 500
        source_service:
          type: string
          enum: [alert-service]
        partition_key:
          type: string
          enum: ["source_service:alert-service"]
        reason_code:
          type: string
          nullable: true
          enum: [AUDIT_STORE_UNAVAILABLE, EXTERNAL_ANCHOR_STORE_UNAVAILABLE, EXTERNAL_ANCHOR_MISSING, STALE_EXTERNAL_ANCHOR]
        message:
          type: string
          nullable: true
          maxLength: 160
        local_anchor:
          nullable: true
          $ref: "#/components/schemas/AuditAnchorSummary"
        external_anchor:
          nullable: true
          $ref: "#/components/schemas/AuditAnchorSummary"
        violations:
          type: array
          items:
            $ref: "#/components/schemas/AuditIntegrityViolation"
    AuditEvidenceExportResponse:
      type: object
      additionalProperties: false
      required: [status, count, limit, source_service, from, to, external_anchor_status, anchor_coverage, events]
      properties:
        status:
          type: string
          enum: [AVAILABLE, PARTIAL, UNAVAILABLE]
          description: AVAILABLE means local events, local anchors, and external anchors were available. PARTIAL means the export is incomplete as an evidence package.
        count:
          type: integer
          minimum: 0
        limit:
          type: integer
          minimum: 1
          maximum: 500
        source_service:
          type: string
          enum: [alert-service]
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time
        reason_code:
          type: string
          nullable: true
          enum:
            - AUDIT_STORE_UNAVAILABLE
            - EXTERNAL_ANCHORS_DISABLED
            - EXTERNAL_ANCHORS_UNAVAILABLE
            - EXTERNAL_ANCHOR_COVERAGE_INCOMPLETE
            - LEGACY_UNANCHORED_EVENTS
        message:
          type: string
          nullable: true
          maxLength: 160
        external_anchor_status:
          type: string
          enum: [AVAILABLE, PARTIAL, UNAVAILABLE, DISABLED]
        anchor_coverage:
          $ref: "#/components/schemas/AuditEvidenceExportAnchorCoverage"
        events:
          type: array
          items:
            $ref: "#/components/schemas/AuditEvidenceExportEvent"
    AuditEvidenceExportAnchorCoverage:
      type: object
      additionalProperties: false
      required:
        - local_anchors_available_count
        - external_anchors_available_count
        - events_without_local_anchor_count
        - events_without_external_anchor_count
      properties:
        local_anchors_available_count:
          type: integer
          minimum: 0
        external_anchors_available_count:
          type: integer
          minimum: 0
        events_without_local_anchor_count:
          type: integer
          minimum: 0
        events_without_external_anchor_count:
          type: integer
          minimum: 0
    AuditEvidenceExportEvent:
      type: object
      additionalProperties: false
      required: [audit_event_id, event_type, actor_id, actor_roles, resource_type, action, outcome, occurred_at, metadata_summary, event_hash, chain_position]
      properties:
        audit_event_id:
          type: string
        event_type:
          type: string
        actor_id:
          type: string
        actor_roles:
          type: array
          items:
            type: string
        resource_type:
          type: string
        resource_id:
          type: string
          nullable: true
        action:
          type: string
        outcome:
          type: string
          enum: [SUCCESS, REJECTED, FAILED]
        occurred_at:
          type: string
          format: date-time
        metadata_summary:
          $ref: "#/components/schemas/AuditEventMetadataSummary"
        event_hash:
          type: string
        previous_event_hash:
          type: string
          nullable: true
        chain_position:
          type: integer
          format: int64
          nullable: true
        local_anchor:
          nullable: true
          $ref: "#/components/schemas/AuditEvidenceExportAnchorReference"
        external_anchor:
          nullable: true
          $ref: "#/components/schemas/AuditEvidenceExportAnchorReference"
    AuditEvidenceExportAnchorReference:
      type: object
      additionalProperties: false
      required: [chain_position, last_event_hash, hash_algorithm]
      properties:
        anchor_id:
          type: string
          nullable: true
        external_anchor_id:
          type: string
          nullable: true
        local_anchor_id:
          type: string
          nullable: true
        chain_position:
          type: integer
          format: int64
          minimum: 1
        last_event_hash:
          type: string
        hash_algorithm:
          type: string
          enum: [SHA-256]
        schema_version:
          type: string
          nullable: true
          enum: ["1.0"]
        sink_type:
          type: string
          nullable: true
          enum: [local-file]
        publication_status:
          type: string
          nullable: true
          enum: [PUBLISHED]
    AuditAnchorSummary:
      type: object
      additionalProperties: false
      properties:
        anchor_id:
          type: string
          nullable: true
        external_anchor_id:
          type: string
          nullable: true
        local_anchor_id:
          type: string
          nullable: true
        chain_position:
          type: integer
          format: int64
          minimum: 1
        last_event_hash:
          type: string
        hash_algorithm:
          type: string
          enum: [SHA-256]
        schema_version:
          type: string
          nullable: true
          enum: ["1.0"]
        created_at:
          type: string
          format: date-time
          nullable: true
        sink_type:
          type: string
          nullable: true
          enum: [local-file, disabled]
        publication_status:
          type: string
          nullable: true
          enum: [PUBLISHED]
    GovernanceAdvisoryLifecycleStatus:
      type: string
      description: Read-time projection from latest audit decision. OPEN means no audit event exists.
      enum:
        - OPEN
        - ACKNOWLEDGED
        - NEEDS_FOLLOW_UP
        - DISMISSED_AS_NOISE
    GovernanceAdvisoryListResponse:
      type: object
      required:
        - status
        - count
        - retention_limit
        - advisory_events
      properties:
        status:
          type: string
        count:
          type: integer
        retention_limit:
          type: integer
        advisory_events:
          type: array
          items:
            $ref: "#/components/schemas/GovernanceAdvisoryEvent"
    GovernanceAdvisoryAnalyticsResponse:
      type: object
      additionalProperties: false
      required:
        - status
        - window
        - totals
        - decision_distribution
        - lifecycle_distribution
        - review_timeliness
      properties:
        status:
          type: string
          description: AVAILABLE when advisory and audit sources are both readable, PARTIAL when one source is degraded or the audit scan limit is exceeded, and UNAVAILABLE when both sources are unavailable.
          enum: [AVAILABLE, PARTIAL, UNAVAILABLE]
        reason:
          type: string
          nullable: true
          description: Optional degradation reason returned only for PARTIAL or UNAVAILABLE analytics responses.
          enum: [AUDIT_LIMIT_EXCEEDED, AUDIT_UNAVAILABLE, ADVISORY_UNAVAILABLE]
        window:
          type: object
          additionalProperties: false
          required: [from, to, days]
          properties:
            from:
              type: string
              format: date-time
            to:
              type: string
              format: date-time
            days:
              type: integer
              minimum: 1
              maximum: 30
        totals:
          type: object
          additionalProperties: false
          description: Counts distinct advisory_event_id values from the bounded advisory projection window. reviewed means at least one matching audit event exists; open means zero matching audit events exist.
          required: [advisories, reviewed, open]
          properties:
            advisories:
              type: integer
              minimum: 0
            reviewed:
              type: integer
              minimum: 0
            open:
              type: integer
              minimum: 0
        decision_distribution:
          type: object
          description: Latest audit decision distribution for reviewed advisories in the bounded advisory projection window. Audit-only advisory IDs outside that projection are not counted.
          additionalProperties:
            type: integer
            minimum: 0
          properties:
            ACKNOWLEDGED:
              type: integer
              minimum: 0
            NEEDS_FOLLOW_UP:
              type: integer
              minimum: 0
            DISMISSED_AS_NOISE:
              type: integer
              minimum: 0
        lifecycle_distribution:
          type: object
          description: Lifecycle distribution of the bounded advisory projection after read-time lifecycle enrichment. Counts sum to totals.advisories.
          additionalProperties:
            type: integer
            minimum: 0
          properties:
            OPEN:
              type: integer
              minimum: 0
            ACKNOWLEDGED:
              type: integer
              minimum: 0
            NEEDS_FOLLOW_UP:
              type: integer
              minimum: 0
            DISMISSED_AS_NOISE:
              type: integer
              minimum: 0
        review_timeliness:
          type: object
          additionalProperties: false
          description: Time-to-first-review percentiles in minutes. Only advisories with at least one valid non-negative audit duration are sampled; status is LOW_CONFIDENCE when fewer than five valid samples exist.
          required:
            - status
            - time_to_first_review_p50_minutes
            - time_to_first_review_p95_minutes
          properties:
            status:
              type: string
              enum: [AVAILABLE, LOW_CONFIDENCE]
            time_to_first_review_p50_minutes:
              type: number
              minimum: 0
            time_to_first_review_p95_minutes:
              type: number
              minimum: 0
    GovernanceAdvisoryEvent:
      type: object
      required:
        - event_id
        - event_type
        - severity
        - drift_status
        - confidence
        - advisory_confidence_context
        - model_name
        - model_version
        - lifecycle_context
        - recommended_actions
        - created_at
        - lifecycle_status
      properties:
        event_id:
          type: string
        event_type:
          type: string
        severity:
          type: string
        drift_status:
          type: string
        confidence:
          type: string
        advisory_confidence_context:
          type: string
        model_name:
          type: string
        model_version:
          type: string
        lifecycle_context:
          type: object
          additionalProperties: true
        recommended_actions:
          type: array
          items:
            type: string
        explanation:
          type: string
          nullable: true
        created_at:
          type: string
        lifecycle_status:
          $ref: "#/components/schemas/GovernanceAdvisoryLifecycleStatus"
    GovernanceAuditRequest:
      type: object
      additionalProperties: false
      required:
        - decision
      properties:
        decision:
          type: string
          enum:
            - ACKNOWLEDGED
            - NEEDS_FOLLOW_UP
            - DISMISSED_AS_NOISE
        note:
          type: string
          nullable: true
          maxLength: 500
      description: Actor fields are not accepted from clients; actor attribution is backend-derived.
    GovernanceAuditHistoryResponse:
      type: object
      required:
        - advisory_event_id
        - status
        - audit_events
      properties:
        advisory_event_id:
          type: string
        status:
          type: string
          enum:
            - AVAILABLE
            - UNAVAILABLE
        audit_events:
          type: array
          items:
            $ref: "#/components/schemas/GovernanceAuditEvent"
    GovernanceAuditEvent:
      type: object
      required:
        - audit_id
        - advisory_event_id
        - decision
        - actor_id
        - actor_display_name
        - actor_roles
        - created_at
        - model_name
        - model_version
        - advisory_severity
        - advisory_confidence
        - advisory_confidence_context
      properties:
        audit_id:
          type: string
        advisory_event_id:
          type: string
        decision:
          type: string
          enum:
            - ACKNOWLEDGED
            - NEEDS_FOLLOW_UP
            - DISMISSED_AS_NOISE
        note:
          type: string
          nullable: true
          maxLength: 500
        actor_id:
          type: string
        actor_display_name:
          type: string
        actor_roles:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        model_name:
          type: string
        model_version:
          type: string
        advisory_severity:
          type: string
        advisory_confidence:
          type: string
        advisory_confidence_context:
          type: string
    ApiErrorResponse:
      type: object
      required:
        - timestamp
        - status
        - error
        - message
        - details
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: string
  responses:
    BadRequest:
      description: Request validation failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    Unauthorized:
      description: Authentication is required.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    Forbidden:
      description: Authenticated actor lacks the required authority.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    NotFound:
      description: Advisory event was not found in bounded advisory history.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    ServiceUnavailable:
      description: Audit persistence or advisory lookup is unavailable.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
