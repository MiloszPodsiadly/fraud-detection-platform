name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend Maven Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build and test backend modules
        run: mvn -B verify

  ml:
    name: Python ML Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ML dependencies
        run: pip install -r ml-inference-service/requirements.txt

      - name: Run ML unit tests
        run: python -m unittest discover -s ml-inference-service/tests
        env:
          PYTHONPATH: ml-inference-service

      - name: Validate trained model artifact loads
        run: python -m app.train_model --examples 1000 --epochs 20 --output /tmp/model_artifact.json
        env:
          PYTHONPATH: ml-inference-service

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: analyst-console-ui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: analyst-console-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify generated authority constants
        run: npm run check:authorities

      - name: Run frontend tests
        run: npm test

      - name: Build UI
        run: npm run build

  fdp28-proof:
    name: FDP-28 Docker Integration Proof
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Verify Docker is available for Testcontainers
        run: docker version

      - name: Run FDP-28 proof suite with Testcontainers
        run: mvn -B -pl alert-service -am -Dgroups=failure-injection,invariant-proof,integration test

  fdp35-production-readiness:
    name: FDP-35 Production Readiness Proof
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Verify Docker is available for Testcontainers
        run: docker version

      - name: Run FDP-35 proof suite
        run: mvn -B -pl alert-service -am -Dgroups=production-readiness,e2e,recovery-proof,integration test

      - name: Upload FDP-35 test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fdp35-production-readiness-test-reports
          if-no-files-found: ignore
          path: |
            alert-service/target/surefire-reports/
            alert-service/target/failsafe-reports/

  fdp36-real-chaos:
    name: FDP-36 Real Alert-Service Kill Proof
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Verify Docker is available for Testcontainers
        run: docker version

      - name: Run FDP-36 real alert-service kill suite
        run: mvn -B -pl alert-service -am "-Dsurefire.failIfNoSpecifiedTests=false" "-Dgroups=real-chaos,docker-chaos,service-chaos,integration" "-Dtest=RegulatedMutationRealAlertServiceChaosIT,RegulatedMutationRealAlertServiceEvidenceIntegrityIT,RegulatedMutationLiveInFlightKillIT" test

      - name: Generate FDP-36 proof summary
        if: always()
        run: |
          mkdir -p alert-service/target/fdp36-chaos
          SUMMARY=alert-service/target/fdp36-chaos/fdp36-proof-summary.md
          TESTCASE_COUNT=$(find alert-service/target/surefire-reports -name 'TEST-RegulatedMutation*IT.xml' -print0 2>/dev/null | xargs -0 grep -h '<testcase ' 2>/dev/null | wc -l | tr -d ' ')
          KILLED_IDS=$(grep -ho 'killed_process=[0-9][0-9]*' alert-service/target/fdp36-chaos/evidence-summary.md 2>/dev/null | cut -d= -f2 | sort -u | paste -sd ',' -)
          RESTARTED_IDS=$(grep -ho 'restarted_process=[0-9][0-9]*' alert-service/target/fdp36-chaos/evidence-summary.md 2>/dev/null | cut -d= -f2 | sort -u | paste -sd ',' -)
          {
            echo "# FDP-36 Proof Summary"
            echo
            echo "- commit_sha: ${GITHUB_SHA:-local}"
            echo "- run_timestamp_utc: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "- killed_target_name: actual alert-service JVM/process"
            echo "- killed_process_ids: ${KILLED_IDS:-NOT_RECORDED}"
            echo "- restarted_process_ids: ${RESTARTED_IDS:-NOT_RECORDED}"
            echo "- proof_levels: REAL_ALERT_SERVICE_KILL, REAL_ALERT_SERVICE_RESTART_API_PROOF, LIVE_IN_FLIGHT_REQUEST_KILL"
            echo "- scenario_count: ${TESTCASE_COUNT}"
            echo "- test_classes_executed: RegulatedMutationRealAlertServiceChaosIT, RegulatedMutationRealAlertServiceEvidenceIntegrityIT, RegulatedMutationLiveInFlightKillIT"
            echo "- surefire_xml_report_paths: alert-service/target/surefire-reports/TEST-RegulatedMutationRealAlertServiceChaosIT.xml, alert-service/target/surefire-reports/TEST-RegulatedMutationRealAlertServiceEvidenceIntegrityIT.xml, alert-service/target/surefire-reports/TEST-RegulatedMutationLiveInFlightKillIT.xml"
            echo "- final_status: ${{ job.status }}"
            echo
            echo "killed target: actual alert-service JVM/process"
            echo "Docker/Testcontainers are infrastructure dependencies, not the killed alert-service image."
            echo "FDP-36 real chaos is not sufficient without regulated-mutation-regression."
          } > "$SUMMARY"

      - name: Print FDP-36 chaos evidence summary
        if: always()
        run: |
          echo "killed target: actual alert-service JVM/process"
          echo "Docker/Testcontainers are infrastructure dependencies, not the killed alert-service image."
          echo "FDP-36 real chaos is not sufficient without regulated-mutation-regression."
          echo "restarted target: actual alert-service JVM/process"
          echo "scenario count: $(find alert-service/target/surefire-reports -name 'TEST-RegulatedMutationRealAlertService*.xml' -print0 | xargs -0 grep -h '<testcase ' | wc -l)"
          echo "proof levels covered: REAL_ALERT_SERVICE_KILL, REAL_ALERT_SERVICE_RESTART_API_PROOF, LIVE_IN_FLIGHT_REQUEST_KILL"
          if [ -f alert-service/target/fdp36-chaos/fdp36-proof-summary.md ]; then
            cat alert-service/target/fdp36-chaos/fdp36-proof-summary.md
          else
            echo "missing alert-service/target/fdp36-chaos/fdp36-proof-summary.md"
            exit 1
          fi
          if [ -f alert-service/target/fdp36-chaos/evidence-summary.md ]; then
            cat alert-service/target/fdp36-chaos/evidence-summary.md
          else
            echo "missing alert-service/target/fdp36-chaos/evidence-summary.md"
            exit 1
          fi

      - name: Upload FDP-36 real chaos reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fdp36-real-chaos-test-reports
          if-no-files-found: ignore
          path: |
            alert-service/target/surefire-reports/
            alert-service/target/failsafe-reports/
            alert-service/target/fdp36-chaos/

  fdp37-production-image-chaos:
    name: FDP-37 Production Image Chaos Proof
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - fdp36-real-chaos
      - regulated-mutation-regression
      - fdp35-production-readiness

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Verify Docker is available for production-image chaos
        run: docker version

      - name: Build alert-service production-like image
        run: |
          docker build -f deployment/Dockerfile.backend --build-arg MODULE_NAME=alert-service -t fdp37-alert-service:${GITHUB_SHA} .
          IMAGE_ID=$(docker image inspect fdp37-alert-service:${GITHUB_SHA} --format '{{.Id}}')
          IMAGE_DIGEST_OR_ID=$(docker image inspect fdp37-alert-service:${GITHUB_SHA} --format '{{if .RepoDigests}}{{index .RepoDigests 0}}{{else}}{{.Id}}{{end}}')
          echo "FDP37_ALERT_SERVICE_IMAGE=fdp37-alert-service:${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "FDP37_ALERT_SERVICE_IMAGE_ID=${IMAGE_ID}" >> "$GITHUB_ENV"
          echo "FDP37_ALERT_SERVICE_IMAGE_DIGEST=${IMAGE_DIGEST_OR_ID}" >> "$GITHUB_ENV"
          echo "Built FDP-37 image fdp37-alert-service:${GITHUB_SHA} with image id ${IMAGE_ID} and digest/id ${IMAGE_DIGEST_OR_ID}"

      - name: Run FDP-37 production image chaos suite
        run: mvn -B -pl alert-service -am "-Dsurefire.failIfNoSpecifiedTests=false" "-Dfdp37.alert-service.image=${FDP37_ALERT_SERVICE_IMAGE}" "-Dfdp37.alert-service.image-id=${FDP37_ALERT_SERVICE_IMAGE_ID}" "-Dfdp37.alert-service.image-digest=${FDP37_ALERT_SERVICE_IMAGE_DIGEST}" "-Dgroups=fdp37,production-image-chaos,docker-chaos,integration" "-Dtest=RegulatedMutationProductionImageChaosIT,RegulatedMutationProductionImageEvidenceIntegrityIT,RegulatedMutationProductionImageConfigParityIT,RegulatedMutationProductionImageRollbackIT,RegulatedMutationProductionImageRequiredTransactionChaosIT" test
        env:
          REGULATED_MUTATION_REGRESSION_STATUS: PASS
          FDP35_STATUS: PASS
          FDP36_STATUS: PASS

      - name: Verify FDP-37 proof artifacts
        if: always()
        run: |
          SUMMARY_MD=alert-service/target/fdp37-chaos/fdp37-proof-summary.md
          SUMMARY_JSON=alert-service/target/fdp37-chaos/fdp37-proof-summary.json
          ENABLEMENT_MD=alert-service/target/fdp37-chaos/fdp37-enablement-review-pack.md
          ENABLEMENT_JSON=alert-service/target/fdp37-chaos/fdp37-enablement-review-pack.json
          EVIDENCE=alert-service/target/fdp37-chaos/evidence-summary.md
          ROLLBACK_MD=alert-service/target/fdp37-chaos/fdp37-rollback-validation.md
          ROLLBACK_JSON=alert-service/target/fdp37-chaos/fdp37-rollback-validation.json
          test -f "$SUMMARY_MD"
          test -f "$SUMMARY_JSON"
          test -f "$ENABLEMENT_MD"
          test -f "$ENABLEMENT_JSON"
          test -f "$EVIDENCE"
          test -f "$ROLLBACK_MD"
          test -f "$ROLLBACK_JSON"
          python - <<'PY'
          import json
          import os
          import pathlib
          import sys
          import xml.etree.ElementTree as ET

          reports = pathlib.Path("alert-service/target/surefire-reports")
          required = [
              "RegulatedMutationProductionImageChaosIT",
              "RegulatedMutationProductionImageEvidenceIntegrityIT",
              "RegulatedMutationProductionImageConfigParityIT",
              "RegulatedMutationProductionImageRollbackIT",
              "RegulatedMutationProductionImageRequiredTransactionChaosIT",
          ]
          for class_name in required:
              report = reports / f"TEST-com.frauddetection.alert.regulated.{class_name}.xml"
              if not report.exists():
                  print(f"Missing required FDP-37 Surefire XML: {report}", file=sys.stderr)
                  sys.exit(1)
              root = ET.parse(report).getroot()
              skipped = int(root.attrib.get("skipped", "0"))
              tests = int(root.attrib.get("tests", "0"))
              if tests <= 0 or skipped > 0:
                  print(f"FDP-37 required test class did not fully execute: {class_name} tests={tests} skipped={skipped}", file=sys.stderr)
                  sys.exit(1)

          summary = json.loads(pathlib.Path("alert-service/target/fdp37-chaos/fdp37-proof-summary.json").read_text())
          expected_sha = os.environ["GITHUB_SHA"]
          expected_image = f"fdp37-alert-service:{expected_sha}"
          checks = {
              "commit_sha": summary.get("commit_sha") == expected_sha,
              "image_name": expected_image in summary.get("image_name", ""),
              "image_id": str(summary.get("image_id", "")).startswith("sha256:"),
              "image_digest_or_id": summary.get("image_digest_or_id") not in (None, "", "LOCAL_IMAGE_DIGEST_NOT_PROVIDED"),
              "dockerfile_path": summary.get("dockerfile_path") == "deployment/Dockerfile.backend",
              "network_mode": summary.get("network_mode") == "testcontainers-shared-network",
              "host_networking_used": summary.get("host_networking_used") is False,
              "killed_container_id_masked": summary.get("killed_container_id_masked") not in (None, "", "absent"),
              "restarted_container_id_masked": summary.get("restarted_container_id_masked") not in (None, "", "absent"),
              "scenario_count": int(summary.get("scenario_count", 0)) >= 5,
              "final_result": summary.get("final_result") == "PASS",
              "live_in_flight_proof_executed": summary.get("live_in_flight_proof_executed") is False,
          }
          failed = [name for name, ok in checks.items() if not ok]
          if failed:
              print(f"FDP-37 proof summary failed checks: {failed}", file=sys.stderr)
              sys.exit(1)

          rollback = json.loads(pathlib.Path("alert-service/target/fdp37-chaos/fdp37-rollback-validation.json").read_text())
          rollback_required = [
              "checkpoint_renewal_can_be_disabled_without_disabling_fencing",
              "FDP32_fencing_remains_active",
              "recovery_commands_visible_after_rollback",
              "API_returns_recovery_or_in_progress_after_rollback",
              "no_new_success_claims_after_rollback",
          ]
          if any(rollback.get(name) is not True for name in rollback_required):
              print("FDP-37 rollback validation artifact is incomplete or false", file=sys.stderr)
              sys.exit(1)

          enablement = json.loads(pathlib.Path("alert-service/target/fdp37-chaos/fdp37-enablement-review-pack.json").read_text())
          enablement_checks = {
              "commit_sha": enablement.get("commit_sha") == expected_sha,
              "image_id": str(enablement.get("image_id", "")).startswith("sha256:"),
              "image_digest_or_id": enablement.get("image_digest_or_id") not in (None, "", "LOCAL_IMAGE_DIGEST_NOT_PROVIDED"),
              "dockerfile_path": enablement.get("dockerfile_path") == "deployment/Dockerfile.backend",
              "fdp37_job_status": enablement.get("fdp37_job_status") == "PASS",
              "regulated_mutation_regression_status": enablement.get("regulated_mutation_regression_status") == "PASS",
              "fdp35_status": enablement.get("fdp35_status") == "PASS",
              "fdp36_status": enablement.get("fdp36_status") == "PASS",
              "required_transaction_scenario_executed": enablement.get("required_transaction_scenario_executed") is True,
              "production_enablement": enablement.get("production_enablement") is False,
              "release_config_pr_required": enablement.get("release_config_pr_required") is True,
              "human_approval_required": enablement.get("human_approval_required") is True,
              "operator_drill_required_before_enablement": enablement.get("operator_drill_required_before_enablement") is True,
          }
          failed_enablement = [name for name, ok in enablement_checks.items() if not ok]
          if failed_enablement:
              print(f"FDP-37 enablement review pack failed checks: {failed_enablement}", file=sys.stderr)
              sys.exit(1)
          PY
          grep -q "fdp37-alert-service:${GITHUB_SHA}" "$SUMMARY_MD"
          grep -q "${GITHUB_SHA}" "$SUMMARY_MD"
          grep -q 'PRODUCTION_IMAGE_CONTAINER_KILL' "$EVIDENCE"
          grep -q 'PRODUCTION_IMAGE_RESTART_API_PROOF' "$EVIDENCE"
          grep -q 'transaction_mode=REQUIRED' "$EVIDENCE"
          grep -q 'network_mode=testcontainers-shared-network' "$EVIDENCE"
          grep -q 'host_networking_used=false' "$EVIDENCE"
          grep -q 'READY_FOR_ENABLEMENT_REVIEW is not production enablement' "$SUMMARY_MD"
          grep -q 'READY_FOR_ENABLEMENT_REVIEW' "$ENABLEMENT_MD"
          grep -q 'live_in_flight_proof_executed: `false`' "$SUMMARY_MD"
          grep -q 'no_new_success_claims_after_rollback: `true`' "$ROLLBACK_MD"
          if grep -R 'network_mode=host\|network_mode: host\|Linux CI host networking' "$SUMMARY_MD" "$EVIDENCE" "$ENABLEMENT_MD"; then
            echo "FDP-37 proof artifacts must not use host networking"
            exit 1
          fi
          if grep -R 'TO_BE_FILLED_BY_CI\|PLACEHOLDER\|LOCAL_IMAGE_ID_NOT_PROVIDED\|LOCAL_IMAGE_DIGEST_NOT_PROVIDED' "$SUMMARY_MD" "$SUMMARY_JSON" "$ENABLEMENT_MD" "$ENABLEMENT_JSON"; then
            echo "FDP-37 proof artifacts cannot contain placeholders in CI"
            exit 1
          fi
          if grep -R 'LIVE_IN_FLIGHT_REQUEST_KILL' docs/FDP-37-*.md docs/adr/FDP-37-*.md docs/testing/FDP-37-*.md docs/ops/FDP-37-*.md; then
            echo "FDP-37 docs cannot claim live in-flight proof unless the required artifact contains LIVE_IN_FLIGHT_REQUEST_KILL"
            exit 1
          fi
          if grep -Eiq 'alpine|busybox|dummy' "$SUMMARY_MD" "$EVIDENCE"; then
            echo "FDP-37 production-image chaos cannot use dummy/alpine/busybox images"
            exit 1
          fi
          echo "FDP-37 killed image/container evidence:"
          cat "$EVIDENCE"
          echo
          cat "$SUMMARY_MD"

      - name: Upload FDP-37 production image chaos artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fdp37-production-image-chaos-reports
          if-no-files-found: error
          path: |
            alert-service/target/surefire-reports/
            alert-service/target/failsafe-reports/
            alert-service/target/fdp37-chaos/

  regulated-mutation-regression:
    name: Regulated Mutation Regression Gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Verify Docker is available for Testcontainers
        run: docker version

      - name: Run regulated mutation regression suite
        run: mvn -B -pl alert-service -am "-Dsurefire.failIfNoSpecifiedTests=false" "-Dtest=EvidenceGatedFinalizeCoordinatorIntegrationTest,EvidenceGatedFinalizeCoordinatorTest,RegulatedMutationLeaseFencingIntegrationTest,RegulatedMutationFencedCommandWriterTest,RegulatedMutationLeaseRenewalIntegrationTest,RegulatedMutationLeaseRenewalServiceTest,RegulatedMutationSafeCheckpointPolicyTest,RegulatedMutationCheckpointRenewalExecutionTest,RegulatedMutationStaleWorkerExecutorIntegrationTest,RegulatedMutationRecoveryServiceTest,RegulatedMutationRecoveryControllerTest,RegulatedMutationRollbackReadinessTest,RegulatedMutationPostRestartApiBehaviorTest,AlertControllerTest,AlertServiceMetricsTest,RegulatedMutationArchitectureTest" test

      - name: Upload regulated mutation regression reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regulated-mutation-regression-test-reports
          if-no-files-found: ignore
          path: |
            alert-service/target/surefire-reports/
            alert-service/target/failsafe-reports/

  fdp38-live-runtime-checkpoint-chaos:
    name: FDP-38 Live Runtime Checkpoint Chaos Proof
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - fdp37-production-image-chaos
      - regulated-mutation-regression

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Verify Docker is available for FDP-38 fixture chaos
        run: docker version

      - name: Build FDP-38 alert-service test-fixture image
        run: |
          docker build -f deployment/Dockerfile.alert-service-fdp38-fixture -t fdp38-alert-service-test-fixture:${GITHUB_SHA} .
          IMAGE_ID=$(docker image inspect fdp38-alert-service-test-fixture:${GITHUB_SHA} --format '{{.Id}}')
          IMAGE_DIGEST_OR_ID=$(docker image inspect fdp38-alert-service-test-fixture:${GITHUB_SHA} --format '{{if .RepoDigests}}{{index .RepoDigests 0}}{{else}}{{.Id}}{{end}}')
          echo "FDP38_ALERT_SERVICE_FIXTURE_IMAGE=fdp38-alert-service-test-fixture:${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "FDP38_ALERT_SERVICE_FIXTURE_IMAGE_ID=${IMAGE_ID}" >> "$GITHUB_ENV"
          echo "FDP38_ALERT_SERVICE_FIXTURE_IMAGE_DIGEST=${IMAGE_DIGEST_OR_ID}" >> "$GITHUB_ENV"
          test -n "$IMAGE_ID"
          test -n "$IMAGE_DIGEST_OR_ID"
          case "fdp38-alert-service-test-fixture:${GITHUB_SHA}" in
            *fdp38-alert-service-test-fixture*) ;;
            *) echo "FDP-38 fixture image name must contain fdp38-alert-service-test-fixture"; exit 1 ;;
          esac

      - name: Run FDP-38 live runtime checkpoint suite
        run: mvn -B -pl alert-service -am "-Dsurefire.failIfNoSpecifiedTests=false" "-Dfdp38.live-runtime-checkpoint.enabled=true" "-Dfdp38.alert-service.fixture-image=${FDP38_ALERT_SERVICE_FIXTURE_IMAGE}" "-Dfdp38.alert-service.fixture-image-id=${FDP38_ALERT_SERVICE_FIXTURE_IMAGE_ID}" "-Dfdp38.alert-service.fixture-image-digest=${FDP38_ALERT_SERVICE_FIXTURE_IMAGE_DIGEST}" "-Dgroups=fdp38,live-runtime-checkpoint-chaos,docker-chaos,integration" "-Dtest=RegulatedMutationLiveCheckpointBeforeBusinessMutationIT,RegulatedMutationLiveCheckpointAfterAttemptedAuditIT,RegulatedMutationLiveCheckpointBeforeFdp29FinalizeIT,RegulatedMutationLiveCheckpointBeforeSuccessAuditRetryIT" test

      - name: Verify FDP-38 proof artifacts
        if: always()
        run: |
          SUMMARY_MD=alert-service/target/fdp38-chaos/fdp38-proof-summary.md
          SUMMARY_JSON=alert-service/target/fdp38-chaos/fdp38-proof-summary.json
          EVIDENCE_MD=alert-service/target/fdp38-chaos/fdp38-live-checkpoint-evidence.md
          PROVENANCE_JSON=alert-service/target/fdp38-chaos/fdp38-fixture-image-provenance.json
          test -f "$SUMMARY_MD"
          test -f "$SUMMARY_JSON"
          test -f "$EVIDENCE_MD"
          test -f "$PROVENANCE_JSON"
          for checkpoint in after-attempted-audit-before-business-mutation before-legacy-business-mutation before-fdp29-local-finalize before-success-audit-retry; do
            test -f "alert-service/target/fdp38-chaos/fdp38-proof-summary-${checkpoint}.md"
            test -f "alert-service/target/fdp38-chaos/fdp38-proof-summary-${checkpoint}.json"
          done
          python - <<'PY'
          import json
          import os
          import pathlib
          import sys
          import xml.etree.ElementTree as ET

          reports = pathlib.Path("alert-service/target/surefire-reports")
          required = {
              "BEFORE_LEGACY_BUSINESS_MUTATION": {
                  "class": "RegulatedMutationLiveCheckpointBeforeBusinessMutationIT",
                  "method": "beforeLegacyBusinessMutationLiveKillDoesNotCommitOrPublish",
                  "precondition_setup": "LIVE_HTTP_FLOW_FROM_INITIAL_REQUEST",
              },
              "AFTER_ATTEMPTED_AUDIT_BEFORE_BUSINESS_MUTATION": {
                  "class": "RegulatedMutationLiveCheckpointAfterAttemptedAuditIT",
                  "method": "afterAttemptedAuditBeforeBusinessMutationLiveKillPreservesAttemptedAuditOnly",
                  "precondition_setup": "LIVE_HTTP_FLOW_FROM_INITIAL_REQUEST",
              },
              "BEFORE_FDP29_LOCAL_FINALIZE": {
                  "class": "RegulatedMutationLiveCheckpointBeforeFdp29FinalizeIT",
                  "method": "beforeFdp29LocalFinalizeLiveKillDoesNotClaimFinality",
                  "precondition_setup": "LIVE_HTTP_FLOW_FROM_INITIAL_REQUEST",
              },
              "BEFORE_SUCCESS_AUDIT_RETRY": {
                  "class": "RegulatedMutationLiveCheckpointBeforeSuccessAuditRetryIT",
                  "method": "beforeSuccessAuditRetryLiveKillDoesNotDuplicateBusinessMutationOrOutbox",
                  "precondition_setup": "SEEDED_DURABLE_PRECONDITION_THEN_RUNTIME_REACHED_CHECKPOINT",
              },
          }
          for checkpoint, metadata in required.items():
              class_name = metadata["class"]
              report = reports / f"TEST-com.frauddetection.alert.regulated.{class_name}.xml"
              if not report.exists():
                  print(f"Missing required FDP-38 Surefire XML: {report}", file=sys.stderr)
                  sys.exit(1)
              root = ET.parse(report).getroot()
              tests = int(root.attrib.get("tests", "0"))
              skipped = int(root.attrib.get("skipped", "0"))
              failures = int(root.attrib.get("failures", "0"))
              errors = int(root.attrib.get("errors", "0"))
              if tests <= 0 or skipped > 0 or failures > 0 or errors > 0:
                  print(f"FDP-38 required test class did not fully execute: {class_name} tests={tests} skipped={skipped} failures={failures} errors={errors}", file=sys.stderr)
                  sys.exit(1)
              method_names = {case.attrib.get("name") for case in root.findall("testcase")}
              if metadata["method"] not in method_names:
                  print(f"FDP-38 checkpoint method missing for {checkpoint}: {metadata['method']}", file=sys.stderr)
                  sys.exit(1)

          expected_sha = os.environ["GITHUB_SHA"]
          expected_image = f"fdp38-alert-service-test-fixture:{expected_sha}"
          summary = json.loads(pathlib.Path("alert-service/target/fdp38-chaos/fdp38-proof-summary.json").read_text())
          checks = {
              "commit_sha": summary.get("commit_sha") == expected_sha,
              "fixture_image_name": summary.get("fixture_image_name") == expected_image,
              "fixture_image_id": str(summary.get("fixture_image_id", "")).startswith("sha256:"),
              "fixture_image_digest_or_id": summary.get("fixture_image_digest_or_id") not in (None, "", "LOCAL_IMAGE_DIGEST_NOT_PROVIDED"),
              "fixture_image_kind": summary.get("fixture_image_kind") == "test-fixture-production-like",
              "fixture_image": summary.get("fixture_image") is True,
              "release_image": summary.get("release_image") is False,
              "contains_test_classes": summary.get("contains_test_classes") is True,
              "contains_test_profiles": summary.get("contains_test_profiles") is True,
              "release_candidate_allowed": summary.get("release_candidate_allowed") is False,
              "production_deployable": summary.get("production_deployable") is False,
              "production_enablement": summary.get("production_enablement") is False,
              "live_runtime_checkpoint_proof_executed": summary.get("live_runtime_checkpoint_proof_executed") is True,
              "proof_levels": "LIVE_IN_FLIGHT_REQUEST_KILL" in str(summary.get("proof_levels")),
              "state_reach_methods": "RUNTIME_REACHED_TEST_FIXTURE" in str(summary.get("state_reach_methods")),
              "runtime_reached_production_image": summary.get("runtime_reached_production_image") is False,
              "checkpoint_count": int(summary.get("checkpoint_count", 0)) == len(required),
              "killed_container_id_masked": summary.get("killed_container_id_masked") not in (None, "", "absent"),
              "restarted_container_id_masked": summary.get("restarted_container_id_masked") not in (None, "", "absent"),
              "no_false_success": summary.get("no_false_success") is True,
              "no_duplicate_mutation": summary.get("no_duplicate_mutation") is True,
              "no_duplicate_outbox": summary.get("no_duplicate_outbox") is True,
              "no_duplicate_success_audit": summary.get("no_duplicate_success_audit") is True,
              "recovery_wins": summary.get("recovery_wins") is True,
              "final_result": summary.get("final_result") == "PASS",
          }
          failed = [name for name, ok in checks.items() if not ok]
          if failed:
              print(f"FDP-38 proof summary failed checks: {failed}", file=sys.stderr)
              sys.exit(1)
          checkpoint_names = set(summary.get("checkpoint_names", []))
          if checkpoint_names != set(required):
              print(f"FDP-38 checkpoint registration mismatch: {checkpoint_names}", file=sys.stderr)
              sys.exit(1)
          preconditions = summary.get("precondition_setup", {})
          false_success = summary.get("false_success_evaluation", {})
          failed_reasons = summary.get("failed_false_success_reasons", [])
          if failed_reasons != []:
              print(f"FDP-38 false success reasons must be empty: {failed_reasons}", file=sys.stderr)
              sys.exit(1)
          required_invariants = {
              "public_success_status_absent",
              "committed_snapshot_absent_when_not_allowed",
              "finalized_status_absent_when_not_allowed",
              "success_audit_absent_when_not_allowed",
              "outbox_absent_when_not_allowed",
              "business_mutation_absent_when_not_allowed",
              "duplicate_mutation_absent",
              "duplicate_outbox_absent",
              "duplicate_success_audit_absent",
              "passed",
              "failed_reasons",
          }
          for checkpoint, metadata in required.items():
              if preconditions.get(checkpoint) != metadata["precondition_setup"]:
                  print(f"FDP-38 wrong precondition setup for {checkpoint}: {preconditions.get(checkpoint)}", file=sys.stderr)
                  sys.exit(1)
              evaluation = false_success.get(checkpoint)
              if not isinstance(evaluation, dict):
                  print(f"FDP-38 missing false success evaluation for {checkpoint}", file=sys.stderr)
                  sys.exit(1)
              missing = required_invariants - set(evaluation)
              if missing:
                  print(f"FDP-38 false success evaluation missing keys for {checkpoint}: {missing}", file=sys.stderr)
                  sys.exit(1)
              if evaluation.get("passed") is not True or evaluation.get("failed_reasons") != []:
                  print(f"FDP-38 false success evaluation failed for {checkpoint}: {evaluation}", file=sys.stderr)
                  sys.exit(1)

          artifact_text = "\n".join(pathlib.Path(path).read_text() for path in [
              "alert-service/target/fdp38-chaos/fdp38-proof-summary.md",
              "alert-service/target/fdp38-chaos/fdp38-live-checkpoint-evidence.md",
          ])
          for token in ["PLACEHOLDER", "TO_BE_FILLED", "LOCAL_IMAGE_ID_NOT_PROVIDED", "LOCAL_IMAGE_DIGEST_NOT_PROVIDED"]:
              if token in artifact_text or token in json.dumps(summary):
                  print(f"FDP-38 artifacts contain placeholder token: {token}", file=sys.stderr)
                  sys.exit(1)
          for checkpoint in required:
              if checkpoint not in artifact_text or f"precondition_setup={required[checkpoint]['precondition_setup']}" not in artifact_text:
                  print(f"FDP-38 evidence markdown missing checkpoint/precondition: {checkpoint}", file=sys.stderr)
                  sys.exit(1)

          provenance = json.loads(pathlib.Path("alert-service/target/fdp38-chaos/fdp38-fixture-image-provenance.json").read_text())
          if provenance.get("release_image") is not False or provenance.get("fixture_image") is not True:
              print("FDP-38 provenance must be fixture_image=true and release_image=false", file=sys.stderr)
              sys.exit(1)
          for key, expected in {
              "contains_test_classes": True,
              "contains_test_profiles": True,
              "release_candidate_allowed": False,
              "production_deployable": False,
          }.items():
              if provenance.get(key) is not expected:
                  print(f"FDP-38 provenance wrong {key}: {provenance.get(key)}", file=sys.stderr)
                  sys.exit(1)
          if "fdp38-alert-service-test-fixture" not in provenance.get("image_name", ""):
              print("FDP-38 fixture image provenance has wrong image name", file=sys.stderr)
              sys.exit(1)
          ci = pathlib.Path(".github/workflows/ci.yml").read_text()
          fdp38_start = ci.index("fdp38-live-runtime-checkpoint-chaos:")
          docker_start = ci.index("\n  docker:", fdp38_start)
          fdp39_start = ci.find("\n  fdp39-release-governance:", fdp38_start)
          fdp38_allowed_end = fdp39_start if fdp39_start >= 0 else docker_start
          for occurrence in [idx for idx in range(len(ci)) if ci.startswith("Dockerfile.alert-service-fdp38-fixture", idx)]:
              if not ((fdp38_start < occurrence < fdp38_allowed_end) or (fdp39_start >= 0 and fdp39_start < occurrence < docker_start)):
                  print("FDP-38 fixture Dockerfile is referenced outside the FDP-38/FDP-39 CI jobs", file=sys.stderr)
                  sys.exit(1)
          compose = pathlib.Path("deployment/docker-compose.yml").read_text()
          if "Dockerfile.alert-service-fdp38-fixture" in compose:
              print("FDP-38 fixture Dockerfile must not be used by release compose", file=sys.stderr)
              sys.exit(1)
          if "docker build -f deployment/Dockerfile.backend --build-arg MODULE_NAME=alert-service -t fdp37-alert-service" not in ci:
              print("FDP-37 production-image job must continue using deployment/Dockerfile.backend", file=sys.stderr)
              sys.exit(1)
          PY
          grep -q 'LIVE_IN_FLIGHT_REQUEST_KILL' "$SUMMARY_MD" "$EVIDENCE_MD"
          grep -q 'RUNTIME_REACHED_TEST_FIXTURE' "$SUMMARY_MD" "$EVIDENCE_MD"
          grep -q 'checkpoint_reached=true' "$EVIDENCE_MD"
          grep -q 'no_false_success=true' "$EVIDENCE_MD"
          grep -q 'release_image=false' "$EVIDENCE_MD"
          grep -q 'release_candidate_allowed=false' "$EVIDENCE_MD"
          grep -q 'production_deployable=false' "$EVIDENCE_MD"
          grep -q 'fixture image is not a production image' docs/FDP-38-merge-gate.md
          if grep -R 'release_image: `true`\|release_candidate_allowed: `true`\|production_deployable: `true`\|RUNTIME_REACHED_PRODUCTION_IMAGE: `claimed`\|production_enablement: `true`' "$SUMMARY_MD" "$EVIDENCE_MD" "$PROVENANCE_JSON" docs/FDP-38-*.md docs/adr/FDP-38-*.md docs/testing/FDP-38-*.md; then
            echo "FDP-38 artifacts/docs cannot claim production image live proof or production enablement"
            exit 1
          fi

      - name: Upload FDP-38 live runtime checkpoint artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fdp38-live-runtime-checkpoint-chaos-reports
          if-no-files-found: error
          path: |
            alert-service/target/surefire-reports/
            alert-service/target/failsafe-reports/
            alert-service/target/fdp38-chaos/

  fdp39-release-governance:
    name: FDP-39 Release Governance Gate
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs:
      - backend
      - regulated-mutation-regression
      - fdp35-production-readiness
      - fdp36-real-chaos
      - fdp37-production-image-chaos
      - fdp38-live-runtime-checkpoint-chaos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Verify Docker is available for FDP-39 release governance
        run: docker version

      - name: Build and export release image filesystem
        run: |
          set -euo pipefail
          docker build -f deployment/Dockerfile.backend --build-arg MODULE_NAME=alert-service -t fdp39-alert-service:${GITHUB_SHA} .
          IMAGE_ID=$(docker image inspect fdp39-alert-service:${GITHUB_SHA} --format '{{.Id}}')
          IMAGE_DIGEST_OR_ID=$(docker image inspect fdp39-alert-service:${GITHUB_SHA} --format '{{if .RepoDigests}}{{index .RepoDigests 0}}{{else}}{{.Id}}{{end}}')
          test -n "$IMAGE_ID"
          test -n "$IMAGE_DIGEST_OR_ID"
          mkdir -p alert-service/target/fdp39-governance/release-image-root
          CONTAINER_ID=$(docker create fdp39-alert-service:${GITHUB_SHA})
          docker export "$CONTAINER_ID" -o alert-service/target/fdp39-governance/release-image.tar
          docker rm "$CONTAINER_ID"
          tar -xf alert-service/target/fdp39-governance/release-image.tar -C alert-service/target/fdp39-governance/release-image-root
          if find alert-service/target/fdp39-governance/release-image-root -path '*target/test-classes*' -print -quit | grep -q .; then
            echo "FDP-39 release image contains test classes"
            exit 1
          fi
          if grep -R -a -E 'Fdp38LiveRuntimeCheckpointBarrierConfiguration|fdp38-live-runtime-checkpoint|Fdp38LiveRuntimeCheckpoint|LIVE_IN_FLIGHT_REQUEST_KILL|RUNTIME_REACHED_TEST_FIXTURE|Dockerfile.alert-service-fdp38-fixture' alert-service/target/fdp39-governance/release-image-root; then
            echo "FDP-39 release image contains FDP-38 fixture/test code"
            exit 1
          fi
          echo "FDP39_RELEASE_IMAGE=fdp39-alert-service:${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "FDP39_RELEASE_IMAGE_ID=${IMAGE_ID}" >> "$GITHUB_ENV"
          echo "FDP39_RELEASE_IMAGE_DIGEST=${IMAGE_DIGEST_OR_ID}" >> "$GITHUB_ENV"

      - name: Build fixture image only for non-release provenance
        run: |
          set -euo pipefail
          docker build -f deployment/Dockerfile.alert-service-fdp38-fixture -t fdp39-fdp38-fixture:${GITHUB_SHA} .
          IMAGE_ID=$(docker image inspect fdp39-fdp38-fixture:${GITHUB_SHA} --format '{{.Id}}')
          IMAGE_DIGEST_OR_ID=$(docker image inspect fdp39-fdp38-fixture:${GITHUB_SHA} --format '{{if .RepoDigests}}{{index .RepoDigests 0}}{{else}}{{.Id}}{{end}}')
          test -n "$IMAGE_ID"
          test -n "$IMAGE_DIGEST_OR_ID"
          echo "FDP39_FIXTURE_IMAGE=fdp39-fdp38-fixture:${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "FDP39_FIXTURE_IMAGE_ID=${IMAGE_ID}" >> "$GITHUB_ENV"
          echo "FDP39_FIXTURE_IMAGE_DIGEST=${IMAGE_DIGEST_OR_ID}" >> "$GITHUB_ENV"

      - name: Run FDP-39 governance tests
        run: mvn -B -pl alert-service -am "-Dsurefire.failIfNoSpecifiedTests=false" "-Dfdp39.release-image.scan-root=alert-service/target/fdp39-governance/release-image-root" "-Dfdp39.commit-sha=${GITHUB_SHA}" "-Dfdp39.branch-name=${GITHUB_REF_NAME}" "-Dfdp39.github-run-id=${GITHUB_RUN_ID}" "-Dfdp39.github-workflow=${GITHUB_WORKFLOW}" "-Dfdp39.release-image.name=${FDP39_RELEASE_IMAGE}" "-Dfdp39.release-image.id=${FDP39_RELEASE_IMAGE_ID}" "-Dfdp39.release-image.digest=${FDP39_RELEASE_IMAGE_DIGEST}" "-Dfdp39.fixture-image.name=${FDP39_FIXTURE_IMAGE}" "-Dfdp39.fixture-image.id=${FDP39_FIXTURE_IMAGE_ID}" "-Dfdp39.fixture-image.digest=${FDP39_FIXTURE_IMAGE_DIGEST}" "-Dtest=RegulatedMutationReleaseImageSeparationTest,FixtureDockerfileMustNotBeUsedByReleaseWorkflowTest,Fdp39GovernanceArtifactsTest,Fdp39NoOverclaimDocumentationTest,Fdp39MustNotChangeRuntimeMutationSemanticsTest,RegulatedMutationRecoveryInspectionGovernanceTest" test

      - name: Verify FDP-39 governance artifacts
        if: always()
        run: |
          set -euo pipefail
          ARTIFACT_DIR=alert-service/target/fdp39-governance
          test -f "$ARTIFACT_DIR/fdp39-release-image-separation.json"
          test -f "$ARTIFACT_DIR/fdp39-fixture-dockerfile-usage.md"
          test -f "$ARTIFACT_DIR/fdp39-artifact-provenance.json"
          test -f "$ARTIFACT_DIR/fdp39-artifact-provenance.md"
          test -f "$ARTIFACT_DIR/fdp39-enablement-governance-pack.json"
          test -f "$ARTIFACT_DIR/fdp39-enablement-governance-pack.md"
          test -f "$ARTIFACT_DIR/fdp39-rollback-governance.json"
          python - <<'PY'
          import json
          import os
          import pathlib
          import sys
          import xml.etree.ElementTree as ET

          artifact_dir = pathlib.Path("alert-service/target/fdp39-governance")
          required_tests = [
              "RegulatedMutationReleaseImageSeparationTest",
              "FixtureDockerfileMustNotBeUsedByReleaseWorkflowTest",
              "Fdp39GovernanceArtifactsTest",
              "Fdp39NoOverclaimDocumentationTest",
              "Fdp39MustNotChangeRuntimeMutationSemanticsTest",
              "RegulatedMutationRecoveryInspectionGovernanceTest",
          ]
          reports = pathlib.Path("alert-service/target/surefire-reports")
          for class_name in required_tests:
              report = reports / f"TEST-com.frauddetection.alert.regulated.{class_name}.xml"
              if not report.exists():
                  print(f"Missing FDP-39 Surefire XML: {report}", file=sys.stderr)
                  sys.exit(1)
              root = ET.parse(report).getroot()
              tests = int(root.attrib.get("tests", "0"))
              skipped = int(root.attrib.get("skipped", "0"))
              failures = int(root.attrib.get("failures", "0"))
              errors = int(root.attrib.get("errors", "0"))
              if tests <= 0 or skipped > 0 or failures > 0 or errors > 0:
                  print(f"FDP-39 test class did not fully execute: {class_name} tests={tests} skipped={skipped} failures={failures} errors={errors}", file=sys.stderr)
                  sys.exit(1)

          separation = json.loads((artifact_dir / "fdp39-release-image-separation.json").read_text())
          provenance = json.loads((artifact_dir / "fdp39-artifact-provenance.json").read_text())
          enablement = json.loads((artifact_dir / "fdp39-enablement-governance-pack.json").read_text())
          rollback = json.loads((artifact_dir / "fdp39-rollback-governance.json").read_text())
          expected_sha = os.environ["GITHUB_SHA"]
          checks = {
              "separation_release_image_safe": separation.get("release_image_safe") is True,
              "separation_fixture_code_absent": separation.get("fixture_code_present") is False,
              "separation_test_classes_absent": separation.get("test_classes_present") is False,
              "separation_profile_absent": separation.get("fdp38_profile_present") is False,
              "separation_release_dockerfile": separation.get("release_dockerfile_path") == "deployment/Dockerfile.backend",
              "provenance_commit": provenance.get("commit_sha") == expected_sha,
              "provenance_release_image": provenance.get("release_image_name") == f"fdp39-alert-service:{expected_sha}",
              "provenance_release_id": str(provenance.get("release_image_id", "")).startswith("sha256:"),
              "provenance_release_digest": str(provenance.get("release_image_digest_or_id", "")).startswith("sha256:") or "@sha256:" in str(provenance.get("release_image_digest_or_id", "")),
              "provenance_fixture_image": provenance.get("fixture_image_name") == f"fdp39-fdp38-fixture:{expected_sha}",
              "provenance_fixture_id": str(provenance.get("fixture_image_id", "")).startswith("sha256:"),
              "provenance_fixture_not_release": provenance.get("fixture_image_release_candidate_allowed") is False,
              "enablement_ready": enablement.get("ready_for_enablement_review") is True,
              "enablement_production_disabled": enablement.get("production_enabled") is False,
              "enablement_bank_disabled": enablement.get("bank_enabled") is False,
              "enablement_human_approval": enablement.get("human_approval_required") is True,
              "enablement_dual_control": enablement.get("dual_control_required") is True,
              "rollback_plan_present": rollback.get("rollback_plan_present") is True,
              "rollback_keeps_fencing": rollback.get("rollback_does_not_disable_fencing") is True,
              "rollback_no_enablement_change": rollback.get("production_enablement_not_changed") is True,
          }
          failed = [name for name, ok in checks.items() if not ok]
          if failed:
              print(f"FDP-39 governance artifact checks failed: {failed}", file=sys.stderr)
              sys.exit(1)

          generated = "\n".join(path.read_text(errors="ignore") for path in artifact_dir.glob("fdp39-*.*"))
          forbidden = ["PLACEHOLDER", "TO_BE_FILLED", "LOCAL_IMAGE_ID_NOT_PROVIDED", "LOCAL_IMAGE_DIGEST_NOT_PROVIDED", "BANK_CERTIFIED"]
          for token in forbidden:
              if token in generated:
                  print(f"FDP-39 generated artifacts contain forbidden token: {token}", file=sys.stderr)
                  sys.exit(1)
          if "`READY_FOR_ENABLEMENT_REVIEW` is not `PRODUCTION_ENABLED`" not in generated:
              print("FDP-39 enablement artifact must explicitly deny PRODUCTION_ENABLED", file=sys.stderr)
              sys.exit(1)
          PY
          grep -q 'READY_FOR_ENABLEMENT_REVIEW' docs/FDP-39-merge-gate.md docs/release/FDP-39-branch-readme.md
          grep -q 'Fixture proof is not production proof' docs/release/FDP-39-final-regulated-mutation-proof-matrix.md
          grep -q 'production_enabled: `false`' "$ARTIFACT_DIR/fdp39-enablement-governance-pack.md"
          grep -q 'fixture_image_release_candidate_allowed: `false`' "$ARTIFACT_DIR/fdp39-artifact-provenance.md"
          if grep -R 'RUNTIME_REACHED_PRODUCTION_IMAGE.*claimed\|production_enablement: `true`\|bank_enabled: `true`\|production_enabled: `true`' docs/FDP-39-*.md docs/adr/FDP-39-*.md docs/release/FDP-39-*.md "$ARTIFACT_DIR"; then
            echo "FDP-39 docs/artifacts contain a forbidden positive enablement claim"
            exit 1
          fi

      - name: Upload FDP-39 release governance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fdp39-release-governance-reports
          if-no-files-found: error
          path: |
            alert-service/target/surefire-reports/
            alert-service/target/fdp39-governance/

  docker:
    name: Docker Compose Build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs:
      - backend
      - ml
      - frontend
      - fdp28-proof
      - fdp35-production-readiness
      - fdp36-real-chaos
      - fdp37-production-image-chaos
      - fdp38-live-runtime-checkpoint-chaos
      - fdp39-release-governance
      - regulated-mutation-regression

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose file
        run: docker compose -f deployment/docker-compose.yml config --quiet

      - name: Build compose images
        run: docker compose -f deployment/docker-compose.yml build
