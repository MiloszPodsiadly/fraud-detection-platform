openapi: 3.0.3
info:
  title: Alert Service API
  version: FDP-14
  description: Authenticated alert-service contracts for analyst workflows, governance advisory lifecycle projection, and human-review audit.
servers:
  - url: http://localhost:8085
paths:
  /governance/advisories:
    get:
      summary: List governance advisories with derived lifecycle status
      description: Returns ML advisory events enriched with lifecycle_status derived at read time from latest audit event. Lifecycle is not persisted as source of truth and does not trigger workflow actions.
      security:
        - bearerAuth: []
        - demoAuth: []
      parameters:
        - name: severity
          in: query
          required: false
          schema:
            type: string
            enum: [LOW, MEDIUM, HIGH, CRITICAL]
        - name: model_version
          in: query
          required: false
          schema:
            type: string
            maxLength: 80
            pattern: "^[A-Za-z0-9._-]+$"
        - name: lifecycle_status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GovernanceAdvisoryLifecycleStatus"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 100
      responses:
        "200":
          description: Advisory list returned with read-time lifecycle projection.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceAdvisoryListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /governance/advisories/{event_id}:
    get:
      summary: Get one governance advisory with derived lifecycle status
      description: Returns one bounded-history advisory event enriched with lifecycle_status derived at read time from latest audit event.
      security:
        - bearerAuth: []
        - demoAuth: []
      parameters:
        - $ref: "#/components/parameters/EventId"
      responses:
        "200":
          description: Advisory event returned with lifecycle projection.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceAdvisoryEvent"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /governance/advisories/{event_id}/audit:
    get:
      summary: List governance advisory audit history
      description: Returns bounded newest-first human-review audit history for one governance advisory event.
      security:
        - bearerAuth: []
        - demoAuth: []
      parameters:
        - $ref: "#/components/parameters/EventId"
      responses:
        "200":
          description: Audit history returned. Status may be UNAVAILABLE when storage cannot be read.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceAuditHistoryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      summary: Append governance advisory audit event
      description: Records human review only. Does not mutate advisory events, scoring, model behavior, retraining, rollback, or fraud decisions.
      security:
        - bearerAuth: []
        - demoAuth: []
      parameters:
        - $ref: "#/components/parameters/EventId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GovernanceAuditRequest"
            example:
              decision: ACKNOWLEDGED
              note: Reviewed by operator
      responses:
        "201":
          description: Audit event appended.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceAuditEvent"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    demoAuth:
      type: apiKey
      in: header
      name: X-Demo-User-Id
      description: Local/dev demo auth headers; roles are supplied through X-Demo-Roles.
  parameters:
    EventId:
      name: event_id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 120
        pattern: "^[A-Za-z0-9._:-]+$"
  schemas:
    GovernanceAdvisoryLifecycleStatus:
      type: string
      description: Read-time projection from latest audit decision. OPEN means no audit event exists.
      enum:
        - OPEN
        - ACKNOWLEDGED
        - NEEDS_FOLLOW_UP
        - DISMISSED_AS_NOISE
    GovernanceAdvisoryListResponse:
      type: object
      required:
        - status
        - count
        - retention_limit
        - advisory_events
      properties:
        status:
          type: string
        count:
          type: integer
        retention_limit:
          type: integer
        advisory_events:
          type: array
          items:
            $ref: "#/components/schemas/GovernanceAdvisoryEvent"
    GovernanceAdvisoryEvent:
      type: object
      required:
        - event_id
        - event_type
        - severity
        - drift_status
        - confidence
        - advisory_confidence_context
        - model_name
        - model_version
        - lifecycle_context
        - recommended_actions
        - created_at
        - lifecycle_status
      properties:
        event_id:
          type: string
        event_type:
          type: string
        severity:
          type: string
        drift_status:
          type: string
        confidence:
          type: string
        advisory_confidence_context:
          type: string
        model_name:
          type: string
        model_version:
          type: string
        lifecycle_context:
          type: object
          additionalProperties: true
        recommended_actions:
          type: array
          items:
            type: string
        explanation:
          type: string
          nullable: true
        created_at:
          type: string
        lifecycle_status:
          $ref: "#/components/schemas/GovernanceAdvisoryLifecycleStatus"
    GovernanceAuditRequest:
      type: object
      additionalProperties: false
      required:
        - decision
      properties:
        decision:
          type: string
          enum:
            - ACKNOWLEDGED
            - NEEDS_FOLLOW_UP
            - DISMISSED_AS_NOISE
        note:
          type: string
          nullable: true
          maxLength: 500
      description: Actor fields are not accepted from clients; actor attribution is backend-derived.
    GovernanceAuditHistoryResponse:
      type: object
      required:
        - advisory_event_id
        - status
        - audit_events
      properties:
        advisory_event_id:
          type: string
        status:
          type: string
          enum:
            - AVAILABLE
            - UNAVAILABLE
        audit_events:
          type: array
          items:
            $ref: "#/components/schemas/GovernanceAuditEvent"
    GovernanceAuditEvent:
      type: object
      required:
        - audit_id
        - advisory_event_id
        - decision
        - actor_id
        - actor_display_name
        - actor_roles
        - created_at
        - model_name
        - model_version
        - advisory_severity
        - advisory_confidence
        - advisory_confidence_context
      properties:
        audit_id:
          type: string
        advisory_event_id:
          type: string
        decision:
          type: string
          enum:
            - ACKNOWLEDGED
            - NEEDS_FOLLOW_UP
            - DISMISSED_AS_NOISE
        note:
          type: string
          nullable: true
          maxLength: 500
        actor_id:
          type: string
        actor_display_name:
          type: string
        actor_roles:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        model_name:
          type: string
        model_version:
          type: string
        advisory_severity:
          type: string
        advisory_confidence:
          type: string
        advisory_confidence_context:
          type: string
    ApiErrorResponse:
      type: object
      required:
        - timestamp
        - status
        - error
        - message
        - details
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: string
  responses:
    BadRequest:
      description: Request validation failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    Unauthorized:
      description: Authentication is required.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    Forbidden:
      description: Authenticated actor lacks the required authority.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    NotFound:
      description: Advisory event was not found in bounded advisory history.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    ServiceUnavailable:
      description: Audit persistence or advisory lookup is unavailable.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
