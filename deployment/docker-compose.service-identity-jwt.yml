services:
  ml-inference-service:
    environment:
      INTERNAL_AUTH_MODE: JWT_SERVICE_IDENTITY
      INTERNAL_AUTH_JWT_ISSUER: fraud-platform-local
      INTERNAL_AUTH_JWT_AUDIENCE: ml-inference-service
      INTERNAL_AUTH_JWT_SECRET: local-dev-jwt-service-secret
      INTERNAL_AUTH_JWT_SERVICE_CLAIM: service_name
      INTERNAL_AUTH_JWT_AUTHORITIES_CLAIM: authorities
      INTERNAL_AUTH_ALLOWED_SERVICE_AUTHORITIES: fraud-scoring-service:ml-score,alert-service:governance-read

  fraud-scoring-service:
    environment:
      INTERNAL_AUTH_CLIENT_ENABLED: "true"
      INTERNAL_AUTH_CLIENT_MODE: JWT_SERVICE_IDENTITY
      INTERNAL_AUTH_SERVICE_NAME: fraud-scoring-service
      INTERNAL_AUTH_TOKEN: ""
      INTERNAL_AUTH_JWT_ISSUER: fraud-platform-local
      INTERNAL_AUTH_JWT_AUDIENCE: ml-inference-service
      INTERNAL_AUTH_JWT_SECRET: local-dev-jwt-service-secret
      INTERNAL_AUTH_JWT_TTL: 5m
      INTERNAL_AUTH_JWT_AUTHORITIES: ml-score

  alert-service:
    environment:
      INTERNAL_AUTH_CLIENT_ENABLED: "true"
      INTERNAL_AUTH_CLIENT_MODE: JWT_SERVICE_IDENTITY
      INTERNAL_AUTH_SERVICE_NAME: alert-service
      INTERNAL_AUTH_TOKEN: ""
      INTERNAL_AUTH_JWT_ISSUER: fraud-platform-local
      INTERNAL_AUTH_JWT_AUDIENCE: ml-inference-service
      INTERNAL_AUTH_JWT_SECRET: local-dev-jwt-service-secret
      INTERNAL_AUTH_JWT_TTL: 5m
      INTERNAL_AUTH_JWT_AUTHORITIES: governance-read
