<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Fraud Detection Platform architecture</title>
  <desc id="desc">Layered architecture diagram showing entry points, Kafka pipeline, intelligence services, state stores, and observability.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; rx: 16; }
      .title { font: 700 26px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 14px Arial, sans-serif; fill: #475569; }
      .section { font: 700 15px Arial, sans-serif; fill: #334155; letter-spacing: .4px; }
      .box { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.3; rx: 10; }
      .entry { fill: #eff6ff; stroke: #3b82f6; }
      .pipe { fill: #fff7ed; stroke: #f97316; }
      .intel { fill: #f5f3ff; stroke: #8b5cf6; }
      .state { fill: #ecfdf5; stroke: #22c55e; }
      .ops { fill: #fdf2f8; stroke: #db2777; }
      .label { font: 700 14px Arial, sans-serif; fill: #111827; }
      .small { font: 400 12px Arial, sans-serif; fill: #475569; }
      .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .soft { stroke: #94a3b8; stroke-width: 1.8; fill: none; marker-end: url(#arrow); stroke-dasharray: 6 5; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="720"/>
  <text class="title" x="48" y="52">Fraud Detection Platform</text>
  <text class="subtitle" x="48" y="78">Service boundaries, data flow, local evidence, and observability</text>

  <rect class="panel" x="40" y="110" width="185" height="430"/>
  <text class="section" x="64" y="142">ENTRY POINTS</text>
  <rect class="box entry" x="62" y="170" width="140" height="72"/>
  <text class="label" x="78" y="200">Ingest API</text>
  <text class="small" x="78" y="220">submitted transactions</text>
  <rect class="box entry" x="62" y="270" width="140" height="72"/>
  <text class="label" x="78" y="300">Simulator</text>
  <text class="small" x="78" y="320">synthetic replay</text>
  <rect class="box entry" x="62" y="395" width="140" height="72"/>
  <text class="label" x="78" y="425">Analyst UI</text>
  <text class="small" x="78" y="445">review workflow</text>

  <rect class="panel" x="270" y="110" width="315" height="430"/>
  <text class="section" x="294" y="142">EVENT PIPELINE</text>
  <rect class="box pipe" x="300" y="170" width="250" height="58"/>
  <text class="label" x="324" y="202">Kafka: transactions.raw</text>
  <rect class="box" x="300" y="255" width="250" height="64"/>
  <text class="label" x="324" y="285">Feature Enricher</text>
  <text class="small" x="324" y="304">Redis-backed behavior windows</text>
  <rect class="box pipe" x="300" y="346" width="250" height="58"/>
  <text class="label" x="324" y="378">Kafka: transactions.enriched</text>
  <rect class="box" x="300" y="431" width="250" height="64"/>
  <text class="label" x="324" y="461">Fraud Scoring</text>
  <text class="small" x="324" y="480">rules, shadow, compare, ML</text>

  <rect class="panel" x="630" y="110" width="230" height="430"/>
  <text class="section" x="654" y="142">INTELLIGENCE</text>
  <rect class="box intel" x="658" y="185" width="174" height="76"/>
  <text class="label" x="678" y="218">ML Inference</text>
  <text class="small" x="678" y="238">score, reasons, drift</text>
  <rect class="box intel" x="658" y="300" width="174" height="76"/>
  <text class="label" x="678" y="333">Assistant</text>
  <text class="small" x="678" y="353">optional summaries</text>

  <rect class="panel" x="905" y="110" width="245" height="430"/>
  <text class="section" x="929" y="142">STATE AND EVIDENCE</text>
  <rect class="box state" x="932" y="170" width="190" height="66"/>
  <text class="label" x="954" y="199">MongoDB</text>
  <text class="small" x="954" y="218">alerts, audit, governance</text>
  <rect class="box state" x="932" y="260" width="190" height="66"/>
  <text class="label" x="954" y="289">Redis</text>
  <text class="small" x="954" y="308">feature windows</text>
  <rect class="box state" x="932" y="350" width="190" height="66"/>
  <text class="label" x="954" y="379">Trust Authority</text>
  <text class="small" x="954" y="398">sign and verify anchors</text>
  <rect class="box ops" x="932" y="444" width="190" height="66"/>
  <text class="label" x="954" y="473">Prometheus / Grafana</text>
  <text class="small" x="954" y="492">metrics and dashboards</text>

  <path class="arrow" d="M202 206 H300"/>
  <path class="arrow" d="M202 306 H300"/>
  <path class="arrow" d="M425 228 V255"/>
  <path class="arrow" d="M425 319 V346"/>
  <path class="arrow" d="M425 404 V431"/>
  <path class="arrow" d="M550 463 H630"/>
  <path class="arrow" d="M832 223 H932"/>
  <path class="arrow" d="M550 463 C675 463 760 382 932 382"/>
  <path class="arrow" d="M202 431 C470 610 760 610 932 476"/>
  <path class="soft" d="M550 287 H932"/>
  <path class="soft" d="M550 463 C660 540 790 535 932 476"/>
  <path class="soft" d="M832 338 H932"/>

  <rect class="panel" x="40" y="585" width="1110" height="78"/>
  <text class="section" x="64" y="617">ARCHITECTURAL NON-CLAIMS</text>
  <text class="small" x="64" y="642">Backend authorization is authoritative. Mongo transactions are local boundaries. Kafka/outbox delivery is asynchronous and at-least-once. Local evidence is not external finality.</text>
</svg>
