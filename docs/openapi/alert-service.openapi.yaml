openapi: 3.0.3
info:
  title: Alert Service API
  version: FDP-13
  description: Authenticated alert-service contracts for analyst workflows and governance advisory human-review audit.
servers:
  - url: http://localhost:8085
paths:
  /governance/advisories/{event_id}/audit:
    get:
      summary: List governance advisory audit history
      description: Returns bounded newest-first human-review audit history for one governance advisory event.
      security:
        - bearerAuth: []
        - demoAuth: []
      parameters:
        - $ref: "#/components/parameters/EventId"
      responses:
        "200":
          description: Audit history returned. Status may be UNAVAILABLE when storage cannot be read.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceAuditHistoryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      summary: Append governance advisory audit event
      description: Records human review only. Does not mutate advisory events, scoring, model behavior, retraining, rollback, or fraud decisions.
      security:
        - bearerAuth: []
        - demoAuth: []
      parameters:
        - $ref: "#/components/parameters/EventId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GovernanceAuditRequest"
            example:
              decision: ACKNOWLEDGED
              note: Reviewed by operator
      responses:
        "201":
          description: Audit event appended.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceAuditEvent"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    demoAuth:
      type: apiKey
      in: header
      name: X-Demo-User-Id
      description: Local/dev demo auth headers; roles are supplied through X-Demo-Roles.
  parameters:
    EventId:
      name: event_id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 120
        pattern: "^[A-Za-z0-9._:-]+$"
  schemas:
    GovernanceAuditRequest:
      type: object
      additionalProperties: false
      required:
        - decision
      properties:
        decision:
          type: string
          enum:
            - ACKNOWLEDGED
            - NEEDS_FOLLOW_UP
            - DISMISSED_AS_NOISE
        note:
          type: string
          nullable: true
          maxLength: 500
      description: Actor fields are not accepted from clients; actor attribution is backend-derived.
    GovernanceAuditHistoryResponse:
      type: object
      required:
        - advisory_event_id
        - status
        - audit_events
      properties:
        advisory_event_id:
          type: string
        status:
          type: string
          enum:
            - AVAILABLE
            - UNAVAILABLE
        audit_events:
          type: array
          items:
            $ref: "#/components/schemas/GovernanceAuditEvent"
    GovernanceAuditEvent:
      type: object
      required:
        - audit_id
        - advisory_event_id
        - decision
        - actor_id
        - actor_display_name
        - actor_roles
        - created_at
        - model_name
        - model_version
        - advisory_severity
        - advisory_confidence
        - advisory_confidence_context
      properties:
        audit_id:
          type: string
        advisory_event_id:
          type: string
        decision:
          type: string
          enum:
            - ACKNOWLEDGED
            - NEEDS_FOLLOW_UP
            - DISMISSED_AS_NOISE
        note:
          type: string
          nullable: true
          maxLength: 500
        actor_id:
          type: string
        actor_display_name:
          type: string
        actor_roles:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        model_name:
          type: string
        model_version:
          type: string
        advisory_severity:
          type: string
        advisory_confidence:
          type: string
        advisory_confidence_context:
          type: string
    ApiErrorResponse:
      type: object
      required:
        - timestamp
        - status
        - error
        - message
        - details
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: string
  responses:
    BadRequest:
      description: Request validation failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    Unauthorized:
      description: Authentication is required.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    Forbidden:
      description: Authenticated actor lacks the required authority.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    NotFound:
      description: Advisory event was not found in bounded advisory history.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    ServiceUnavailable:
      description: Audit persistence or advisory lookup is unavailable.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
